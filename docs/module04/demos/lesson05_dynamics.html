<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · The cylinder in motion</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal2:#1FB6AE;--amber:#DD841A;--red:#C2463B;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  svg{display:block;width:100%;height:auto;background:#F2F6F9;border:1px solid var(--line);border-radius:12px}
  .toggle{display:flex;gap:8px;margin-top:16px}
  .toggle button{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:14px;font-weight:600;padding:10px;border-radius:10px;cursor:pointer}
  .toggle button:hover{border-color:var(--teal)} .toggle button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
  .ctl{margin:14px 0 6px}
  .ctl label{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:6px}
  .ctl .v{font-family:var(--mono);color:var(--teal)}
  input[type=range]{width:100%;accent-color:#0E7E8C}
  .out{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}
  .tile{border-radius:12px;padding:12px 14px;border:1px solid var(--line);background:var(--bg);text-align:center}
  .tile .k{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--slate)}
  .tile .v{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:3px;color:var(--teal)}
  .tile.fn .v{color:var(--amber)}
  .note{margin-top:14px;font-size:13px;padding:10px 12px;border-radius:10px;background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2}
</style>
</head>
<body>
<div class="wrap">
  <h1>The cylinder in motion — mass on a fluid spring</h1>
  <p class="sub">The trapped oil is a spring <b>k = B<sub>e</sub>A²/V</b>; the load is a mass on it. Set the mass and soften the oil with air, and watch the natural frequency and the step response change together.</p>

  <div class="card">
    <svg id="chart" viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif">
      <line x1="55" y1="210" x2="610" y2="210" stroke="#1B3A55" stroke-width="1.6"/>
      <line x1="55" y1="210" x2="55" y2="20" stroke="#1B3A55" stroke-width="1.6"/>
      <rect id="band" x="55" width="555" fill="#1FB6AE" opacity="0.16"/>
      <line id="target" x1="55" x2="610" stroke="#0E7E8C" stroke-width="1" stroke-dasharray="5 3"/>
      <text x="600" id="tgtLab" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="end">target ±1 mm</text>
      <polyline id="curve" fill="none" stroke="#0E7E8C" stroke-width="2.6"/>
      <text x="335" y="234" id="xlab" font-size="10" fill="#586876" text-anchor="middle">time</text>
      <text x="16" y="115" font-size="10" font-weight="700" fill="#1B3A55" text-anchor="middle" transform="rotate(-90 16 115)">position</text>
    </svg>

    <div class="toggle">
      <button id="bTool">Bare tool (3 kg)</button>
      <button id="bLoaded" class="active">Loaded (2 tonne)</button>
    </div>
    <div class="ctl">
      <label>Oil stiffness (add air to soften) <span class="v">B&#8091; = <span id="beOut">1.5</span> GPa</span></label>
      <input id="beRange" type="range" min="0.5" max="1.8" step="0.05" value="1.5"/>
    </div>
    <div class="out">
      <div class="tile"><div class="k">Spring k</div><div class="v"><span id="kOut">23</span> MN/m</div></div>
      <div class="tile fn"><div class="k">Natural freq</div><div class="v"><span id="fnOut">17</span> Hz</div></div>
      <div class="tile"><div class="k">Settling</div><div class="v"><span id="tsOut">0.28</span> s</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
</div>

<script>
  const Ab=1963.5e-6, V=0.25e-3, zeta=0.15;
  const PX0=55,PX1=610,PY0=210,PY1=20;
  const $=id=>document.getElementById(id);
  let m=2000;
  const kStiff=Be=>Be*Ab*Ab/V;
  const fn=(Be,m)=>Math.sqrt(kStiff(Be)/m)/(2*Math.PI);
  function stepResp(wn,t){ const wd=wn*Math.sqrt(1-zeta*zeta); return 1-Math.exp(-zeta*wn*t)*(Math.cos(wd*t)+(zeta/Math.sqrt(1-zeta*zeta))*Math.sin(wd*t)); }
  function render(){
    const Be=+$('beRange').value*1e9, k=kStiff(Be), f=fn(Be,m), wn=2*Math.PI*f;
    const ts=4/(zeta*wn);                       // ~2% settling time
    $('beOut').textContent=(Be/1e9).toFixed(2); $('kOut').textContent=Math.round(k/1e6); $('fnOut').textContent=f>=100?Math.round(f):f.toFixed(1); $('tsOut').textContent=ts<0.1?(ts*1000).toFixed(0)+' ms':ts.toFixed(2);
    // chart: time axis ~ a bit beyond settling
    const T=ts*1.4;
    $('xlab').textContent='time — 0 to '+(T<0.1?(T*1000).toFixed(0)+' ms':T.toFixed(2)+' s');
    const xp=t=>PX0+(t/T)*(PX1-PX0), yp=x=>PY0-(x/1.4)*(PY0-PY1);
    $('target').setAttribute('y1',yp(1)); $('target').setAttribute('y2',yp(1)); $('tgtLab').setAttribute('y',yp(1)-4);
    $('band').setAttribute('y',yp(1.03)); $('band').setAttribute('height',yp(0.97)-yp(1.03));
    let p=[]; for(let i=0;i<=200;i++){ const t=T*i/200; p.push(xp(t).toFixed(1)+','+yp(stepResp(wn,t)).toFixed(1)); } $('curve').setAttribute('points',p.join(' '));
    const soft = Be<1.0e9;
    $('note').innerHTML=`${m===3?'The bare 3 kg tool':'The 2-tonne load'} on ${(Be/1e9).toFixed(2)} GPa oil: k = ${Math.round(k/1e6)} MN/m, f\u2099 \u2248 <b>${f>=100?Math.round(f):f.toFixed(1)} Hz</b>, settling \u2248 <b>${ts<0.1?(ts*1000).toFixed(0)+' ms':ts.toFixed(2)+' s'}</b>. ${soft?'Softened by air \u2014 lower frequency, slower to settle.':'Stiff, air-free oil \u2014 quick, clean settling.'}`;
  }
  function pick(mm,btn){ m=mm; for(const b of [$('bTool'),$('bLoaded')]) b.classList.toggle('active',b===btn); render(); }
  $('bTool').onclick=()=>pick(3,$('bTool')); $('bLoaded').onclick=()=>pick(2000,$('bLoaded'));
  $('beRange').addEventListener('input',render);
  render();
</script>
</body>
</html>
