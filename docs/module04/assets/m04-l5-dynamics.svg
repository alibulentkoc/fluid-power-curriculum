<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Left: the cylinder drawn as a mass on a fluid spring. A block, the moving mass m of piston, rod and load, sits on a coil spring whose stiffness k equals B_e times A squared over V, about 23.5 meganewtons per metre. Right: a step response chart over 0 to 0.6 seconds. A stiff clean-oil curve at about 17 hertz rises and settles quickly into the plus or minus one millimetre band with small overshoot; a softer aerated-oil curve at about 10 hertz is slower and overshoots more before settling. The picture shows that stiffer, air-free oil gives faster, cleaner motion.">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient></defs>
<rect x="0" y="0" width="900" height="440" rx="20" fill="url(#bg)"/>
<text x="40" y="44" font-size="24" font-weight="700" fill="#0C2235">The cylinder is a mass on a fluid spring</text>
<text x="40" y="68" font-size="14" fill="#586876">Its natural frequency sets how fast it moves and how cleanly it settles — and stiff, air-free oil wins.</text>
<line x1="200" y1="380" x2="200" y2="360" stroke="#1B3A55" stroke-width="2"/>
<rect x="130" y="382" width="140" height="8" fill="#1B3A55"/>
<polyline points="200.0,360.0 222.0,352.1 178.0,344.3 222.0,336.4 178.0,328.6 222.0,320.7 178.0,312.9 222.0,305.0 178.0,297.1 222.0,289.3 178.0,281.4 222.0,273.6 178.0,265.7 222.0,257.9 200.0,250.0" fill="none" stroke="#0E7E8C" stroke-width="2.6"/>
<rect x="140" y="185" width="120" height="65" rx="6" fill="#DD841A"/>
<text x="200" y="222" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">mass m</text>
<text x="200" y="240" font-size="10" fill="#fff" text-anchor="middle">piston + rod + load</text>
<text x="200" y="150" font-size="12.5" font-weight="700" fill="#1B3A55" text-anchor="middle">the moving load</text>
<text x="234" y="315" font-size="11" font-weight="700" fill="#0B5A63">spring = trapped oil</text>
<text x="234" y="330" font-size="10.5" fill="#586876" font-family="'IBM Plex Mono',monospace">k = BₑA²/V ≈ 23.5 MN/m</text>
<text x="200" y="410" font-size="10.5" fill="#586876" text-anchor="middle">fₙ = (1/2π)√(k/m)</text>
<line x1="440" y1="380" x2="860" y2="380" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="440" y1="380" x2="440" y2="110" stroke="#1B3A55" stroke-width="1.6"/>
<rect x="440" y="181.4" width="420" height="11.6" fill="#1FB6AE" opacity="0.16"/>
<line x1="440" y1="187.1" x2="860" y2="187.1" stroke="#0E7E8C" stroke-width="1" stroke-dasharray="5 3"/>
<text x="856" y="182.1" font-size="10" font-weight="700" fill="#0B5A63" text-anchor="end">target ±1 mm</text>
<line x1="440.0" y1="380" x2="440.0" y2="384" stroke="#1B3A55"/><text x="440.0" y="396" font-size="9.5" fill="#586876" text-anchor="middle">0</text>
<line x1="580.0" y1="380" x2="580.0" y2="384" stroke="#1B3A55"/><text x="580.0" y="396" font-size="9.5" fill="#586876" text-anchor="middle">0.2</text>
<line x1="720.0" y1="380" x2="720.0" y2="384" stroke="#1B3A55"/><text x="720.0" y="396" font-size="9.5" fill="#586876" text-anchor="middle">0.4</text>
