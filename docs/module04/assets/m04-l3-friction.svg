<line x1="91" y1="259.2" x2="95" y2="259.2" stroke="#1B3A55"/><text x="86" y="263.2" font-size="10.5" fill="#586876" text-anchor="end">60 N</text>
<line x1="91" y1="118.5" x2="95" y2="118.5" stroke="#1B3A55"/><text x="86" y="122.5" font-size="10.5" fill="#586876" text-anchor="end">120 N</text>
<line x1="95.0" y1="400" x2="95.0" y2="404" stroke="#1B3A55"/><text x="95.0" y="418" font-size="10" fill="#586876" text-anchor="middle">0</text>
<line x1="114.4" y1="400" x2="114.4" y2="404" stroke="#1B3A55"/><text x="114.4" y="418" font-size="10" fill="#586876" text-anchor="middle">5</text>
<line x1="180.5" y1="400" x2="180.5" y2="404" stroke="#1B3A55"/><text x="180.5" y="418" font-size="10" fill="#586876" text-anchor="middle">22</text>
<line x1="425.2" y1="400" x2="425.2" y2="404" stroke="#1B3A55"/><text x="425.2" y="418" font-size="10" fill="#586876" text-anchor="middle">85</text>
<line x1="576.7" y1="400" x2="576.7" y2="404" stroke="#1B3A55"/><text x="576.7" y="418" font-size="10" fill="#586876" text-anchor="middle">124</text>
<text x="348" y="438" font-size="12" font-weight="700" fill="#1B3A55" text-anchor="middle">piston speed (mm/s)</text>
<text x="46" y="248" font-size="12" font-weight="700" fill="#1B3A55" text-anchor="middle" transform="rotate(-90 46 248)">friction (N)</text>
