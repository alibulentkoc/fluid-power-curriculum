<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="A friction-versus-velocity Stribeck curve for the platform cylinder, with a usable-force side bar. Friction starts at the 120 newton breakaway at zero speed, dips to about 65 newtons near 22 millimetres per second, then rises along the viscous line. Marked points: breakaway 120 N at 0, slow approach 108 N at 5 mm/s, running 77 N at 85 mm/s, retract 85 N at 124 mm/s. The side bar shows the ideal 19.6 kilonewton force with a thin friction sliver of about 80 newtons removed, leaving a usable force of about 19.5 kilonewtons.">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient></defs>
<rect x="0" y="0" width="900" height="470" rx="20" fill="url(#bg)"/>
<text x="40" y="44" font-size="24" font-weight="700" fill="#0C2235">Friction is worst where precision is needed</text>
<text x="40" y="68" font-size="14" fill="#586876">High at breakaway, dipping as it moves, rising with speed — and only a sliver off the ideal force.</text>
<line x1="95" y1="400" x2="600" y2="400" stroke="#1B3A55" stroke-width="2"/>
