<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Holding the load</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal2:#1FB6AE;--amber:#DD841A;--red:#C2463B;--green:#0C6A5F;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  svg{display:block;width:100%;height:auto;background:#F2F6F9;border:1px solid var(--line);border-radius:12px}
  .toggle{display:flex;gap:8px;margin-top:16px}
  .toggle button{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:13px;font-weight:600;padding:10px;border-radius:10px;cursor:pointer}
  .toggle button:hover{border-color:var(--teal)} .toggle button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
  .ctl{margin:16px 0 6px}
  .ctl label{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:6px}
  .ctl .v{font-family:var(--mono);color:var(--teal)}
  input[type=range]{width:100%;accent-color:#0E7E8C}
  input[disabled]{opacity:.4}
  .out{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .tile{border-radius:12px;padding:12px 14px;border:1px solid var(--line);background:var(--bg);text-align:center}
  .tile .k{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--slate)}
  .tile .v{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:3px;color:var(--teal)}
  .tile.warn .v{color:var(--red)}
  .note{margin-top:14px;font-size:13px;padding:10px 12px;border-radius:10px;font-weight:600}
  .note.ok{background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2}
  .note.bad{background:#FBEAE7;color:#9A2f27;border:1px solid #EBC3BE}
</style>
</head>
<body>
<div class="wrap">
  <h1>Holding the load — spool drift vs a leak-free lock</h1>
  <p class="sub">The load holds the cap side at ~100 bar. A spool <b>blocks</b> but leaks, so the piston sinks; a pilot-operated check valve <b>seals</b> drop-tight. Watch the drift against the ±1 mm band.</p>

  <div class="card">
    <svg id="chart" viewBox="0 0 640 210" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif">
      <text x="20" y="20" font-size="10.5" font-weight="700" fill="#586876">drift (mm) over 30 s</text>
      <line x1="40" y1="170" x2="620" y2="170" stroke="#1B3A55" stroke-width="1.3"/>
      <line x1="40" y1="40" x2="40" y2="170" stroke="#1B3A55" stroke-width="1.3"/>
      <rect x="40" y="105" width="580" height="65" fill="#1FB6AE" opacity="0.10"/>
      <line x1="40" y1="105" x2="620" y2="105" stroke="#0E7E8C" stroke-width="1.4" stroke-dasharray="5 3"/>
      <text x="616" y="100" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="end">±1 mm</text>
      <text x="44" y="184" font-size="9" fill="#586876">0s</text><text x="616" y="184" font-size="9" fill="#586876" text-anchor="end">30s</text>
      <polyline id="trace" fill="none" stroke="#C2463B" stroke-width="2.5" points=""/>
      <text id="traceLab" x="330" y="60" font-size="11" font-weight="700" fill="#9A2f27"></text>
    </svg>

    <div class="toggle">
      <button id="bSpool" class="active">Spool centre (blocks)</button>
      <button id="bPOCV">Pilot check valve (seals)</button>
    </div>
    <div class="ctl">
      <label>Leakage <span class="v"><span id="leakOut">10</span> cm³/min</span></label>
      <input id="leakRange" type="range" min="0" max="40" step="1" value="10"/>
    </div>
    <div class="out">
      <div class="tile" id="driftTile"><div class="k">Drift rate</div><div class="v"><span id="driftOut">0.085</span> mm/s</div></div>
      <div class="tile" id="timeTile"><div class="k">Reaches ±1 mm in</div><div class="v" id="timeOut">12 s</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
</div>

<script>
  const A_cap=1963.5e-6;
  const $=id=>document.getElementById(id);
  let mode='spool';
  const X=t=>40+(t/30)*580, Y=d=>170-(Math.min(d,2)/2)*130;
  function driftRate(Q){ return Q*1e-6/60/A_cap*1000; }   // mm/s
  function setMode(m){ mode=m; $('bSpool').classList.toggle('active',m==='spool'); $('bPOCV').classList.toggle('active',m==='pocv'); $('leakRange').disabled=(m==='pocv'); render(); }
  function render(){
    const Q = mode==='pocv' ? 0 : +$('leakRange').value;
    const v = driftRate(Q);
    $('leakOut').textContent = mode==='pocv' ? '≈0' : $('leakRange').value;
    $('driftOut').textContent = v.toFixed(3);
    const t1 = v===0 ? Infinity : 1/v;
    $('timeOut').textContent = v===0 ? 'never' : (t1<60? t1.toFixed(1)+' s' : (t1/60).toFixed(1)+' min');
    // trace
    let pts=[]; for(let t=0;t<=30;t++) pts.push(`${X(t).toFixed(1)},${Y(v*t).toFixed(1)}`);
    $('trace').setAttribute('points', pts.join(' '));
    $('trace').setAttribute('stroke', mode==='pocv' ? '#0C6A5F' : '#C2463B');
    $('traceLab').textContent = mode==='pocv' ? 'flat — no drift' : (t1<30? 'out of tolerance in '+t1.toFixed(0)+' s' : 'drifting');
    $('traceLab').setAttribute('fill', mode==='pocv' ? '#0C6A5F' : '#9A2f27');
    const bad = v>0 && t1<600;
    $('driftTile').className = 'tile'+(bad?' warn':''); $('timeTile').className='tile'+(bad?' warn':'');
    const n=$('note');
    if(mode==='pocv'){ n.className='note ok'; n.textContent='Pilot-operated check valve: a poppet on its seat seals drop-tight, so leakage ≈ 0 and the platform holds its height indefinitely. A ~33 bar pilot unseats it to lower.'; }
    else if(v===0){ n.className='note ok'; n.textContent='A perfect zero-leak spool would hold — but a real sliding fit at 100 bar always leaks at least a little.'; }
    else { n.className='note bad'; n.textContent=`Spool centre leaking ${Q} cm³/min: the piston sinks ${v.toFixed(3)} mm/s and breaches ±1 mm in ${t1.toFixed(1)} s. A block is not a seal.`; }
  }
  $('bSpool').onclick=()=>setMode('spool'); $('bPOCV').onclick=()=>setMode('pocv');
  $('leakRange').addEventListener('input',render);
  render();
</script>
</body>
</html>
