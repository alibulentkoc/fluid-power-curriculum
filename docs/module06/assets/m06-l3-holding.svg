<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Left: a spool centre holding the load. The spool blocks ports A and B but oil weeps through the few-micron sliding gap, and the piston creeps downward; labelled it leaks about 10 cubic centimetres per minute and drifts past plus or minus 1 millimetre in about 12 seconds. Right: a pilot-operated check valve at the cylinder cap port; a poppet pressed onto its seat seals drop-tight so the load is held with no drift, and a pilot line pressurised to about 33 bar unseats the poppet to lower the load on command. Below, a drift-versus-time chart: the spool line rises steadily out of the plus or minus 1 millimetre band within about 12 seconds while the pilot-operated check valve line stays flat on zero.">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient><marker id="rm" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#C2463B"/></marker><marker id="tm" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#0E7E8C"/></marker></defs>
<rect x="0" y="0" width="900" height="480" rx="20" fill="url(#bg)"/>
<text x="40" y="42" font-size="23" font-weight="700" fill="#0C2235">A block is not a seal</text>
<text x="40" y="64" font-size="13.5" fill="#586876">A spool centre leaks and the load drifts; a pilot-operated check valve seals drop-tight.</text>
<text x="60" y="104" font-size="11.5" font-weight="700" letter-spacing="1" fill="#C2463B">SPOOL CENTRE — blocks, but leaks</text>
<rect x="112" y="70" width="36" height="20" rx="2" fill="#DD841A"/>
<rect x="126" y="90" width="8" height="30" fill="#5B6B79"/>
<rect x="90" y="100" width="80" height="110" rx="4" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<rect x="92" y="145" width="76" height="63" fill="#1FB6AE" opacity="0.35"/>
<rect x="92" y="145" width="76" height="12" fill="#1B3A55"/>
<text x="130.0" y="194" font-size="8.5" fill="#0B5A63" text-anchor="middle">~100 bar</text>
<rect x="80" y="218" width="100" height="40" rx="5" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<line x1="130.0" y1="210" x2="130.0" y2="218" stroke="#1B3A55" stroke-width="2"/>
<text x="130.0" y="242" font-size="9" fill="#586876" text-anchor="middle">spool blocks A,B</text>
<line x1="164" y1="214" x2="188" y2="214" stroke="#C2463B" stroke-width="1.6" marker-end="url(#rm)"/>
<text x="190" y="217" font-size="8" fill="#9A2f27">weep</text>
<line x1="130.0" y1="150" x2="130.0" y2="175" stroke="#C2463B" stroke-width="2.5" marker-end="url(#rm)"/>
<text x="138.0" y="168" font-size="9" font-weight="700" fill="#9A2f27">creep</text>
<text x="130.0" y="276" font-size="10.5" font-weight="700" fill="#9A2f27" text-anchor="middle">~10 cc/min → past ±1mm in ~12 s</text>
<text x="490" y="104" font-size="11.5" font-weight="700" letter-spacing="1" fill="#0C6A5F">PILOT-OPERATED CHECK VALVE</text>
<rect x="542" y="70" width="36" height="20" rx="2" fill="#DD841A"/>
<rect x="556" y="90" width="8" height="30" fill="#5B6B79"/>
<rect x="520" y="100" width="80" height="110" rx="4" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<rect x="522" y="130" width="76" height="78" fill="#1FB6AE" opacity="0.35"/>
<rect x="522" y="130" width="76" height="12" fill="#1B3A55"/>
<text x="560.0" y="194" font-size="8.5" fill="#0B5A63" text-anchor="middle">~100 bar</text>
<rect x="510" y="218" width="100" height="44" rx="5" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<line x1="560.0" y1="210" x2="560.0" y2="218" stroke="#1B3A55" stroke-width="2"/>
<path d="M546.0,248 L560.0,230 L574.0,248" fill="none" stroke="#1B3A55" stroke-width="2"/>
<circle cx="560.0" cy="238" r="7" fill="#1FB6AE" stroke="#0C6A5F" stroke-width="1.5"/>
<text x="560.0" y="260" font-size="8.5" fill="#0B5A63" text-anchor="middle">poppet on seat</text>
<line x1="640" y1="238" x2="602" y2="238" stroke="#0E7E8C" stroke-width="2.5" stroke-dasharray="4 2" marker-end="url(#tm)"/>
<text x="642" y="234" font-size="9" font-weight="700" fill="#0B5A63">pilot</text>
<text x="642" y="245" font-size="9" fill="#0B5A63">~33 bar</text>
<text x="560.0" y="280" font-size="10.5" font-weight="700" fill="#0C6A5F" text-anchor="middle">drop-tight → no drift (holds)</text>
<text x="90" y="336" font-size="11" font-weight="700" letter-spacing="1" fill="#0E7E8C">DRIFT vs TIME</text>
<line x1="90" y1="440" x2="860" y2="440" stroke="#1B3A55" stroke-width="1.4"/>
<line x1="90" y1="440" x2="90" y2="350" stroke="#1B3A55" stroke-width="1.4"/>
<rect x="90" y="395" width="770" height="45" fill="#1FB6AE" opacity="0.10"/>
<line x1="90" y1="395" x2="860" y2="395" stroke="#0E7E8C" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="856" y="391" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="end">±1 mm tolerance</text>
<text x="90" y="454" font-size="9" fill="#586876" text-anchor="middle">0s</text>
<text x="347" y="454" font-size="9" fill="#586876" text-anchor="middle">10s</text>
<text x="603" y="454" font-size="9" fill="#586876" text-anchor="middle">20s</text>
<text x="860" y="454" font-size="9" fill="#586876" text-anchor="middle">30s</text>
<polyline points="90.0,440.0 115.7,436.2 141.3,432.4 167.0,428.5 192.7,424.7 218.3,420.9 244.0,417.1 269.7,413.2 295.3,409.4 321.0,405.6 346.7,401.8 372.3,397.9 398.0,394.1 423.7,390.3 449.3,386.4 475.0,382.6 500.7,378.8 526.3,375.0 552.0,371.1 577.7,367.3 603.3,363.5 629.0,359.7 654.7,355.9 680.3,352.0 706.0,350.0 731.7,350.0 757.3,350.0 783.0,350.0 808.7,350.0 834.3,350.0 860.0,350.0" fill="none" stroke="#C2463B" stroke-width="2.5"/>
<text x="757" y="354" font-size="10" font-weight="700" fill="#9A2f27">spool leak</text>
<circle cx="393" cy="395" r="4" fill="#C2463B"/><text x="393" y="413" font-size="8.5" fill="#9A2f27" text-anchor="middle">~12 s</text>
<line x1="90" y1="440" x2="860" y2="440" stroke="#0C6A5F" stroke-width="2.5"/>
<text x="757" y="434" font-size="10" font-weight="700" fill="#0C6A5F">POCV (flat)</text>
</svg>