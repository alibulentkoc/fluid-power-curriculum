<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Three panels showing a 4/3 directional control valve commanding a cylinder. Raise: pump port P connects to cap port A and rod port B drains to tank T, and the piston extends. Lower: P connects to rod port B and cap port A drains to T, and the piston retracts. Hold: all four ports P, T, A and B are blocked at the valve centre, and the piston is held. Below, a detail shows the valve as a controllable orifice: a spool edge opening a gap of area A(u) with a jet through it, governed by Q equals C_d times A(u) times the square root of two delta-p over rho, and noting that about 7.6 square millimetres passes 10 litres per minute at a 5 bar drop.">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient><marker id="tm" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#0E7E8C"/></marker><marker id="gm" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#8AA0AE"/></marker></defs>
<rect x="0" y="0" width="900" height="480" rx="20" fill="url(#bg)"/>
<text x="40" y="42" font-size="23" font-weight="700" fill="#0C2235">One valve, three commands</text>
<text x="40" y="64" font-size="13.5" fill="#586876">A 4/3 directional valve routes P, T, A, B to raise, lower, or hold — and its opening meters the flow.</text>
<text x="160" y="94" font-size="13" font-weight="700" fill="#1B3A55" text-anchor="middle">RAISE — P→A, B→T</text>
<rect x="60" y="110" width="180" height="44" rx="5" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<rect x="62" y="112" width="118" height="40" fill="#1FB6AE" opacity="0.4"/>
<rect x="180" y="112" width="12" height="40" fill="#1B3A55"/>
<rect x="192" y="128.0" width="66" height="8" fill="#5B6B79"/>
<rect x="258" y="120.0" width="16" height="24" rx="2" fill="#DD841A"/>
<text x="76" y="168" font-size="9.5" font-weight="700" fill="#1B3A55" text-anchor="middle">A</text>
<text x="224" y="168" font-size="9.5" font-weight="700" fill="#1B3A55" text-anchor="middle">B</text>
<rect x="70" y="250" width="180" height="54" rx="6" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<text x="110" y="320" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">P</text>
<text x="210" y="320" font-size="9.5" font-weight="700" fill="#586876" text-anchor="middle">T</text>
<line x1="110" y1="304" x2="110" y2="258" stroke="#0E7E8C" stroke-width="3.5" marker-end="url(#tm)"/>
<line x1="116" y1="250" x2="76" y2="154" stroke="#0E7E8C" stroke-width="3.5" marker-end="url(#tm)"/>
<line x1="224" y1="154" x2="204" y2="250" stroke="#8AA0AE" stroke-width="3.5" marker-end="url(#gm)"/>
<line x1="210" y1="258" x2="210" y2="304" stroke="#8AA0AE" stroke-width="3.5" marker-end="url(#gm)"/>
<text x="450" y="94" font-size="13" font-weight="700" fill="#1B3A55" text-anchor="middle">LOWER — P→B, A→T</text>
<rect x="350" y="110" width="180" height="44" rx="5" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<rect x="412" y="112" width="116" height="40" fill="#1FB6AE" opacity="0.4"/>
<rect x="400" y="112" width="12" height="40" fill="#1B3A55"/>
<rect x="412" y="128.0" width="136" height="8" fill="#5B6B79"/>
<rect x="548" y="120.0" width="16" height="24" rx="2" fill="#DD841A"/>
<text x="366" y="168" font-size="9.5" font-weight="700" fill="#1B3A55" text-anchor="middle">A</text>
<text x="514" y="168" font-size="9.5" font-weight="700" fill="#1B3A55" text-anchor="middle">B</text>
<rect x="360" y="250" width="180" height="54" rx="6" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<text x="400" y="320" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">P</text>
<text x="500" y="320" font-size="9.5" font-weight="700" fill="#586876" text-anchor="middle">T</text>
<line x1="400" y1="304" x2="400" y2="258" stroke="#0E7E8C" stroke-width="3.5" marker-end="url(#tm)"/>
<line x1="406" y1="250" x2="514" y2="154" stroke="#0E7E8C" stroke-width="3.5" marker-end="url(#tm)"/>
<line x1="366" y1="154" x2="494" y2="250" stroke="#8AA0AE" stroke-width="3.5" marker-end="url(#gm)"/>
<line x1="500" y1="258" x2="500" y2="304" stroke="#8AA0AE" stroke-width="3.5" marker-end="url(#gm)"/>
<text x="740" y="94" font-size="13" font-weight="700" fill="#1B3A55" text-anchor="middle">HOLD — centre blocked</text>
<rect x="640" y="110" width="180" height="44" rx="5" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<rect x="725" y="112" width="12" height="40" fill="#1B3A55"/>
<rect x="737" y="128.0" width="101" height="8" fill="#5B6B79"/>
<rect x="838" y="120.0" width="16" height="24" rx="2" fill="#DD841A"/>
<text x="656" y="168" font-size="9.5" font-weight="700" fill="#1B3A55" text-anchor="middle">A</text>
<text x="804" y="168" font-size="9.5" font-weight="700" fill="#1B3A55" text-anchor="middle">B</text>
<rect x="650" y="250" width="180" height="54" rx="6" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2"/>
<text x="690" y="320" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">P</text>
<text x="790" y="320" font-size="9.5" font-weight="700" fill="#586876" text-anchor="middle">T</text>
<line x1="656" y1="154" x2="656" y2="250" stroke="#B9C7D1" stroke-width="3"/>
<line x1="648" y1="244" x2="664" y2="244" stroke="#C2463B" stroke-width="3"/>
<line x1="804" y1="154" x2="804" y2="250" stroke="#B9C7D1" stroke-width="3"/>
<line x1="796" y1="244" x2="812" y2="244" stroke="#C2463B" stroke-width="3"/>
<text x="740" y="282" font-size="11" font-weight="700" fill="#9A2f27" text-anchor="middle">all ports blocked</text>
<rect x="40" y="345" width="820" height="112" rx="12" fill="#FFFFFF" stroke="#D3DDE6"/>
<text x="60" y="372" font-size="11.5" font-weight="700" letter-spacing="1" fill="#0E7E8C">THE VALVE IS A CONTROLLABLE ORIFICE</text>
<rect x="70" y="392" width="120" height="24" fill="#9FB6C2" stroke="#1B3A55"/>
<rect x="250" y="392" width="120" height="24" fill="#9FB6C2" stroke="#1B3A55"/>
<line x1="190" y1="404" x2="250" y2="404" stroke="#0E7E8C" stroke-width="6" marker-end="url(#tm)"/>
<text x="220" y="386" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">opening A(u)</text>
<text x="220" y="432" font-size="9" fill="#586876" text-anchor="middle">jet ~34 m/s</text>
<text x="410" y="404" font-size="15" fill="#0C2235" font-family="'IBM Plex Mono',monospace">Q = C_d · A(u) · √(2·Δp/ρ)</text>
<rect x="620" y="384" width="228" height="40" rx="8" fill="#13314A"/>
<text x="734" y="400" font-size="10.5" font-weight="700" fill="#7FD7D0" text-anchor="middle">7.6 mm² opening</text>
<text x="734" y="415" font-size="10.5" fill="#fff" text-anchor="middle">→ 10 L/min at 5 bar drop</text>
</svg>