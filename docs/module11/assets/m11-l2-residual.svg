<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="The residual signal and its statistics. Left: the healthy residual over time as a fuzzy band jittering around a small nonzero mean, with plus or minus one and three sigma envelopes and a threshold at three sigma. Right top: the k-sigma trade-off, false-alarm rate falling from 4.6 percent at 2 sigma to 0.27 percent at 3 sigma to 0.01 percent at 4 sigma. Right bottom: filtering - a raw noisy residual and a smooth averaged version with a much narrower band, so a slow drift rises above the tightened threshold.">
