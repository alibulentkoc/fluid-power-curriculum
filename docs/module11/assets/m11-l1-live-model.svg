<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="The live digital model beside the machine. A command u feeds both the real platform (producing a measured position) and the live digital model (producing a predicted position). The two are subtracted to form the residual. Two residual traces: a healthy one flat near zero at sensor-noise level ~0.07 mm; and a faulty one flat until a leak develops partway, then climbing past a threshold and raising a flag. Same command to both; small residual means behaving as designed, growing residual means something changed.">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#1B3A55"/></marker></defs>
<rect width="760" height="430" rx="16" fill="#F7F9FB"/>
<text x="30" y="36" font-size="20" font-weight="700" fill="#0C2235">The live digital model</text>
<text x="30" y="57" font-size="12.5" fill="#586876">Run the validated model beside the machine on the same command — the gap is a health signal.</text>
<text x="34" y="144" font-size="11" font-weight="700" fill="#1B3A55">command u</text>
<circle cx="116" cy="140" r="3" fill="#1B3A55"/>
<line x1="116" y1="140" x2="116" y2="95" stroke="#1B3A55" stroke-width="1.6"/><line x1="116" y1="95" x2="158" y2="95" stroke="#1B3A55" stroke-width="1.6" marker-end="url(#a)"/>
<line x1="116" y1="140" x2="116" y2="185" stroke="#1B3A55" stroke-width="1.6"/><line x1="116" y1="185" x2="158" y2="185" stroke="#1B3A55" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="160" y="76" width="130" height="38" rx="9" fill="#EEF4F7" stroke="#1B3A55" stroke-width="1.8"/><text x="225.0" y="95.0" font-size="11" font-weight="700" fill="#0C2235" text-anchor="middle">real platform</text><text x="225.0" y="111.0" font-size="9" fill="#8AA0AE" text-anchor="middle">steel &amp; oil</text>
<rect x="160" y="166" width="130" height="38" rx="9" fill="#EAF6F5" stroke="#0E7E8C" stroke-width="1.8"/><text x="225.0" y="185.0" font-size="11" font-weight="700" fill="#0C2235" text-anchor="middle">live model</text><text x="225.0" y="201.0" font-size="9" fill="#8AA0AE" text-anchor="middle">validated eqns</text>
<line x1="290" y1="95" x2="360" y2="95" stroke="#1B3A55" stroke-width="1.6" marker-end="url(#a)"/><text x="300" y="89" font-size="9" fill="#586876">measured x</text>
<line x1="290" y1="185" x2="360" y2="185" stroke="#0E7E8C" stroke-width="1.6" marker-end="url(#a)"/><text x="300" y="198" font-size="9" fill="#0E7E8C">predicted x</text>
<circle cx="378" cy="140" r="16" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/><text x="378" y="145" font-size="15" font-weight="700" fill="#1B3A55" text-anchor="middle">−</text>
<line x1="360" y1="95" x2="372" y2="130" stroke="#1B3A55" stroke-width="1.4"/><line x1="360" y1="185" x2="372" y2="150" stroke="#0E7E8C" stroke-width="1.4"/>
<line x1="394" y1="140" x2="420" y2="140" stroke="#1B3A55" stroke-width="1.6" marker-end="url(#a)"/><text x="407" y="134" font-size="10" font-weight="700" fill="#DD841A">r</text>
<text x="378" y="174" font-size="8.5" fill="#8AA0AE" text-anchor="middle">residual = measured − predicted</text>
<text x="430" y="84" font-size="10.5" font-weight="700" fill="#0E7E8C">RESIDUAL over time</text>
