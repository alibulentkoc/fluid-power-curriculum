<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Detecting and diagnosing faults</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--red:#C0392B;--green:#0B6A3B;--purple:#6B4FA0;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row button{flex:1 1 0;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:13px;font-weight:700;padding:10px 6px;border-radius:9px;cursor:pointer}
.row button:hover{border-color:var(--teal)}.row button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
.gauges{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.g{flex:1 1 120px;border-radius:12px;padding:14px 12px;border:1.5px solid var(--line);background:var(--bg);text-align:center}
.g .lbl{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate);font-weight:700}
.g .st{font-size:20px;font-weight:800;margin-top:6px}
.g .ds{font-size:10px;color:var(--slate);margin-top:2px}
.g.normal{border-color:#BFE6CF;background:#EEF7F0}.g.normal .st{color:var(--green)}
.g.alert{border-color:#F0C4BC;background:#FBEAE7}.g.alert .st{color:var(--red)}
.g.warn{border-color:#EBD6A8;background:#FCF3E2}.g.warn .st{color:#9A6212}
.cross{margin-top:14px;font-size:13px;font-weight:700;padding:10px 13px;border-radius:10px;border:1px solid}
.cons{background:#EEF4F7;color:#0C2235;border-color:#D3DDE6}
.incons{background:#FBEAE7;color:var(--red);border-color:#F0C4BC}
.diag{margin-top:12px;font-size:14px;font-weight:800;padding:12px 14px;border-radius:10px;background:#0C6A74;color:#fff}
</style></head>
<body><div class="wrap">
<h1>Detecting and diagnosing faults</h1>
<p class="sub">Inject a fault and read its fingerprint across the three residuals. The pattern — plus the position/pressure cross-check — names the cause.</p>
<div class="card">
<div class="row">
  <button id="healthy" class="active">Healthy</button>
  <button id="leak">Leak</button>
  <button id="friction">Friction</button>
  <button id="air">Entrained air</button>
  <button id="sensor">Sensor fault</button>
</div>
<div class="gauges">
  <div class="g normal" id="gpos"><div class="lbl">Position residual</div><div class="st" id="spos">—</div><div class="ds" id="dpos"></div></div>
  <div class="g normal" id="gpre"><div class="lbl">Pressure residual</div><div class="st" id="spre">—</div><div class="ds" id="dpre"></div></div>
  <div class="g normal" id="gres"><div class="lbl">Resonance</div><div class="st" id="sres">—</div><div class="ds" id="dres"></div></div>
</div>
<div class="cross" id="cross"></div>
<div class="diag" id="diag"></div>
</div></div>
<script>
  var $=function(id){return document.getElementById(id);};
  var F={
    healthy:{pos:['normal','—','on model'],pre:['normal','—','on model'],res:['normal','12 Hz',''],cons:true,
             diag:'Healthy — all three residuals sit on the model. No fault.'},
    leak:{pos:['alert','↓','sags'],pre:['warn','↓','hold drops'],res:['normal','12 Hz',''],cons:true,
          diag:'Internal leak — position sags and holding pressure bleeds away, resonance untouched. A real fault: inspect seals/lines.'},
    friction:{pos:['warn','~','sluggish'],pre:['alert','↑','+10 bar'],res:['normal','12 Hz',''],cons:true,
              diag:'Added friction — extra pressure needed to move (F=pA), response lags; resonance normal. A real fault: seal drag.'},
    air:{pos:['warn','~','ringing'],pre:['normal','—','near normal'],res:['alert','8 Hz','12→8 Hz'],cons:true,
         diag:'Entrained air — the oil spring softened, so resonance dropped 12→8 Hz; position/pressure near normal. Real fault: bleed the air.'},
    sensor:{pos:['alert','↑','jumps'],pre:['normal','—','normal'],res:['normal','12 Hz',''],cons:false,
            diag:'SENSOR FAULT — position jumped but pressure says the load is normal. The signals contradict, so the sensor is lying, not the machine. Do NOT command a corrective move.'}
  };
  function set(mode){
    var f=F[mode];
    [['pos','gpos','spos','dpos'],['pre','gpre','spre','dpre'],['res','gres','sres','dres']].forEach(function(m){
      var s=f[m[0]]; $(m[1]).className='g '+s[0]; $(m[2]).textContent=s[1]; $(m[3]).textContent=s[2];
    });
    var c=$('cross');
    if(f.cons){c.className='cross cons';c.textContent='Cross-check: position and pressure agree — consistent with a real machine fault.';}
    else{c.className='cross incons';c.textContent='Cross-check: position fired but pressure is normal — INCONSISTENT. A real move would change the load-bearing pressure, so this contradiction points to the sensor.';}
    $('diag').textContent='Diagnosis: '+f.diag;
    ['healthy','leak','friction','air','sensor'].forEach(function(k){$(k).classList.toggle('active',k===mode);});
  }
  ['healthy','leak','friction','air','sensor'].forEach(function(k){$(k).addEventListener('click',function(){set(k);});});
  set('healthy');
</script>
</body></html>
