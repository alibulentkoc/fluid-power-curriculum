<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · The monitored platform</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--red:#C0392B;--green:#0B6A3B;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto}
.ctrl{margin-top:12px}.ctrl label{font-size:13px;font-weight:700;color:var(--slate)}
input[type=range]{width:100%;accent-color:#0C6A74;margin-top:5px}
.reads{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.read{flex:1 1 110px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.read .k{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
.read .v{font-size:17px;font-weight:800;font-family:var(--mono);color:#0C2235}
.verdict{margin-top:14px;font-size:13.5px;font-weight:700;padding:11px 14px;border-radius:10px;border:1px solid;background:#E8F3EC;color:var(--green);border-color:#BFE6CF}
</style></head>
<body><div class="wrap">
<h1>The monitored platform</h1>
<p class="sub">The complete machine vs a developing seal leak. The controller holds ±1 mm the whole time; the monitor catches the leak early and gives lead time before the hold would fail.</p>
<div class="card">
<svg viewBox="0 0 660 250" xmlns="http://www.w3.org/2000/svg">
  <text x="40" y="12" font-size="8.5" font-weight="700" fill="#0B6A3B">POSITION (holds ±1 mm)</text>
  <line x1="46" y1="18" x2="46" y2="230" stroke="#1B3A55" stroke-width="1.3"/>
  <line x1="46" y1="230" x2="640" y2="230" stroke="#1B3A55" stroke-width="1.3"/>
  <rect x="46" y="42" width="594" height="20" fill="#E8F3EC"/>
  <line x1="46" y1="52" x2="640" y2="52" stroke="#0B6A3B" stroke-width="0.8" stroke-dasharray="3 2"/>
  <polyline id="pos" points="" fill="none" stroke="#1B3A55" stroke-width="1.8"/>
  <text x="50" y="150" font-size="8.5" font-weight="700" fill="#C0392B">leak rate →</text>
  <polyline id="leak" points="" fill="none" stroke="#C0392B" stroke-width="1.8"/>
  <line id="detl" x1="0" y1="18" x2="0" y2="230" stroke="#DD841A" stroke-width="1.4" stroke-dasharray="3 2"/>
  <text id="dett" x="0" y="30" font-size="9" font-weight="700" fill="#DD841A">DETECTED</text>
  <line id="faill" x1="0" y1="18" x2="0" y2="230" stroke="#C0392B" stroke-width="1.6"/>
  <text id="failt" x="0" y="30" font-size="9" font-weight="700" fill="#C0392B" text-anchor="end">FAILS</text>
  <text x="636" y="246" font-size="9" fill="#586876" text-anchor="end">time →</text>
</svg>
<div class="ctrl"><label>Leak growth rate = <span id="albl">2.0</span> (mm/s per s)</label>
<input id="acc" type="range" min="1" max="5" step="0.5" value="2.0"/></div>
<div class="reads">
  <div class="read"><div class="k">Detected at</div><div class="v" id="rdet">—</div></div>
  <div class="read"><div class="k">Would fail at</div><div class="v" id="rfail">—</div></div>
  <div class="read"><div class="k">Lead time</div><div class="v" id="rlead">—</div></div>
</div>
<div class="verdict" id="verdict"></div>
</div></div>
<script>
  var vmax=85,dt=1e-3,target=300,Kp=0.15,Ki=0.4,Kd=0.01,L_max=50,$=function(id){return document.getElementById(id);};
  function run(acc){
    var x=target,I=0,eprev=0,t=0,T=30,pos=[],leak=[],det=null,fail=null,le=0;
    while(t<T){ var lk=acc*t; var e=target-x; I+=e*dt; var de=(e-eprev)/dt; eprev=e;
      var u=Math.max(-1,Math.min(1,Kp*e+Ki*I+Kd*de)); x+=(vmax*u-lk)*dt; t+=dt;
      le+=5.0*(u*vmax-le)*dt;
      if(det===null&&le>2.0) det={t:t,leak:lk};
      if(fail===null&&lk>=L_max) fail={t:t,leak:lk};
      if(pos.length===0||t-pos[pos.length-1][0]>=0.05){pos.push([t,x]);leak.push([t,lk]);}
    }
    return {pos:pos,leak:leak,det:det,fail:fail,T:T};
  }
  function draw(){
    var acc=+$('acc').value; $('albl').textContent=acc.toFixed(1);
    var r=run(acc), T=r.T;
    function PX(t){return 46+(t/T)*594;}
    function PYpos(x){return 52-(x-target)*6;}          // top band
    function PYleak(v){return 226-(v/L_max)*150;}       // lower
    $('pos').setAttribute('points', r.pos.map(function(q){return PX(q[0]).toFixed(1)+','+Math.max(20,Math.min(228,PYpos(q[1]))).toFixed(1);}).join(' '));
    $('leak').setAttribute('points', r.leak.map(function(q){return PX(q[0]).toFixed(1)+','+PYleak(q[1]).toFixed(1);}).join(' '));
    if(r.det){$('detl').setAttribute('x1',PX(r.det.t));$('detl').setAttribute('x2',PX(r.det.t));$('dett').setAttribute('x',PX(r.det.t)+3);}
    if(r.fail){$('faill').setAttribute('x1',PX(r.fail.t));$('faill').setAttribute('x2',PX(r.fail.t));$('failt').setAttribute('x',PX(r.fail.t)-3);}
    $('rdet').textContent=r.det?(r.det.t.toFixed(1)+' s'):'—';
    $('rfail').textContent=r.fail?(r.fail.t.toFixed(1)+' s'):'>30 s';
    var lead=(r.det&&r.fail)?(r.fail.t-r.det.t):null;
    $('rlead').textContent=lead?(lead.toFixed(1)+' s'):'—';
    var pct=r.det&&r.fail?Math.round(r.det.leak/r.fail.leak*100):0;
    $('verdict').textContent='The platform holds ±1 mm the entire time (flat, top). The monitor detects the leak at '+r.det.t.toFixed(1)+' s — only ~'+pct+'% of the failure level — diagnoses it, and quantifies the rate, giving '+(lead?lead.toFixed(0):'—')+' s of lead time ('+(lead?Math.round(lead/r.det.t):'—')+'× the detection time) for a planned repair before the hold ever breaks.';
  }
  $('acc').addEventListener('input',draw); draw();
</script>
</body></html>
