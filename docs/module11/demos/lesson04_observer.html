<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Estimating hidden state</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--red:#C0392B;--green:#0B6A3B;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto}
.ctrl{margin-top:12px}.ctrl label{font-size:13px;font-weight:700;color:var(--slate)}
input[type=range]{width:100%;accent-color:#0C6A74;margin-top:5px}
.reads{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.read{flex:1 1 110px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.read .k{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
.read .v{font-size:17px;font-weight:800;font-family:var(--mono);color:#0C2235}
.verdict{margin-top:14px;font-size:13.5px;font-weight:700;padding:11px 14px;border-radius:10px;border:1px solid}
.ok{background:#E8F3EC;color:var(--green);border-color:#BFE6CF}
.warn{background:#FCF3E2;color:#9A6212;border-color:#EBD6A8}
</style></head>
<body><div class="wrap">
<h1>Estimating hidden state</h1>
<p class="sub">The observer starts 50 mm wrong and corrects itself from the measurement. Tune the gain to trade smooth (trust the model) against fast (trust the measurement).</p>
<div class="card">
<svg viewBox="0 0 660 210" xmlns="http://www.w3.org/2000/svg">
  <text x="40" y="13" font-size="9.5" font-weight="700" fill="#586876">ESTIMATE ERROR (mm)</text>
  <line x1="46" y1="18" x2="46" y2="186" stroke="#1B3A55" stroke-width="1.3"/>
  <line x1="46" y1="186" x2="640" y2="186" stroke="#1B3A55" stroke-width="1.3"/>
  <line id="zero" x1="46" y1="150" x2="640" y2="150" stroke="#0B6A3B" stroke-width="0.9" stroke-dasharray="4 3"/>
  <text x="636" y="146" font-size="9" fill="#0B6A3B" text-anchor="end">true (error 0)</text>
  <polyline id="curve" points="" fill="none" stroke="#1B3A55" stroke-width="2"/>
  <text x="636" y="204" font-size="9" fill="#586876" text-anchor="end">time →</text>
</svg>
<div class="ctrl"><label>Observer gain L = <span id="llbl">8</span></label>
<input id="l" type="range" min="1" max="40" step="1" value="8"/></div>
<div class="reads">
  <div class="read"><div class="k">Converges in</div><div class="v" id="rconv">—</div></div>
  <div class="read"><div class="k">Est. noise (settled)</div><div class="v" id="rnoise">—</div></div>
  <div class="read"><div class="k">Velocity vs diff.</div><div class="v" id="rvel" style="font-size:13px">—</div></div>
</div>
<div class="verdict" id="verdict"></div>
</div></div>
<script>
  var vmax=85,dt=1e-3,sigma=0.02,$=function(id){return document.getElementById(id);};
  function rng(s){return function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}
  function gauss(r){var s=0;for(var i=0;i<12;i++)s+=r();return s-6;}
  function run(L){
    var r=rng(4), xt=0,xh=50,t=0,T=6,pts=[],conv=null,settled=[];
    while(t<T){ var u=Math.max(-1,Math.min(1,0.02*(300-xt))); xt+=vmax*u*dt;
      var y=xt+gauss(r)*sigma; xh+=vmax*u*dt+L*(y-xh)*dt;
      var e=xh-xt;
      if(conv===null&&Math.abs(e)<0.1) conv=t;
      if(t>5.0) settled.push(e);
      if(pts.length===0||t-pts[pts.length-1][0]>=0.015) pts.push([t,e]);
      t+=dt;
    }
    var m=settled.reduce(function(a,b){return a+b;},0)/settled.length;
    var nz=Math.sqrt(settled.reduce(function(a,b){return a+(b-m)*(b-m);},0)/settled.length);
    return {pts:pts,conv:conv,noise:nz};
  }
  function draw(){
    var L=+$('l').value; $('llbl').textContent=L;
    var r=run(L), T=6;
    function PX(t){return 46+(t/T)*594;} function PY(e){return 150-(e/55)*130;}
    $('curve').setAttribute('points', r.pts.map(function(q){return PX(q[0]).toFixed(1)+','+Math.max(6,Math.min(200,PY(q[1]))).toFixed(1);}).join(' '));
    $('curve').setAttribute('stroke', L>20?'#C0392B':(L<4?'#8AA0AE':'#1B3A55'));
    $('rconv').textContent=(r.conv!==null?r.conv.toFixed(2):'>4')+' s';
    $('rnoise').textContent=r.noise.toFixed(3)+' mm';
    var vdiff=Math.round(sigma*Math.SQRT2/dt);
    $('rvel').textContent='obs clean vs '+vdiff+' mm/s';
    var vd=$('verdict');
    if(L>20){vd.className='verdict warn';vd.textContent='High gain (L='+L+'): converges fast ('+r.conv.toFixed(2)+' s) but measurement noise leaks into the estimate ('+r.noise.toFixed(3)+' mm jitter). Good if the sensor is clean; otherwise back off.';}
    else if(L<4){vd.className='verdict warn';vd.textContent='Low gain (L='+L+'): very smooth (noise '+r.noise.toFixed(3)+' mm) but slow to correct ('+(r.conv!==null?r.conv.toFixed(2)+' s':'>4 s')+'). It trusts the model and corrects errors sluggishly.';}
    else {vd.className='verdict ok';vd.textContent='Balanced (L='+L+'): converges from the 50 mm error in '+r.conv.toFixed(2)+' s with low noise ('+r.noise.toFixed(3)+' mm). And velocity comes clean from the model state — vs '+vdiff+' mm/s if you differentiated the noisy position. The Kalman filter sets this balance optimally.';}
  }
  $('l').addEventListener('input',draw); draw();
</script>
</body></html>
