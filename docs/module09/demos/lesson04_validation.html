<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Validating the model</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--red:#C0392B;--green:#0B6A3B;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto}
.ctrl{margin-top:14px}.ctrl label{font-size:13px;font-weight:700;color:var(--slate)}
input[type=range]{width:100%;accent-color:#0C6A74;margin-top:6px}
.reads{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.read{flex:1 1 130px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.read .k{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
.read .v{font-size:18px;font-weight:800;font-family:var(--mono);color:#0C2235}
.verdict{margin-top:14px;font-size:13.5px;font-weight:700;padding:11px 14px;border-radius:10px;border:1px solid}
.ok{background:#E8F3EC;color:var(--green);border-color:#BFE6CF}
.mid{background:#FCF3E2;color:#9A6212;border-color:#EBD6A8}
.bad{background:#FBEAE7;color:var(--red);border-color:#F0C4BC}
.btn{margin-top:10px;background:var(--bg);border:1px solid var(--line);color:var(--ink);font-family:var(--sans);font-size:13px;font-weight:700;padding:9px 14px;border-radius:9px;cursor:pointer}
.btn:hover{border-color:var(--teal)}
</style></head>
<body><div class="wrap">
<h1>Validating the model</h1>
<p class="sub">The measured platform rings at 8 Hz — softer than pure-oil theory. Tune the effective bulk modulus and friction until the model overlays the data.</p>
<div class="card">
<svg viewBox="0 0 660 240" xmlns="http://www.w3.org/2000/svg">
  <line x1="40" y1="20" x2="40" y2="200" stroke="#1B3A55" stroke-width="1.3"/>
  <line x1="40" y1="200" x2="640" y2="200" stroke="#1B3A55" stroke-width="1.3"/>
  <text x="636" y="220" font-size="9.5" fill="#586876" text-anchor="end">time (0.5 s) →</text>
  <line x1="40" y1="70" x2="640" y2="70" stroke="#0B6A3B" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="44" y="66" font-size="9" fill="#0B6A3B">target</text>
  <polyline id="meas" points="" fill="none" stroke="#0E7E8C" stroke-width="2.4"/>
  <polyline id="model" points="" fill="none" stroke="#DD841A" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="470" y1="24" x2="490" y2="24" stroke="#0E7E8C" stroke-width="2.4"/><text x="494" y="27" font-size="9.5" fill="#1B3A55">measured</text>
  <line x1="470" y1="40" x2="490" y2="40" stroke="#DD841A" stroke-width="2" stroke-dasharray="5 3"/><text x="494" y="43" font-size="9.5" fill="#1B3A55">model</text>
</svg>
<div class="ctrl"><label>Model effective bulk modulus β_eff = <span id="blbl">1.80</span> GPa  →  model rings at <span id="fnlbl">12.2</span> Hz</label>
<input id="beta" type="range" min="0.40" max="2.00" step="0.01" value="1.80"/></div>
<div class="ctrl"><label>Model friction (damping ratio ζ) = <span id="zlbl">0.06</span></label>
<input id="zeta" type="range" min="0.04" max="0.40" step="0.01" value="0.06"/></div>
<button class="btn" id="auto">Snap to identified values (0.77 GPa, ζ 0.12)</button>
<div class="reads">
  <div class="read"><div class="k">Model resonance</div><div class="v" id="rfn">—</div></div>
  <div class="read"><div class="k">Measured</div><div class="v">8.0 Hz</div></div>
  <div class="read"><div class="k">Fit error (RMS)</div><div class="v" id="rerr">—</div></div>
</div>
<div class="verdict" id="verdict"></div>
</div></div>
<script>
  var f0=12.2, beta0=1.8, $=function(id){return document.getElementById(id);};
  var MEAS_F=8.0, MEAS_Z=0.12, T=0.5, N=140;
  function resp(f,zeta){var wn=2*Math.PI*f, wd=wn*Math.sqrt(1-zeta*zeta), a=[]; for(var i=0;i<=N;i++){var t=T*i/N; a.push(1-Math.exp(-zeta*wn*t)*Math.cos(wd*t));} return a;}
  var measArr=resp(MEAS_F,MEAS_Z);
  function draw(){
    var beta=+$('beta').value, zeta=+$('zeta').value, fn=f0*Math.sqrt(beta/beta0);
    $('blbl').textContent=beta.toFixed(2); $('zlbl').textContent=zeta.toFixed(2); $('fnlbl').textContent=fn.toFixed(1);
    var modelArr=resp(fn,zeta);
    function PX(i){return 40+(i/N)*600;} function PY(x){return 200-x*130;}
    $('meas').setAttribute('points', measArr.map(function(x,i){return PX(i).toFixed(1)+','+PY(x).toFixed(1);}).join(' '));
    $('model').setAttribute('points', modelArr.map(function(x,i){return PX(i).toFixed(1)+','+PY(x).toFixed(1);}).join(' '));
    var se=0; for(var i=0;i<=N;i++){var d=modelArr[i]-measArr[i]; se+=d*d;} var rms=Math.sqrt(se/(N+1));
    $('rfn').textContent=fn.toFixed(1)+' Hz'; $('rerr').textContent=rms.toFixed(3);
    var vd=$('verdict');
    if(rms<0.03){vd.className='verdict ok';vd.textContent='Validated: model resonance '+fn.toFixed(1)+' Hz and decay match the measured 8 Hz data (error '+rms.toFixed(3)+'). β_eff ≈ 0.77 GPa reveals entrained air softening the oil. Trust it within the tested range.';}
    else if(rms<0.12){vd.className='verdict mid';vd.textContent='Close. Frequency '+(Math.abs(fn-MEAS_F)<0.4?'matches':'still off ('+fn.toFixed(1)+' vs 8 Hz — adjust β_eff)')+'; fine-tune the damping to match the decay. Error '+rms.toFixed(3)+'.';}
    else {vd.className='verdict bad';vd.textContent='Mismatch (error '+rms.toFixed(3)+'). The model rings at '+fn.toFixed(1)+' Hz but the data rings at 8 Hz — lower β_eff to soften the oil, then match the decay with friction.';}
  }
  $('beta').addEventListener('input',draw); $('zeta').addEventListener('input',draw);
  $('auto').addEventListener('click',function(){$('beta').value=(beta0*Math.pow(MEAS_F/f0,2)).toFixed(2);$('zeta').value=MEAS_Z.toFixed(2);draw();});
  draw();
</script>
</body></html>
