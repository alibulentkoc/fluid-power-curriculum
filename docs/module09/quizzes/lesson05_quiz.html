<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Knowledge check · Simulating the mission</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal-soft:#ECFAF8;--green:#1B8A5A;--green-soft:#E7F6EE;--red:#C2463B;--red-soft:#FBECEA;
    --sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.55}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:13.5px;margin:0 0 8px}
  .banner{font-size:12.5px;background:var(--teal-soft);color:var(--teal);border:1px solid #9FE0DA;border-radius:10px;padding:10px 14px;margin:0 0 22px}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(12,34,53,.05)}
  .q .num{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--teal)}
  .q .stem{font-size:15px;font-weight:600;margin:6px 0 14px}
  .opt{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:9px;font-family:var(--sans);font-size:14px;color:var(--ink);cursor:pointer;transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--teal)}
  .opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green);font-weight:600}
  .opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .opt:disabled{cursor:default}
  .fb{font-size:13px;margin-top:8px;padding:10px 12px;border-radius:9px;display:none}
  .fb.show{display:block}.fb.ok{background:var(--green-soft);color:var(--green)}.fb.no{background:var(--red-soft);color:var(--red)}
  .score{position:sticky;bottom:14px;background:#0C2235;color:#fff;border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-top:8px;box-shadow:0 4px 16px rgba(12,34,53,.25)}
  .score b{font-size:18px}
  .retry{background:none;border:1px solid #3a5670;color:#cfe0ec;font-family:var(--sans);font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer}
  .retry:hover{border-color:#7FD7D0;color:#7FD7D0}
</style>
</head>
<body>
<div class="wrap">
  <h1>Knowledge check — Simulating the mission</h1>
  <p class="sub">Module 09 · Lesson 05</p>
  <p class="banner">Check your understanding — unlimited attempts, immediate feedback, not graded.</p>
  <div id="quiz"></div>
  <div class="score"><span>Answered <b id="done">0</b> / 5 &nbsp;·&nbsp; Correct <b id="right">0</b></span>
    <button class="retry" id="retry">Start over</button></div>
</div>
<script>
const QUESTIONS=[
  {stem:"What does simulating the mission answer, and what are the three limits it checks?",
   opts:["only the cost","whether the platform makes the lift — checking arrival time, peak pressure (vs the relief), and flow (vs the pump)","only the arrival time","the color of the oil"], correct:1,
   why:"The mission run certifies feasibility against three limits: does it arrive in time, does the pressure stay under the 115 bar relief, and does the flow stay within the 10 L/min pump."},
  {stem:"What arrival time does the raise give, and why is it flow-limited?",
   opts:["1 s; force-limited","~6 s for 500 mm; the pump sets the speed (85 mm/s = 10 L/min ÷ area), so the lift is limited by flow, not force","20 s; pressure-limited","instant"], correct:1,
   why:"At full command the speed is the pump's full flow over the piston area, 85 mm/s, so 500 mm takes ~6 s. The platform is flow-limited — more force would not make it faster."},
  {stem:"How high does the pressure peak, and what is the margin to the relief?",
   opts:["150 bar; over the relief","~105 bar during the soft-start acceleration, then ~102 bar to cruise — about 10 bar under the 115 bar relief","exactly 115 bar","0 bar"], correct:1,
   why:"Accelerating the mass needs a little extra pressure (~105 bar); cruising needs ~102 bar. Both sit comfortably below the 115 bar relief, a healthy 10 bar margin."},
  {stem:"Why does the flow sit exactly at the pump limit, and what does that confirm?",
   opts:["a design error","at full command the piston sweeps 10 L/min at 85 mm/s — exactly the pump's output; riding at the limit confirms the pump is correctly sized for the target speed","the pump is too big","the relief is open"], correct:1,
   why:"Flow = area × speed = 10 L/min = the pump's full output. Sitting right at the limit (not under, not over) confirms the pump is sized right — no shortfall, no waste."},
  {stem:"Why can't the open-loop platform hold ±1 mm, and what fixes it?",
   opts:["it can hold it easily","a few percent of speed drift (temperature, friction) over the ~6 s move smears the arrival by ~15 mm; open-loop timing can't self-correct — closing the loop with position feedback (Module 10) fixes it","the sensor is broken; buy a new one","nothing can fix it"], correct:1,
   why:"Open-loop, the platform stops on a timer, not on a measurement, so ~3% drift becomes ~15 mm of error. Only feedback — comparing measured position to the target and correcting — holds ±1 mm."}
];
const quiz=document.getElementById('quiz'),doneEl=document.getElementById('done'),rightEl=document.getElementById('right');
let answered,correctCount;
function render(){
  answered=new Array(QUESTIONS.length).fill(false);correctCount=0;doneEl.textContent='0';rightEl.textContent='0';quiz.innerHTML='';
  QUESTIONS.forEach((q,qi)=>{const card=document.createElement('div');card.className='q';
    card.innerHTML=`<div class="num">Question ${qi+1}</div><div class="stem">${q.stem}</div>`;
    const order=q.opts.map((_,i)=>i);for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=order[i];order[i]=order[j];order[j]=t;}q._opts=order.map(i=>q.opts[i]);q._correct=order.indexOf(q.correct);q._opts.forEach((o,oi)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=o;b.onclick=()=>choose(qi,oi,card,q);card.appendChild(b);});
    const fb=document.createElement('div');fb.className='fb';card.appendChild(fb);quiz.appendChild(card);});
}
function choose(qi,oi,card,q){
  if(answered[qi])return;answered[qi]=true;
  const btns=card.querySelectorAll('.opt');btns.forEach((b,i)=>{b.disabled=true;if(i===q._correct)b.classList.add('correct');});
  const fb=card.querySelector('.fb');
  if(oi===q._correct){correctCount++;fb.className='fb show ok';fb.innerHTML='Correct. '+q.why;}
  else{btns[oi].classList.add('wrong');fb.className='fb show no';fb.innerHTML='Not quite. '+q.why;}
  doneEl.textContent=answered.filter(Boolean).length;rightEl.textContent=correctCount;
}
document.getElementById('retry').onclick=render;render();
</script>
</body>
</html>
