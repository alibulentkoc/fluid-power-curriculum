<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Knowledge check · Why model the platform</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal-soft:#ECFAF8;--green:#1B8A5A;--green-soft:#E7F6EE;--red:#C2463B;--red-soft:#FBECEA;
    --sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.55}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:13.5px;margin:0 0 8px}
  .banner{font-size:12.5px;background:var(--teal-soft);color:var(--teal);border:1px solid #9FE0DA;border-radius:10px;padding:10px 14px;margin:0 0 22px}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(12,34,53,.05)}
  .q .num{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--teal)}
  .q .stem{font-size:15px;font-weight:600;margin:6px 0 14px}
  .opt{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:9px;font-family:var(--sans);font-size:14px;color:var(--ink);cursor:pointer;transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--teal)}
  .opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green);font-weight:600}
  .opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .opt:disabled{cursor:default}
  .fb{font-size:13px;margin-top:8px;padding:10px 12px;border-radius:9px;display:none}
  .fb.show{display:block}.fb.ok{background:var(--green-soft);color:var(--green)}.fb.no{background:var(--red-soft);color:var(--red)}
  .score{position:sticky;bottom:14px;background:#0C2235;color:#fff;border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-top:8px;box-shadow:0 4px 16px rgba(12,34,53,.25)}
  .score b{font-size:18px}
  .retry{background:none;border:1px solid #3a5670;color:#cfe0ec;font-family:var(--sans);font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer}
  .retry:hover{border-color:#7FD7D0;color:#7FD7D0}
</style>
</head>
<body>
<div class="wrap">
  <h1>Knowledge check — Why model the platform</h1>
  <p class="sub">Module 09 · Lesson 01</p>
  <p class="banner">Check your understanding — unlimited attempts, immediate feedback, not graded.</p>
  <div id="quiz"></div>
  <div class="score"><span>Answered <b id="done">0</b> / 5 &nbsp;·&nbsp; Correct <b id="right">0</b></span>
    <button class="retry" id="retry">Start over</button></div>
</div>
<script>
const QUESTIONS=[
  {stem:"Why build a model before building and controlling the real platform?",
   opts:["models are required by law","so you can predict arrival time, pressures, and control behaviour — and iterate — in software, where a mistake costs a re-run, not a rebuild, and the 2-tonne machine stays safe","to avoid buying a pump","models are always more accurate than reality"], correct:1,
   why:"Experimenting on a model is cheap, fast, and safe; changing a parameter is a second in software versus a day in steel, and the controller can be tuned against the model before it ever touches the machine."},
  {stem:"What is a model of the platform, in terms of inputs and outputs?",
   opts:["a photo of the machine","a function that maps a command history u(t) to predicted outputs — position x(t) and pressure p(t)","a list of parts","the real machine itself"], correct:1,
   why:"A model reproduces the plant’s input-to-output behaviour: give it a command over time and it predicts the same position and pressure signals the real platform would report."},
  {stem:"What does the kinematic model include and ignore, and what arrival time does it give for a 500 mm raise?",
   opts:["it includes everything; 10 s","it keeps only flow→speed (v = 85u) and integrates it, ignoring mass and pressure; 500/85 ≈ 5.9 s","it models only pressure; 2 s","it ignores the command; 0 s"], correct:1,
   why:"The kinematic model assumes the platform instantly moves at 85u mm/s. For 500 mm at full command that is 500/85 ≈ 5.9 s — but it says nothing about acceleration or pressure."},
  {stem:"What does the dynamic model add, and why is the difference small here?",
   opts:["it adds nothing","it adds Newton’s law (the mass must accelerate) and the pressure build-up; the difference is small (~0.1 s) because the platform is flow-limited — it reaches 85 mm/s in ~0.1 s","it makes the platform slower by 5 s","it removes the load"], correct:1,
   why:"With ~1800 N of spare force the 2-tonne mass accelerates to speed in a tenth of a second over ~4 mm, so the dynamic arrival (~5.93 s) barely differs — the speed is set by the pump, not the load."},
  {stem:"When should you reach for the dynamic model rather than the kinematic one?",
   opts:["never","when pressure, transients, or control behaviour matter — the kinematic model structurally cannot represent them","only for slow machines","only when the load is small"], correct:1,
   why:"The kinematic model gives arrival time but not the pressure history, startup lag, or closed-loop response. Those need the dynamic model — exactly what Module 10’s controller design will require."}
];
const quiz=document.getElementById('quiz'),doneEl=document.getElementById('done'),rightEl=document.getElementById('right');
let answered,correctCount;
function render(){
  answered=new Array(QUESTIONS.length).fill(false);correctCount=0;doneEl.textContent='0';rightEl.textContent='0';quiz.innerHTML='';
  QUESTIONS.forEach((q,qi)=>{const card=document.createElement('div');card.className='q';
    card.innerHTML=`<div class="num">Question ${qi+1}</div><div class="stem">${q.stem}</div>`;
    q.opts.forEach((o,oi)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=o;b.onclick=()=>choose(qi,oi,card,q);card.appendChild(b);});
    const fb=document.createElement('div');fb.className='fb';card.appendChild(fb);quiz.appendChild(card);});
}
function choose(qi,oi,card,q){
  if(answered[qi])return;answered[qi]=true;
  const btns=card.querySelectorAll('.opt');btns.forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('correct');});
  const fb=card.querySelector('.fb');
  if(oi===q.correct){correctCount++;fb.className='fb show ok';fb.innerHTML='Correct. '+q.why;}
  else{btns[oi].classList.add('wrong');fb.className='fb show no';fb.innerHTML='Not quite. '+q.why;}
  doneEl.textContent=answered.filter(Boolean).length;rightEl.textContent=correctCount;
}
document.getElementById('retry').onclick=render;render();
</script>
</body>
</html>
