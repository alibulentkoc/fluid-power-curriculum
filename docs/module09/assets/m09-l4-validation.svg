<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="Three validation checks. Check one steady state: predicted 100 bar hold and 10 L/min cruise match measured, a tick. Check two resonance: the pure-oil model rings fast at 12 Hz while the measured platform rings slower at 8 Hz; tuning effective bulk modulus from 1.8 to 0.77 GPa brings the model onto the measured trace, identifying entrained air. Check three damping: friction is tuned so the model overshoot matches the measured decay. A panel lists trusted parameters (mass, area, density, stroke) fixed and uncertain parameters (effective bulk modulus, friction) identified, noting the validated model is trusted within its tested range.">
