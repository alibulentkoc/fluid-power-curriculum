<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="Mission trajectory for a 500 mm raise, three stacked time plots sharing a 0 to 6 second axis. Position rises through a soft-start into a straight flow-limited climb to 500 mm at about 6 seconds. Velocity ramps to 85 mm/s over 0.3 s and holds. Pressure jumps to about 105 bar during acceleration then settles to about 102 bar, with the 115 bar relief line well above and never reached. A verdict panel lists time about 6 s feasible, pressure 105 bar under relief, flow 10 L/min at pump limit, all ticks, and hold plus-minus 1 mm cross with open-loop drift about 15 mm needing Module 10.">
