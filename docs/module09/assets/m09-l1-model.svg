<svg viewBox="0 0 760 410" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="Left: the modeling loop - abstract the physical platform into equations (Newton plus hydraulics), run them as a simulation, predict position and pressure, and check against reality to refine. Right: predicted height versus time for a 500 mm raise - the kinematic model is a straight line reaching 500 mm at about 5.9 seconds, and the dynamic model is nearly identical but with a brief acceleration curve at the start, reaching 500 mm at about 5.93 seconds; the dynamic model also predicts pressure and transient the kinematic one cannot.">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#DD841A"/></marker></defs>
<rect width="760" height="410" rx="16" fill="#F7F9FB"/>
<text x="30" y="40" font-size="20" font-weight="700" fill="#0C2235">Why model the platform</text>
<text x="30" y="62" font-size="12.5" fill="#586876">A model turns a command into predicted motion — experiment in software, then confirm on hardware.</text>
<text x="40" y="92" font-size="11" font-weight="700" letter-spacing=".5" fill="#0E7E8C">THE MODELING LOOP</text>
<rect x="70" y="120" width="120" height="58" rx="10" fill="#fff" stroke="#0E7E8C" stroke-width="1.8"/>
<text x="130.0" y="144" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">physical</text>
<text x="130.0" y="160" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">platform</text>
<rect x="250" y="120" width="120" height="58" rx="10" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/>
<text x="310.0" y="144" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">model</text>
<text x="310.0" y="160" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">equations</text>
<rect x="250" y="270" width="120" height="58" rx="10" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/>
<text x="310.0" y="294" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">run</text>
<text x="310.0" y="310" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">simulation</text>
<rect x="70" y="270" width="120" height="58" rx="10" fill="#fff" stroke="#0E7E8C" stroke-width="1.8"/>
<text x="130.0" y="294" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">predict /</text>
<text x="130.0" y="310" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">check</text>
<line x1="190" y1="149" x2="246" y2="149" stroke="#DD841A" stroke-width="2" marker-end="url(#a)"/><text x="218" y="142" font-size="8.5" fill="#8AA0AE" text-anchor="middle">abstract</text>
<line x1="310" y1="178" x2="310" y2="266" stroke="#DD841A" stroke-width="2" marker-end="url(#a)"/><text x="330" y="225" font-size="8.5" fill="#8AA0AE">run</text>
<line x1="246" y1="299" x2="194" y2="299" stroke="#DD841A" stroke-width="2" marker-end="url(#a)"/><text x="220" y="292" font-size="8.5" fill="#8AA0AE" text-anchor="middle">predict</text>
<line x1="130" y1="266" x2="130" y2="182" stroke="#DD841A" stroke-width="2" marker-end="url(#a)"/><text x="150" y="225" font-size="8.5" fill="#8AA0AE">refine</text>
<text x="430" y="130" font-size="11" font-weight="700" letter-spacing=".5" fill="#0E7E8C">PREDICTED HEIGHT vs TIME (500 mm raise)</text>
<line x1="430" y1="150" x2="430" y2="330" stroke="#1B3A55" stroke-width="1.5"/>
<line x1="430" y1="330" x2="710" y2="330" stroke="#1B3A55" stroke-width="1.5"/>
<text x="424" y="156" font-size="9.5" fill="#586876" text-anchor="end">500</text>
<text x="424" y="333" font-size="9.5" fill="#586876" text-anchor="end">0</text>
<text x="400" y="240.0" font-size="10" fill="#586876" transform="rotate(-90 400 240.0)" text-anchor="middle">height (mm)</text>
<text x="570.0" y="360" font-size="10" fill="#586876" text-anchor="middle">time (s)</text>
<line x1="430.0" y1="330" x2="430.0" y2="334" stroke="#1B3A55" stroke-width="1"/><text x="430.0" y="348" font-size="9" fill="#586876" text-anchor="middle">0</text>
<line x1="516.1538461538462" y1="330" x2="516.1538461538462" y2="334" stroke="#1B3A55" stroke-width="1"/><text x="516.1538461538462" y="348" font-size="9" fill="#586876" text-anchor="middle">2</text>
<line x1="602.3076923076924" y1="330" x2="602.3076923076924" y2="334" stroke="#1B3A55" stroke-width="1"/><text x="602.3076923076924" y="348" font-size="9" fill="#586876" text-anchor="middle">4</text>
<line x1="688.4615384615385" y1="330" x2="688.4615384615385" y2="334" stroke="#1B3A55" stroke-width="1"/><text x="688.4615384615385" y="348" font-size="9" fill="#586876" text-anchor="middle">6</text>
<line x1="430.0" y1="330.0" x2="684.1538461538462" y2="156.9230769230769" stroke="#0E7E8C" stroke-width="2.6"/>
<polyline points="430.0,330.0 430.9,329.9 431.7,329.8 432.6,329.4 433.4,329.0 434.3,328.5 451.5,316.8 473.1,302.1 494.6,287.4 516.2,272.7 537.7,258.0 559.2,243.3 580.8,228.6 602.3,213.9 623.8,199.2 645.4,184.4 666.9,169.7 685.4,156.9" fill="none" stroke="#DD841A" stroke-width="2.2" stroke-dasharray="5 3"/>
<circle cx="684.1538461538462" cy="156.9230769230769" r="4" fill="#0E7E8C"/><text x="684.1538461538462" y="148.9230769230769" font-size="9" font-weight="700" fill="#0E7E8C" text-anchor="middle">kin 5.9s</text>
<text x="687.4461538461538" y="170.9230769230769" font-size="9" font-weight="700" fill="#DD841A">dyn 5.93s</text>
<line x1="440" y1="164" x2="460" y2="164" stroke="#0E7E8C" stroke-width="2.6"/><text x="464" y="167" font-size="9.5" fill="#1B3A55">kinematic (v=85u)</text>
<line x1="440" y1="180" x2="460" y2="180" stroke="#DD841A" stroke-width="2.2" stroke-dasharray="5 3"/><text x="464" y="183" font-size="9.5" fill="#1B3A55">dynamic (+ accel, pressure)</text>
</svg>