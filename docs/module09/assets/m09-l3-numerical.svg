<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="Left: the Euler method - a smooth true curve traced by short straight steps of length delta t following the local slope, noting a large step overshoots where the curve bends. Right: the oil-spring step response simulated at three time steps - at 1 millisecond it rings at 12 Hz and settles, tracking the true response; at 4 milliseconds slightly coarser but still tracking; at 30 milliseconds, past the 26 millisecond stability limit, it swings with growing amplitude and diverges. A ladder marks stability at 26 ms, accuracy at 4 ms, and 1 ms chosen.">
<rect width="760" height="420" rx="16" fill="#F7F9FB"/>
<text x="30" y="40" font-size="20" font-weight="700" fill="#0C2235">Solving it numerically</text>
<text x="30" y="62" font-size="12.5" fill="#586876">Step the equations forward in time — the step size decides whether the sim tracks reality or explodes.</text>
