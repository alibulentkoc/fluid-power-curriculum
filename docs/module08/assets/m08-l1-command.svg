<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="The electrohydraulic command chain and the command-to-speed graph. Left to right: a command source outputs a current; a proportional solenoid turns current into force; the force positions the valve spool against a spring; the spool meters flow to the cylinder; the flow sets the platform speed. Below, a graph plots command 0 to 100 percent against speed 0 to 85 mm per second as a straight line, with 5 percent at 4.2 mm per second creep and 100 percent at 85 mm per second full speed.">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#DD841A"/></marker></defs>
<rect width="760" height="470" rx="16" fill="#F7F9FB"/>
<text x="30" y="42" font-size="20" font-weight="700" fill="#0C2235">Commanding with electricity</text>
<text x="30" y="64" font-size="12.5" fill="#586876">A current command threads through the solenoid to become platform speed — each link near-linear.</text>
<rect x="30" y="96" width="124" height="76" rx="10" fill="#fff" stroke="#0E7E8C" stroke-width="1.8"/>
<text x="92.0" y="120" font-size="13" font-weight="700" fill="#0C2235" text-anchor="middle">command</text>
<text x="92.0" y="141" font-size="12" fill="#0E7E8C" text-anchor="middle" font-family="'IBM Plex Mono',monospace">u = 0–100%</text>
<text x="92.0" y="159" font-size="10" fill="#8AA0AE" text-anchor="middle">dial / controller</text>
<line x1="156" y1="134.0" x2="170" y2="134.0" stroke="#DD841A" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="172" y="96" width="124" height="76" rx="10" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/>
<text x="234.0" y="120" font-size="13" font-weight="700" fill="#0C2235" text-anchor="middle">solenoid</text>
<text x="234.0" y="141" font-size="12" fill="#1B3A55" text-anchor="middle" font-family="'IBM Plex Mono',monospace">F = Kₛ·I</text>
<text x="234.0" y="159" font-size="10" fill="#8AA0AE" text-anchor="middle">force ∝ current</text>
<line x1="298" y1="134.0" x2="312" y2="134.0" stroke="#DD841A" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="314" y="96" width="124" height="76" rx="10" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/>
<text x="376.0" y="120" font-size="13" font-weight="700" fill="#0C2235" text-anchor="middle">spool</text>
<text x="376.0" y="141" font-size="12" fill="#1B3A55" text-anchor="middle" font-family="'IBM Plex Mono',monospace">x = F/k</text>
<text x="376.0" y="159" font-size="10" fill="#8AA0AE" text-anchor="middle">position ∝ force</text>
<line x1="440" y1="134.0" x2="454" y2="134.0" stroke="#DD841A" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="456" y="96" width="124" height="76" rx="10" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/>
<text x="518.0" y="120" font-size="13" font-weight="700" fill="#0C2235" text-anchor="middle">flow</text>
<text x="518.0" y="141" font-size="12" fill="#1B3A55" text-anchor="middle" font-family="'IBM Plex Mono',monospace">Q = C_d·A(x)·√…</text>
<text x="518.0" y="159" font-size="10" fill="#8AA0AE" text-anchor="middle">meter ∝ opening</text>
<line x1="582" y1="134.0" x2="596" y2="134.0" stroke="#DD841A" stroke-width="2.2" marker-end="url(#a)"/>
<rect x="598" y="96" width="124" height="76" rx="10" fill="#fff" stroke="#0E7E8C" stroke-width="1.8"/>
<text x="660.0" y="120" font-size="13" font-weight="700" fill="#0C2235" text-anchor="middle">speed</text>
<text x="660.0" y="141" font-size="12" fill="#0E7E8C" text-anchor="middle" font-family="'IBM Plex Mono',monospace">v = Q/A</text>
<text x="660.0" y="159" font-size="10" fill="#8AA0AE" text-anchor="middle">85·u mm/s</text>
<text x="30" y="238" font-size="12" font-weight="700" letter-spacing="1" fill="#0E7E8C">COMMAND → SPEED</text>
<line x1="90" y1="250" x2="90" y2="400" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="90" y1="400" x2="690" y2="400" stroke="#1B3A55" stroke-width="1.6"/>
<text x="82" y="256" font-size="11" fill="#586876" text-anchor="end">85</text>
<text x="82" y="404" font-size="11" fill="#586876" text-anchor="end">0</text>
<text x="50" y="325.0" font-size="11" fill="#586876" text-anchor="middle" transform="rotate(-90 50 325.0)">speed (mm/s)</text>
<text x="390.0" y="434" font-size="11" fill="#586876" text-anchor="middle">command u (%)</text>
<line x1="90.0" y1="400" x2="90.0" y2="405" stroke="#1B3A55" stroke-width="1.2"/><text x="90.0" y="420" font-size="10" fill="#586876" text-anchor="middle">0</text>
<line x1="240.0" y1="400" x2="240.0" y2="405" stroke="#1B3A55" stroke-width="1.2"/><text x="240.0" y="420" font-size="10" fill="#586876" text-anchor="middle">25</text>
<line x1="390.0" y1="400" x2="390.0" y2="405" stroke="#1B3A55" stroke-width="1.2"/><text x="390.0" y="420" font-size="10" fill="#586876" text-anchor="middle">50</text>
<line x1="540.0" y1="400" x2="540.0" y2="405" stroke="#1B3A55" stroke-width="1.2"/><text x="540.0" y="420" font-size="10" fill="#586876" text-anchor="middle">75</text>
<line x1="690.0" y1="400" x2="690.0" y2="405" stroke="#1B3A55" stroke-width="1.2"/><text x="690.0" y="420" font-size="10" fill="#586876" text-anchor="middle">100</text>
<line x1="90" y1="400" x2="690" y2="250" stroke="#0E7E8C" stroke-width="2.6"/>
<circle cx="120.0" cy="392.5882352941176" r="4.5" fill="#DD841A" stroke="#fff" stroke-width="1.5"/><line x1="120.0" y1="392.5882352941176" x2="120.0" y2="400" stroke="#DD841A" stroke-width="0.8" stroke-dasharray="3 2"/><text x="128.0" y="396.5882352941176" font-size="11" font-weight="700" fill="#0C2235">5% → 4.2 mm/s (creep)</text>
<circle cx="690.0" cy="250.0" r="4.5" fill="#DD841A" stroke="#fff" stroke-width="1.5"/><line x1="690.0" y1="250.0" x2="690.0" y2="400" stroke="#DD841A" stroke-width="0.8" stroke-dasharray="3 2"/><text x="698.0" y="244.0" font-size="11" font-weight="700" fill="#0C2235">100% → 85 mm/s</text>
</svg>