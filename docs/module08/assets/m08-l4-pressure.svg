<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="Sensing pressure and load. Left: the platform cylinder with pressure transducers on the cap line (load), the rod line (descent and pilot), and the pressure line (supply and relief health). Centre: cap pressure times cap area equals force, 100 bar across 1963.5 mm squared is 19.6 kN or about 2000 kg. Right: a 0 to 250 bar gauge with a normal band near 100 bar, a caution band approaching the 115 bar relief, the relief line, and the 143 bar shock spike still on-scale thanks to headroom.">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#DD841A"/></marker></defs>
<rect width="760" height="420" rx="16" fill="#F7F9FB"/>
<text x="30" y="40" font-size="20" font-weight="700" fill="#0C2235">Sensing pressure and load</text>
<text x="30" y="62" font-size="12.5" fill="#586876">Force = pressure × area, so a cap-line transducer weighs the load — and every fault has a pressure signature.</text>
<rect x="89.0" y="110" width="42" height="170" rx="3" fill="#fff" stroke="#1B3A55" stroke-width="1.9"/>
<rect x="91.0" y="206" width="38" height="6" fill="#1B3A55"/>
<line x1="110" y1="209" x2="110" y2="76" stroke="#5B6B79" stroke-width="7"/>
<rect x="84" y="58" width="52" height="18" rx="3" fill="#DD841A"/><text x="110" y="71" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">2 t load</text>
<line x1="89.0" y1="262" x2="65.0" y2="262" stroke="#1B3A55" stroke-width="1.6"/>
<circle cx="65.0" cy="262" r="12" fill="#fff" stroke="#0E7E8C" stroke-width="2"/><path d="M59.0,266 A6,6 0 0 1 71.0,266" fill="none" stroke="#0E7E8C" stroke-width="1.4"/><line x1="65.0" y1="266" x2="69.0" y2="258" stroke="#0E7E8C" stroke-width="1.4"/><text x="65.0" y="288" font-size="8.5" font-weight="700" fill="#0E7E8C" text-anchor="middle">cap · load</text>
<line x1="89.0" y1="126" x2="65.0" y2="126" stroke="#1B3A55" stroke-width="1.6"/>
<circle cx="65.0" cy="126" r="12" fill="#fff" stroke="#1B3A55" stroke-width="2"/><path d="M59.0,130 A6,6 0 0 1 71.0,130" fill="none" stroke="#1B3A55" stroke-width="1.4"/><line x1="65.0" y1="130" x2="69.0" y2="122" stroke="#1B3A55" stroke-width="1.4"/><text x="65.0" y="152" font-size="8.5" font-weight="700" fill="#1B3A55" text-anchor="middle">rod · pilot</text>
<circle cx="157.0" cy="276" r="12" fill="#fff" stroke="#8AA0AE" stroke-width="2"/><path d="M151.0,280 A6,6 0 0 1 163.0,280" fill="none" stroke="#8AA0AE" stroke-width="1.4"/><line x1="157.0" y1="280" x2="161.0" y2="272" stroke="#8AA0AE" stroke-width="1.4"/><text x="157.0" y="302" font-size="8.5" font-weight="700" fill="#8AA0AE" text-anchor="middle">P · supply</text>
<line x1="131.0" y1="276" x2="145.0" y2="276" stroke="#1B3A55" stroke-width="1.6"/>
<rect x="270" y="150" width="180" height="120" rx="12" fill="#fff" stroke="#0E7E8C" stroke-width="1.8"/>
<text x="360" y="176" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">cap transducer = scale</text>
<text x="360" y="204" font-size="13" fill="#1B3A55" text-anchor="middle" font-family="'IBM Plex Mono',monospace">F = p × A_cap</text>
<text x="360" y="228" font-size="12" fill="#586876" text-anchor="middle">100 bar × 1963.5 mm²</text>
<text x="360" y="250" font-size="15" font-weight="800" fill="#0E7E8C" text-anchor="middle">= 19.6 kN ≈ 2000 kg</text>
<line x1="173.0" y1="276" x2="264" y2="210" stroke="#DD841A" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>
<text x="587.0" y="100" font-size="11" font-weight="700" fill="#0E7E8C" text-anchor="middle">0–250 bar range</text>
<rect x="560" y="255.0" width="54" height="25.0" fill="#DCEEE0"/>
<rect x="560" y="245.0" width="54" height="10.0" fill="#FCEFD8"/>
<rect x="560" y="110" width="54" height="250" fill="none" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="554" y1="245.0" x2="620" y2="245.0" stroke="#C0392B" stroke-width="2"/><text x="624" y="249.0" font-size="10" font-weight="700" fill="#C0392B">115 relief</text>
<circle cx="587.0" cy="217.0" r="4.5" fill="#C0392B" stroke="#fff" stroke-width="1.3"/><text x="624" y="221.0" font-size="10" fill="#C0392B">143 spike (on-scale)</text>
<circle cx="587.0" cy="260.0" r="5.5" fill="#0B6A3B" stroke="#fff" stroke-width="1.5"/><text x="624" y="264.0" font-size="10" font-weight="700" fill="#0B6A3B">100 = load</text>
<text x="624" y="280.0" font-size="9" fill="#0B6A3B">normal</text>
<line x1="556" y1="360.0" x2="560" y2="360.0" stroke="#1B3A55" stroke-width="1"/><text x="553" y="363.0" font-size="8.5" fill="#586876" text-anchor="end">0</text>
<line x1="556" y1="310.0" x2="560" y2="310.0" stroke="#1B3A55" stroke-width="1"/><text x="553" y="313.0" font-size="8.5" fill="#586876" text-anchor="end">50</text>
<line x1="556" y1="260.0" x2="560" y2="260.0" stroke="#1B3A55" stroke-width="1"/><text x="553" y="263.0" font-size="8.5" fill="#586876" text-anchor="end">100</text>
<line x1="556" y1="210.0" x2="560" y2="210.0" stroke="#1B3A55" stroke-width="1"/><text x="553" y="213.0" font-size="8.5" fill="#586876" text-anchor="end">150</text>
<line x1="556" y1="160.0" x2="560" y2="160.0" stroke="#1B3A55" stroke-width="1"/><text x="553" y="163.0" font-size="8.5" fill="#586876" text-anchor="end">200</text>
<line x1="556" y1="110.0" x2="560" y2="110.0" stroke="#1B3A55" stroke-width="1"/><text x="553" y="113.0" font-size="8.5" fill="#586876" text-anchor="end">250</text>
</svg>