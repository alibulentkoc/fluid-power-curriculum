<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="Block diagram of the driven-and-sensed platform. A command signal u enters the platform block, which contains the proportional valve, cylinder, and load. Two measurements leave it: position x from the in-bore sensor, 0 to 600 mm at 14-bit or better and about 1 kHz, and cap pressure p, 0 to 250 bar at 0.5 percent full scale, which also gives load. A dashed greyed feedback path loops the measurements back toward the command labelled closed in Module 10, showing the loop is open. A table lists the three signals with range and rate.">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#0E7E8C"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#B7C2CC"/></marker></defs>
<rect width="760" height="440" rx="16" fill="#F7F9FB"/>
<text x="30" y="40" font-size="20" font-weight="700" fill="#0C2235">The driven-and-sensed platform</text>
<text x="30" y="62" font-size="12.5" fill="#586876">One command in, two measurements out — a plant a controller or simulator can use. The loop is still open.</text>
<rect x="40" y="150" width="96" height="56" rx="10" fill="#fff" stroke="#0E7E8C" stroke-width="1.8"/><text x="88" y="176" font-size="12" font-weight="700" fill="#0C2235" text-anchor="middle">command</text><text x="88" y="194" font-size="10" fill="#8AA0AE" text-anchor="middle">u = 0–100%</text>
<rect x="230" y="120" width="230" height="116" rx="12" fill="#EAF6F5" stroke="#1B3A55" stroke-width="2"/>
<text x="345.0" y="142" font-size="13" font-weight="800" fill="#0C2235" text-anchor="middle">PLATFORM (plant)</text>
<rect x="252" y="162" width="46" height="30" rx="3" fill="#fff" stroke="#1B3A55" stroke-width="1.3"/><rect x="268" y="166" width="8" height="22" fill="#1B3A55"/><text x="275" y="206" font-size="8.5" fill="#586876" text-anchor="middle">prop. valve</text>
<rect x="326" y="160" width="26" height="46" rx="2" fill="#fff" stroke="#1B3A55" stroke-width="1.3"/><rect x="327" y="178" width="24" height="4" fill="#1B3A55"/><line x1="339" y1="180" x2="339" y2="150" stroke="#5B6B79" stroke-width="4"/><text x="339" y="218" font-size="8.5" fill="#586876" text-anchor="middle">cylinder</text>
<rect x="380" y="164" width="42" height="20" rx="3" fill="#DD841A"/><text x="401" y="178" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">2 t</text><text x="401" y="206" font-size="8.5" fill="#586876" text-anchor="middle">load</text>
<line x1="136" y1="178" x2="226" y2="178.0" stroke="#0E7E8C" stroke-width="2.4" marker-end="url(#a)"/><text x="183.0" y="170.0" font-size="11" font-weight="700" fill="#0E7E8C" text-anchor="middle">u</text>
<line x1="460" y1="160" x2="530" y2="160" stroke="#0E7E8C" stroke-width="2.4" marker-end="url(#a)"/><text x="495" y="152" font-size="11" font-weight="700" fill="#0E7E8C" text-anchor="middle">x</text>
<line x1="460" y1="200" x2="530" y2="200" stroke="#0E7E8C" stroke-width="2.4" marker-end="url(#a)"/><text x="495" y="192" font-size="11" font-weight="700" fill="#0E7E8C" text-anchor="middle">p</text>
<rect x="532" y="144" width="150" height="32" rx="8" fill="#fff" stroke="#1B3A55" stroke-width="1.5"/><text x="607" y="158" font-size="10.5" font-weight="700" fill="#0C2235" text-anchor="middle">position sensor</text><text x="607" y="171" font-size="9" fill="#8AA0AE" text-anchor="middle">0–600 mm · ≥14-bit</text>
<rect x="532" y="184" width="150" height="32" rx="8" fill="#fff" stroke="#1B3A55" stroke-width="1.5"/><text x="607" y="198" font-size="10.5" font-weight="700" fill="#0C2235" text-anchor="middle">pressure → load</text><text x="607" y="211" font-size="9" fill="#8AA0AE" text-anchor="middle">0–250 bar · 0.5% FS</text>
<path d="M682,216 L682,292 L88,292 L88,206" fill="none" stroke="#B7C2CC" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ag)"/>
<rect x="190.0" y="278" width="200" height="28" rx="8" fill="#fff" stroke="#B7C2CC" stroke-width="1.5" stroke-dasharray="4 3"/><text x="290.0" y="296" font-size="11" font-weight="700" fill="#8AA0AE" text-anchor="middle">feedback — closed in Module 10</text>
<text x="30" y="330" font-size="11" font-weight="700" letter-spacing="1" fill="#0E7E8C">INTERFACE SIGNALS</text>
<text x="30" y="350" font-size="10" font-weight="700" fill="#8AA0AE">signal</text>
<text x="170" y="350" font-size="10" font-weight="700" fill="#8AA0AE">dir</text>
<text x="250" y="350" font-size="10" font-weight="700" fill="#8AA0AE">range / meaning</text>
<text x="600" y="350" font-size="10" font-weight="700" fill="#8AA0AE">rate</text>
<text x="30" y="372" font-size="11.5" font-weight="700" fill="#0E7E8C" font-family="'IBM Plex Mono',monospace">command  u</text>
<text x="170" y="372" font-size="11" fill="#586876">input</text>
<text x="250" y="372" font-size="11" fill="#1B3A55">0–100% → speed v = 85u mm/s</text>
<text x="600" y="372" font-size="11" fill="#586876">~1 kHz</text>
<text x="30" y="394" font-size="11.5" font-weight="700" fill="#1B3A55" font-family="'IBM Plex Mono',monospace">position  x</text>
<text x="170" y="394" font-size="11" fill="#586876">output</text>
<text x="250" y="394" font-size="11" fill="#1B3A55">0–600 mm, ≥14-bit (≤0.037 mm)</text>
<text x="600" y="394" font-size="11" fill="#586876">~1 kHz</text>
<text x="30" y="416" font-size="11.5" font-weight="700" fill="#1B3A55" font-family="'IBM Plex Mono',monospace">pressure  p</text>
<text x="170" y="416" font-size="11" fill="#586876">output</text>
<text x="250" y="416" font-size="11" fill="#1B3A55">0–250 bar → load = pA/g, 0.5% FS</text>
<text x="600" y="416" font-size="11" fill="#586876">~1 kHz</text>
</svg>