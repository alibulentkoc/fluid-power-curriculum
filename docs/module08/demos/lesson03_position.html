<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Sensing position</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--red:#C0392B;--green:#0B6A3B;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto}
.ctrl{margin-top:16px}.ctrl label{font-size:13px;font-weight:700;color:var(--slate)}
input[type=range]{width:100%;accent-color:#0C6A74;margin-top:6px}
.reads{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.read{flex:1 1 120px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.read .k{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
.read .v{font-size:19px;font-weight:800;font-family:var(--mono);color:#0C2235}
.verdict{margin-top:14px;font-size:13.5px;font-weight:700;padding:11px 14px;border-radius:10px;border:1px solid}
.ok{background:#E8F3EC;color:var(--green);border-color:#BFE6CF}
.bad{background:#FBEAE7;color:var(--red);border-color:#F0C4BC}
</style></head>
<body><div class="wrap">
<h1>Sensing position</h1>
<p class="sub">Set the sensor's bit depth over the 600 mm stroke. The resolvable step must fall below the 0.1 mm line — a tenth of the ±1 mm band — or ±1 mm control is impossible.</p>
<div class="card">
<svg viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <text x="20" y="24" font-size="11" font-weight="700" letter-spacing=".5" fill="#586876">RESOLVABLE STEP (log scale, 0.005–1 mm over 600 mm)</text>
  <rect x="20" y="34" width="640" height="48" rx="8" fill="#EEF2F5" stroke="#D3DDE6"/>
  <!-- 0.1 mm threshold -->
  <line id="thr" x1="0" y1="30" x2="0" y2="86" stroke="#C0392B" stroke-width="2" stroke-dasharray="4 3"/>
  <text id="thrl" x="0" y="98" font-size="10" font-weight="700" fill="#C0392B" text-anchor="middle">0.1 mm need</text>
  <!-- step marker -->
  <circle id="dot" cx="0" cy="58" r="8" fill="#0E7E8C" stroke="#fff" stroke-width="2"/>
  <text x="30" y="60" font-size="9" fill="#0B6A3B">finer</text>
  <text x="628" y="60" font-size="9" fill="#C0392B" text-anchor="end">coarser</text>
  <!-- +/-1mm band with quantization ticks -->
  <text x="20" y="128" font-size="11" font-weight="700" letter-spacing=".5" fill="#586876">WHAT THE SENSOR CAN "SEE" INSIDE THE ±1 mm BAND</text>
  <rect x="140" y="140" width="400" height="34" rx="6" fill="#DCEEE0" stroke="#BFE6CF"/>
  <line x1="340" y1="134" x2="340" y2="182" stroke="#0B6A3B" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="340" y="194" font-size="9.5" fill="#0B6A3B" text-anchor="middle">target</text>
  <text x="150" y="160" font-size="9" fill="#0B6A3B">−1 mm</text><text x="500" y="160" font-size="9" fill="#0B6A3B">+1 mm</text>
  <g id="ticks"></g>
</svg>
<div class="ctrl"><label>Sensor bit depth = <span id="blbl">12</span> bits</label>
<input id="b" type="range" min="8" max="18" step="1" value="12"/></div>
<div class="reads">
  <div class="read"><div class="k">Counts (2^N)</div><div class="v" id="rc">—</div></div>
  <div class="read"><div class="k">Resolution</div><div class="v" id="rr">—</div></div>
  <div class="read"><div class="k">Ticks in ±1 mm</div><div class="v" id="rt">—</div></div>
</div>
<div class="verdict" id="verdict"></div>
</div></div>
<script>
  var stroke=600, need=0.1, $=function(id){return document.getElementById(id);};
  function logx(mm){ var lo=Math.log10(0.005), hi=Math.log10(1.0);
    var t=(Math.log10(mm)-lo)/(hi-lo); t=Math.max(0,Math.min(1,t)); return 40+t*600; }
  function upd(){
    var bits=+$('b').value; $('blbl').textContent=bits;
    var counts=Math.pow(2,bits), res=stroke/counts;
    $('thr').setAttribute('x1',logx(need)); $('thr').setAttribute('x2',logx(need)); $('thrl').setAttribute('x',logx(need));
    $('dot').setAttribute('cx',logx(res)); $('dot').setAttribute('fill', res<=need?'#0B6A3B':'#C0392B');
    // ticks the sensor can resolve inside the +/-1mm band (band = 400px wide = 2mm -> 200px/mm)
    var g=$('ticks'); g.innerHTML='';
    var n=Math.floor(2.0/res);            // steps across the 2 mm band
    if(n<=80){ for(var i=0;i<=n;i++){ var mm=-1+i*res; var x=340+mm*200;
      if(x>=140&&x<=540){ g.innerHTML+='<line x1="'+x.toFixed(1)+'" y1="140" x2="'+x.toFixed(1)+'" y2="174" stroke="#0E7E8C" stroke-width="1"/>'; } } }
    else { g.innerHTML='<rect x="140" y="140" width="400" height="34" fill="#0E7E8C" opacity="0.35"/>'; }
    var ticksIn=Math.max(0,Math.floor(2.0/res));
    $('rc').textContent=counts.toLocaleString();
    $('rr').textContent=res.toFixed(res<0.1?4:3)+' mm';
    $('rt').textContent=(ticksIn>200?'200+':ticksIn);
    var vd=$('verdict');
    if(res<=need){vd.className='verdict ok';vd.textContent='Resolution '+res.toFixed(4)+' mm ≤ 0.1 mm — the sensor sees well inside the ±1 mm band ('+ (ticksIn>200?'200+':ticksIn) +' steps across it). ±1 mm control is possible.';}
    else{vd.className='verdict bad';vd.textContent='Resolution '+res.toFixed(3)+' mm > 0.1 mm — too coarse. The sensor sees only '+ticksIn+' step(s) across the ±1 mm band, so the controller cannot resolve the error it must correct. No tuning can fix this.';}
  }
  $('b').addEventListener('input',upd); upd();
</script>
</body></html>
