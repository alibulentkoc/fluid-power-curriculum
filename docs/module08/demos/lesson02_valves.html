<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · On/off vs proportional</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--red:#C0392B;--green:#0B6A3B;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto}
.row{display:flex;gap:8px;margin:4px 0 8px}
.row button{flex:1 1 0;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:13.5px;font-weight:700;padding:11px 10px;border-radius:9px;cursor:pointer}
.row button:hover{border-color:var(--teal)}.row button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
.ctrl{margin-top:14px}.ctrl label{font-size:13px;font-weight:700;color:var(--slate)}
input[type=range]{width:100%;accent-color:#0C6A74;margin-top:6px}
.reads{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.read{flex:1 1 150px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.read .k{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
.read .v{font-size:19px;font-weight:800;font-family:var(--mono)}
.verdict{margin-top:14px;font-size:13.5px;font-weight:700;padding:11px 14px;border-radius:10px;border:1px solid}
.ok{background:#E8F3EC;color:var(--green);border-color:#BFE6CF}
.bad{background:#FBEAE7;color:var(--red);border-color:#F0C4BC}
</style></head>
<body><div class="wrap">
<h1>On/off vs proportional</h1>
<p class="sub">Choose an approach speed near the target. Overshoot ≈ speed × reaction lag (20 ms); the sudden stop spikes the pressure. Only proportional can choose a slow creep.</p>
<div class="card">
<svg viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
  <!-- overshoot gauge -->
  <text x="20" y="26" font-size="11" font-weight="700" letter-spacing=".5" fill="#586876">OVERSHOOT vs ±1 mm TARGET BAND</text>
  <rect x="20" y="36" width="640" height="40" rx="6" fill="#EEF2F5" stroke="#D3DDE6"/>
  <!-- target band: target at x=120, ±1mm scaled 40px/mm -> band 40px wide -->
  <rect id="band" x="100" y="36" width="40" height="40" fill="#DCEEE0"/>
  <line x1="120" y1="30" x2="120" y2="82" stroke="#0B6A3B" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="120" y="96" font-size="10" fill="#0B6A3B" text-anchor="middle">target</text>
  <rect id="rest" x="120" y="40" width="4" height="32" fill="#C0392B"/>
  <text id="restlbl" x="140" y="60" font-size="11" font-weight="700" fill="#0C2235">rest</text>
  <!-- pressure gauge -->
  <text x="20" y="132" font-size="11" font-weight="700" letter-spacing=".5" fill="#586876">PEAK PRESSURE vs 115 bar RELIEF</text>
  <rect x="20" y="142" width="640" height="34" rx="6" fill="#EEF2F5" stroke="#D3DDE6"/>
  <rect id="pbar" x="20" y="142" width="200" height="34" rx="6" fill="#0E7E8C"/>
  <!-- relief line at 115 bar; scale: 20px + bar*3.2 (so 115 -> ~388, 143 -> ~478) -->
  <line id="prelief" x1="388" y1="136" x2="388" y2="182" stroke="#C0392B" stroke-width="2"/>
  <text x="392" y="150" font-size="10" fill="#C0392B">115 bar relief</text>
  <text id="plbl" x="28" y="164" font-size="12" font-weight="700" fill="#fff">100 bar</text>
</svg>
<div class="row">
  <button data-preset="85" id="b-onoff">On/off (85 mm/s)</button>
  <button data-preset="4.2" id="b-prop" class="active">Proportional creep (4.2 mm/s)</button>
</div>
<div class="ctrl"><label>Approach speed near target = <span id="vlbl">4.2</span> mm/s</label>
<input id="v" type="range" min="1" max="85" step="0.5" value="4.2"/></div>
<div class="reads">
  <div class="read"><div class="k">Overshoot</div><div class="v" id="rover">—</div></div>
  <div class="read"><div class="k">Peak pressure</div><div class="v" id="rp">—</div></div>
</div>
<div class="verdict" id="verdict"></div>
</div></div>
<script>
  var tr=0.020, m=2000, Acap=1963.5e-6, pload=100, relief=115, $=function(id){return document.getElementById(id);};
  function upd(){
    var v=+$('v').value; $('vlbl').textContent=v.toFixed(1);
    var over=v*tr;                                  // mm
    var dp=(m*(v/1000)/tr)/Acap/1e5;                // bar
    var peak=pload+dp;
    // rest marker: target at x=120, 40px per mm
    var rx=120+over*40; if(rx>656)rx=656;
    $('rest').setAttribute('x', rx);
    $('restlbl').setAttribute('x', Math.min(rx+16,600));
    $('restlbl').textContent='+'+over.toFixed(2)+' mm';
    // pressure bar: 20 + peak*3.2
    var pw=peak*3.2; $('pbar').setAttribute('width', pw);
    $('pbar').setAttribute('fill', peak>relief ? '#C0392B' : '#0E7E8C');
    $('plbl').textContent=peak.toFixed(0)+' bar';
    $('rover').textContent=over.toFixed(2)+' mm';
    $('rp').textContent=peak.toFixed(0)+' bar';
    var within=over<=1.0, safe=peak<=relief;
    var vd=$('verdict');
    if(within&&safe){vd.className='verdict ok';vd.textContent='Within ±1 mm ('+over.toFixed(2)+' mm) and under the relief ('+peak.toFixed(0)+' bar). A proportional valve can command this creep — the platform settles on target gently.';}
    else{vd.className='verdict bad';vd.textContent='Misses the ±1 mm band ('+over.toFixed(2)+' mm overshoot) and spikes to '+peak.toFixed(0)+' bar'+(peak>relief?' — past the 115 bar relief':'')+'. An on/off valve runs at full 85 mm/s and cannot slow down, so it overshoots and shocks the circuit.';}
  }
  document.querySelectorAll('.row button').forEach(function(b){b.onclick=function(){
    document.querySelectorAll('.row button').forEach(function(x){x.classList.toggle('active',x===b);});
    $('v').value=b.dataset.preset; upd();
  };});
  $('v').addEventListener('input',function(){document.querySelectorAll('.row button').forEach(function(x){x.classList.remove('active');});upd();});
  upd();
</script>
</body></html>
