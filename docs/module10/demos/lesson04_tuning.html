<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Tuning and stability</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--red:#C0392B;--green:#0B6A3B;--purple:#6B4FA0;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto}
.ctrl{margin-top:12px}.ctrl label{font-size:13px;font-weight:700;color:var(--slate)}
input[type=range]{width:100%;accent-color:#0C6A74;margin-top:5px}
.reads{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.read{flex:1 1 110px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.read .k{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
.read .v{font-size:18px;font-weight:800;font-family:var(--mono);color:#0C2235}
.verdict{margin-top:14px;font-size:13.5px;font-weight:700;padding:11px 14px;border-radius:10px;border:1px solid}
.ok{background:#E8F3EC;color:var(--green);border-color:#BFE6CF}
.thin{background:#FCF3E2;color:#9A6212;border-color:#EBD6A8}
.bad{background:#FBEAE7;color:var(--red);border-color:#F0C4BC}
</style></head>
<body><div class="wrap">
<h1>Tuning and stability</h1>
<p class="sub">Raise the gain toward the oscillation edge (the ultimate gain), then add derivative to push the edge up and win back margin.</p>
<div class="card">
<svg viewBox="0 0 660 210" xmlns="http://www.w3.org/2000/svg">
  <line x1="44" y1="14" x2="44" y2="186" stroke="#1B3A55" stroke-width="1.3"/>
  <line x1="44" y1="186" x2="640" y2="186" stroke="#1B3A55" stroke-width="1.3"/>
  <line id="tgt" x1="44" y1="70" x2="640" y2="70" stroke="#0B6A3B" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="636" y="66" font-size="9" fill="#0B6A3B" text-anchor="end">target</text>
  <polyline id="curve" points="" fill="none" stroke="#0E7E8C" stroke-width="2.2"/>
  <text x="636" y="204" font-size="9" fill="#586876" text-anchor="end">time →</text>
</svg>
<div class="ctrl"><label>Proportional gain Kₚ = <span id="klbl">0.15</span></label>
<input id="kp" type="range" min="0.05" max="0.50" step="0.01" value="0.15"/></div>
<div class="ctrl"><label>Derivative gain K_d = <span id="kdlbl">0.010</span></label>
<input id="kd" type="range" min="0" max="0.020" step="0.001" value="0.010"/></div>
<div class="reads">
  <div class="read"><div class="k">Ultimate gain Kᵤ</div><div class="v" id="rku">—</div></div>
  <div class="read"><div class="k">Gain margin</div><div class="v" id="rgm">—</div></div>
  <div class="read"><div class="k">Overshoot</div><div class="v" id="ros">—</div></div>
</div>
<div class="verdict" id="verdict"></div>
</div></div>
<script>
  var vmax=85,wn=77,zeta=0.12,dt=2e-5,Ki=0.4,$=function(id){return document.getElementById(id);};
  function Ku(Kd){return 0.22+18*Kd;}                 // derivative raises the ceiling
  function sim(Kp,Kd,target=5.0,T=1.8){
    var x=0,v=0,w=0,t=0,I=0,eprev=target,pts=[],peak=0;
    while(t<T){ var e=target-x; I+=e*dt; var de=(e-eprev)/dt; eprev=e;
      var u=Math.max(-1,Math.min(1,Kp*e+Ki*I+Kd*de));
      var dv=w,dw=wn*wn*(vmax*u-v)-2*zeta*wn*w; v+=dv*dt; w+=dw*dt; x+=v*dt; t+=dt;
      peak=Math.max(peak,x); if(pts.length===0||t-pts[pts.length-1][0]>=0.007)pts.push([t,x]); }
    return {pts:pts,peak:peak};
  }
  function draw(){
    var Kp=+$('kp').value, Kd=+$('kd').value; $('klbl').textContent=Kp.toFixed(2); $('kdlbl').textContent=Kd.toFixed(3);
    var ku=Ku(Kd), gm=ku/Kp, r=sim(Kp,Kd), T=1.8;
    function PX(t){return 44+(t/T)*596;} function PY(x){return 186-(x/9)*160;}
    $('tgt').setAttribute('y1',PY(5)); $('tgt').setAttribute('y2',PY(5));
    var os=(r.peak-5)/5*100; if(os<0)os=0;
    $('curve').setAttribute('points', r.pts.map(function(q){return PX(q[0]).toFixed(1)+','+Math.max(6,Math.min(204,PY(q[1]))).toFixed(1);}).join(' '));
    $('curve').setAttribute('stroke', gm<1?'#C0392B':(gm<2?'#DD841A':'#0E7E8C'));
    $('rku').textContent=ku.toFixed(2);
    $('rgm').textContent=gm.toFixed(1)+'×';
    $('ros').textContent=(os>200?'>200':os.toFixed(0))+' %';
    var vd=$('verdict');
    if(gm<1){vd.className='verdict bad';vd.textContent='Kₚ='+Kp.toFixed(2)+' exceeds the ultimate gain Kᵤ='+ku.toFixed(2)+' — the loop is unstable and oscillates. Lower Kₚ or raise K_d to move the edge up.';}
    else if(gm<2){vd.className='verdict thin';vd.textContent='Gain margin '+gm.toFixed(1)+'× is thin (<2×): fast, but temperature or load could tip it over. Raise K_d to push Kᵤ up, or lower Kₚ.';}
    else {vd.className='verdict ok';vd.textContent='Gain margin '+gm.toFixed(1)+'× — healthy (≥2×). Kᵤ='+ku.toFixed(2)+' with this derivative; the loop is fast and robust to drift and load. Note how raising K_d lifts Kᵤ and the margin.';}
  }
  $('kp').addEventListener('input',draw); $('kd').addEventListener('input',draw); draw();
</script>
</body></html>
