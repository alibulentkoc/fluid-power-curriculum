<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · The feedback principle</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--red:#C0392B;--green:#0B6A3B;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto}
.row{display:flex;gap:8px;margin-top:12px}
.row button{flex:1 1 0;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:13.5px;font-weight:700;padding:10px 8px;border-radius:9px;cursor:pointer}
.row button:hover{border-color:var(--teal)}.row button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
.ctrl{margin-top:14px}.ctrl label{font-size:13px;font-weight:700;color:var(--slate)}
input[type=range]{width:100%;accent-color:#0C6A74;margin-top:6px}
.reads{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.read{flex:1 1 120px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.read .k{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
.read .v{font-size:18px;font-weight:800;font-family:var(--mono);color:#0C2235}
.verdict{margin-top:14px;font-size:13.5px;font-weight:700;padding:11px 14px;border-radius:10px;border:1px solid}
.ok{background:#E8F3EC;color:var(--green);border-color:#BFE6CF}
.bad{background:#FBEAE7;color:var(--red);border-color:#F0C4BC}
</style></head>
<body><div class="wrap">
<h1>The feedback principle</h1>
<p class="sub">Command the platform to 300 mm with a disturbance acting on it. Open-loop drifts off; closed-loop measures the error and corrects.</p>
<div class="card">
<svg viewBox="0 0 660 240" xmlns="http://www.w3.org/2000/svg">
  <line x1="44" y1="20" x2="44" y2="210" stroke="#1B3A55" stroke-width="1.3"/>
  <line x1="44" y1="210" x2="640" y2="210" stroke="#1B3A55" stroke-width="1.3"/>
  <text x="38" y="24" font-size="9" fill="#586876" text-anchor="end">400</text>
  <text x="38" y="212" font-size="9" fill="#586876" text-anchor="end">0</text>
  <line id="tgt" x1="44" y1="0" x2="640" y2="0" stroke="#0B6A3B" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text id="tgtl" x="636" y="0" font-size="9" fill="#0B6A3B" text-anchor="end">target 300 mm ±1</text>
  <polyline id="curve" points="" fill="none" stroke="#0E7E8C" stroke-width="2.4"/>
  <text x="636" y="228" font-size="9" fill="#586876" text-anchor="end">time →</text>
</svg>
<div class="row">
  <button id="closed" class="active">Closed-loop (feedback)</button>
  <button id="open">Open-loop (timed)</button>
</div>
<div class="ctrl"><label>Disturbance (load creep) = <span id="dlbl">-3</span> mm/s</label>
<input id="dist" type="range" min="-6" max="6" step="1" value="-3"/></div>
<div class="reads">
  <div class="read"><div class="k">Final position</div><div class="v" id="rpos">—</div></div>
  <div class="read"><div class="k">Error</div><div class="v" id="rerr">—</div></div>
  <div class="read"><div class="k">Mode</div><div class="v" id="rmode" style="font-size:14px">—</div></div>
</div>
<div class="verdict" id="verdict"></div>
</div></div>
<script>
  var vmax=85, target=300, dt=1e-3, Kp=0.05, mode='closed', $=function(id){return document.getElementById(id);};
  function sim(){
    var dist=+$('dist').value, x=0, t=0, T=8, pts=[], tstop=target/vmax;
    while(t<T){
      var u;
      if(mode==='open'){ u = (t<tstop)?1.0:0.0; }        // timed, ignores disturbance & drift
      else { var e=target-x; u=Math.max(-1,Math.min(1,Kp*e)); }
      var v=vmax*u + dist;
      x+=v*dt; t+=dt;
      if(pts.length===0||t-pts[pts.length-1][0]>=0.03) pts.push([t,x]);
    }
    return {x:x,pts:pts};
  }
  function draw(){
    $('dlbl').textContent=$('dist').value;
    var r=sim(), T=8;
    function PX(tt){return 44+(tt/T)*596;} function PY(x){return 210-(x/400)*190;}
    $('tgt').setAttribute('y1',PY(target)); $('tgt').setAttribute('y2',PY(target)); $('tgtl').setAttribute('y',PY(target)-4);
    $('curve').setAttribute('points', r.pts.map(function(q){return PX(q[0]).toFixed(1)+','+PY(q[1]).toFixed(1);}).join(' '));
    var err=r.x-target;
    $('curve').setAttribute('stroke', Math.abs(err)<=1?'#0B6A3B':(mode==='open'?'#C0392B':'#DD841A'));
    $('rpos').textContent=r.x.toFixed(1)+' mm';
    $('rerr').textContent=(err>=0?'+':'')+err.toFixed(1)+' mm';
    $('rmode').textContent=mode==='open'?'open-loop':'closed-loop';
    var vd=$('verdict');
    if(mode==='open'){vd.className='verdict bad';vd.textContent='Open-loop: the timed command ignores the disturbance, so the platform ends at '+r.x.toFixed(0)+' mm — off by '+err.toFixed(0)+' mm. Nothing measures the position, so nothing corrects it.';}
    else if(Math.abs(err)<=1){vd.className='verdict ok';vd.textContent='Closed-loop: the controller drives the error to '+err.toFixed(1)+' mm — within ±1 mm — and holds against the '+$('dist').value+' mm/s disturbance. Feedback rejects what open-loop cannot.';}
    else {vd.className='verdict bad';vd.textContent='Closed-loop leaves a residual of '+err.toFixed(1)+' mm against this sustained disturbance — proportional control needs some error to hold. Integral action (Lesson 03) erases it.';}
  }
  $('closed').addEventListener('click',function(){mode='closed';this.classList.add('active');$('open').classList.remove('active');draw();});
  $('open').addEventListener('click',function(){mode='open';this.classList.add('active');$('closed').classList.remove('active');draw();});
  $('dist').addEventListener('input',draw); draw();
</script>
</body></html>
