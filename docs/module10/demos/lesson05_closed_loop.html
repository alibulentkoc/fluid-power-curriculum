<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · The closed-loop platform</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--red:#C0392B;--green:#0B6A3B;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:720px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto}
.ctrl{margin-top:12px}.ctrl label{font-size:13px;font-weight:700;color:var(--slate)}
input[type=range]{width:100%;accent-color:#0C6A74;margin-top:5px}
.row{display:flex;gap:8px;margin-top:12px}
.row button{flex:1 1 0;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:13.5px;font-weight:700;padding:11px 8px;border-radius:9px;cursor:pointer}
.row button:hover{border-color:var(--teal)}.row button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
.verd{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.v{flex:1 1 90px;border-radius:10px;padding:9px 10px;border:1px solid}
.v .k{font-size:9px;letter-spacing:.4px;text-transform:uppercase;color:var(--slate)}.v .d{font-size:14px;font-weight:800;font-family:var(--mono)}
.pass{background:#E8F3EC;border-color:#BFE6CF}.pass .d{color:var(--green)}
.note{margin-top:14px;font-size:13px;padding:11px 13px;border-radius:10px;background:#E8F3EC;color:#0B5A3A;border:1px solid #BFE6CF;font-weight:600}
</style></head>
<body><div class="wrap">
<h1>The closed-loop platform</h1>
<p class="sub">Run the full mission: the controller tracks a profile to the target and holds ±1 mm. Add a load disturbance and watch it recover.</p>
<div class="card">
<svg viewBox="0 0 660 250" xmlns="http://www.w3.org/2000/svg">
  <text x="40" y="14" font-size="9.5" font-weight="700" fill="#586876">POSITION (mm)</text>
  <line x1="46" y1="20" x2="46" y2="210" stroke="#1B3A55" stroke-width="1.3"/>
  <line x1="46" y1="210" x2="640" y2="210" stroke="#1B3A55" stroke-width="1.3"/>
  <rect id="band" x="46" y="0" width="594" height="0" fill="#E8F3EC"/>
  <line id="tgt" x1="46" y1="0" x2="640" y2="0" stroke="#0B6A3B" stroke-width="1" stroke-dasharray="4 3"/>
  <text id="tgtl" x="636" y="0" font-size="9" fill="#0B6A3B" text-anchor="end">target ±1 mm</text>
  <line id="distl" x1="0" y1="20" x2="0" y2="210" stroke="#C0392B" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>
  <polyline id="curve" points="" fill="none" stroke="#0E7E8C" stroke-width="2.2"/>
  <text x="636" y="228" font-size="9" fill="#586876" text-anchor="end">time →</text>
</svg>
<div class="ctrl"><label>Target height = <span id="hlbl">500</span> mm</label>
<input id="h" type="range" min="200" max="600" step="20" value="500"/></div>
<div class="row">
  <button id="nodist" class="active">No disturbance</button>
  <button id="dist">Apply load disturbance at hold</button>
</div>
<div class="verd">
  <div class="v pass"><div class="k">Reaches</div><div class="d" id="dt">—</div></div>
  <div class="v pass"><div class="k">Hold error</div><div class="d" id="dh">—</div></div>
  <div class="v pass"><div class="k">After load</div><div class="d" id="dr">—</div></div>
</div>
<div class="note" id="note"></div>
</div></div>
<script>
  var vmax=85,wn=77,zeta=0.12,dt=1e-4,Kp=0.15,Ki=0.4,Kd=0.01,useDist=false,$=function(id){return document.getElementById(id);};
  function profile(t,target,tr){var a=vmax/tr,dr=0.5*a*tr*tr,tc=(target-2*dr)/vmax;
    if(t<tr)return [0.5*a*t*t,a*t]; if(t<tr+tc)return[dr+vmax*(t-tr),vmax];
    if(t<2*tr+tc){var td=t-tr-tc;return[dr+vmax*tc+vmax*td-0.5*a*td*td,vmax-a*td];} return[target,0];}
  function run(target){
    var tr=0.3, dist_at=(target/vmax)+2.0, T=dist_at+4.0;
    var x=0,v=0,w=0,t=0,I=0,eprev=0,pts=[],arrive=null,holdmax=0,finalerr=0;
    while(t<T){ var p=profile(t,target,tr),xsp=p[0],vsp=p[1]; var e=xsp-x,de=(e-eprev)/dt; eprev=e;
      var d=(useDist&&t>=dist_at)?-4.0:0;
      var u=Math.max(-1,Math.min(1,vsp/vmax+Kp*e+Ki*I+Kd*de));
      if(Math.abs(u)<0.999) I+=e*dt;
      var dv=w,dw=wn*wn*(vmax*u+d-v)-2*zeta*wn*w; v+=dv*dt; w+=dw*dt; x+=v*dt; t+=dt;
      if(arrive===null&&t>1&&Math.abs(target-x)<1) arrive=t;
      if(arrive&&t>arrive+0.4&&t<dist_at) holdmax=Math.max(holdmax,Math.abs(target-x));
      if(pts.length===0||t-pts[pts.length-1][0]>=0.02) pts.push([t,x]);
    }
    finalerr=target-x;
    return {pts:pts,arrive:arrive,holdmax:holdmax,finalerr:finalerr,dist_at:dist_at,T:T};
  }
  function draw(){
    var target=+$('h').value; $('hlbl').textContent=target;
    var r=run(target), T=r.T, ymax=target*1.15;
    function PX(t){return 46+(t/T)*594;} function PY(x){return 210-(x/ymax)*190;}
    // band +/-1mm exaggerated to visible ~ +/-6px
    var yb=PY(target);
    $('band').setAttribute('y',(yb-6)); $('band').setAttribute('height',12);
    $('tgt').setAttribute('y1',yb); $('tgt').setAttribute('y2',yb); $('tgtl').setAttribute('y',yb-8);
    $('curve').setAttribute('points', r.pts.map(function(q){return PX(q[0]).toFixed(1)+','+Math.max(6,Math.min(214,PY(q[1]))).toFixed(1);}).join(' '));
    if(useDist){$('distl').setAttribute('x1',PX(r.dist_at)); $('distl').setAttribute('x2',PX(r.dist_at)); $('distl').setAttribute('opacity','1');}
    else $('distl').setAttribute('opacity','0');
    $('dt').textContent=r.arrive.toFixed(1)+' s';
    $('dh').textContent=r.holdmax.toFixed(2)+' mm';
    $('dr').textContent=useDist?(Math.abs(r.finalerr).toFixed(2)+' mm'):'—';
    var n=$('note');
    if(useDist) n.textContent='Reaches '+target+' mm in '+r.arrive.toFixed(1)+' s, holds within '+r.holdmax.toFixed(2)+' mm. A -4 mm/s load hits at hold — the integral drives the platform back to target (final error '+Math.abs(r.finalerr).toFixed(2)+' mm). ±1 mm held and defended.';
    else n.textContent='Reaches '+target+' mm in '+r.arrive.toFixed(1)+' s and settles to '+r.holdmax.toFixed(2)+' mm — far inside ±1 mm, no overshoot. The profile gives the clean approach; the PID trims to exact. Try the load disturbance.';
  }
  $('h').addEventListener('input',draw);
  $('nodist').addEventListener('click',function(){useDist=false;this.classList.add('active');$('dist').classList.remove('active');draw();});
  $('dist').addEventListener('click',function(){useDist=true;this.classList.add('active');$('nodist').classList.remove('active');draw();});
  draw();
</script>
</body></html>
