" font-size="8.5" font-weight="700" fill="#0B5A63">pilot</text><line x1="274" y1="222" x2="288" y2="240" stroke="#DD841A" stroke-width="1.2"/><line x1="274" y1="250" x2="286" y2="258" stroke="#DD841A" stroke-width="1.2"/><line x1="256" y1="432" x2="270" y2="440" stroke="#DD841A" stroke-width="1.2"/><line x1="226" y1="548" x2="238" y2="556" stroke="#DD841A" stroke-width="1.2"/><circle cx="262" cy="222" r="12" fill="#DD841A" stroke="#fff" stroke-width="2"/><text x="262" y="226.5" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text><circle cx="262" cy="250" r="12" fill="#DD841A" stroke="#fff" stroke-width="2"/><text x="262" y="254.5" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4</text><circle cx="244" cy="432" r="12" fill="#DD841A" stroke="#fff" stroke-width="2"/><text x="244" y="436.5" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text><circle cx="214" cy="548" r="12" fill="#DD841A" stroke="#fff" stroke-width="2"/><text x="214" y="552.5" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
<rect x="20" y="708" width="680" height="140" rx="12" fill="#fff" stroke="#E2E8F0"/>
<circle cx="42" cy="730" r="12" fill="#DD841A" stroke="#fff" stroke-width="2"/><text x="42" y="734.5" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
<text x="62" y="727" font-size="12.5" font-weight="700" fill="#0C2235">Hose burst</text>
<text x="62" y="743" font-size="11" fill="#586876">Counterbalance at the cylinder cap — upstream of the hose; stays shut with no pilot, so the load hangs on a closed valve.</text>
<circle cx="42" cy="762" r="12" fill="#1B3A55" stroke="#fff" stroke-width="2"/><text x="42" y="766.5" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
<text x="62" y="759" font-size="12.5" font-weight="700" fill="#0C2235">Power loss</text>
<text x="62" y="775" font-size="11" fill="#586876">Spring-centred directional valve snaps to the blocked tandem centre; pump stops, so no pilot — counterbalance holds.</text>
<circle cx="42" cy="794" r="12" fill="#0E7E8C" stroke="#fff" stroke-width="2"/><text x="42" y="798.5" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
<text x="62" y="791" font-size="12.5" font-weight="700" fill="#0C2235">Overload</text>
<text x="62" y="807" font-size="11" fill="#586876">Relief valve on the pressure line caps the system at 115 bar; the load cannot over-pressurise the circuit.</text>
<circle cx="42" cy="826" r="12" fill="#DD841A" stroke="#fff" stroke-width="2"/><text x="42" y="830.5" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4</text>
<text x="62" y="823" font-size="12.5" font-weight="700" fill="#0C2235">Runaway descent</text>
<text x="62" y="839" font-size="11" fill="#586876">Counterbalance back-pressure (set 130 bar) meters the descent; it opens only with the ~10 bar rod-line pilot.</text>
</svg>