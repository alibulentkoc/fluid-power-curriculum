<svg viewBox="0 0 720 860" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif" role="img" aria-label="The complete platform circuit annotated with four fail-safe protections. Marker 1 on the counterbalance valve: a burst cap hose leaves the load on this shut, cylinder-mounted valve. Marker 2 on the spring-centred directional valve: power loss returns it to the blocked tandem centre. Marker 3 on the relief valve: overload is capped at 115 bar. Marker 4 on the counterbalance valve: an overrunning descent is metered by its back-pressure. Three of the four protections are the counterbalance valve, which must be mounted at the cylinder and piloted from the rod line."><defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#0E7E8C"/></marker></defs>
