<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Reading a hydraulic circuit</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal2:#1FB6AE;--amber:#DD841A;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  svg{display:block;width:100%;height:auto;background:#F2F6F9;border:1px solid var(--line);border-radius:12px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
  .grid button{background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:12px;font-weight:600;padding:9px 4px;border-radius:10px;cursor:pointer}
  .grid button:hover{border-color:var(--teal)} .grid button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
  .info{margin-top:14px;border-radius:12px;padding:14px;border:1px solid var(--line);background:var(--bg)}
  .info .nm{font-size:15px;font-weight:700} .info .fn{font-size:13px;color:var(--slate);margin-top:3px} .info .md{font-family:var(--mono);font-size:11px;color:var(--teal);margin-top:4px}
  .hr{height:1px;background:var(--line);margin:16px 0}
  .lab{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
  .toggle{display:flex;gap:8px}
  .toggle button{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:13px;font-weight:600;padding:10px;border-radius:10px;cursor:pointer}
  .toggle button:hover{border-color:var(--teal)} .toggle button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
  .note{margin-top:12px;font-size:13px;padding:10px 12px;border-radius:10px;background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <h1>Reading a hydraulic circuit — the ISO 1219 symbols</h1>
  <p class="sub">Pick a component to see its symbol, what it does, and which module built it. Symbols are functional, not pictorial. Then compare the line types that carry power versus commands.</p>

  <div class="card">
    <svg id="sym" viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="grid">
      <button data-k="reservoir">Reservoir</button><button data-k="pump" class="active">Pump</button>
      <button data-k="motor">Motor</button><button data-k="relief">Relief</button>
      <button data-k="filter">Filter</button><button data-k="dcv">4/3 valve</button>
      <button data-k="cbv">Pilot check</button><button data-k="cyl">Cylinder</button>
    </div>
    <div class="info"><div class="nm" id="nm"></div><div class="fn" id="fn"></div><div class="md" id="md"></div></div>

    <div class="hr"></div>
    <div class="lab">Line type</div>
    <div class="toggle"><button id="lWork" class="active">Working</button><button id="lPilot">Pilot</button><button id="lDrain">Drain</button></div>
    <svg id="lineSvg" viewBox="0 0 320 40" xmlns="http://www.w3.org/2000/svg" style="height:40px;margin-top:10px"></svg>
    <div class="note" id="lineNote"></div>
  </div>
</div>

<script>
  const I='#1B3A55', T='#0E7E8C', A='#DD841A';
  const AH='<defs><marker id="ai" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="'+I+'"/></marker><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="'+T+'"/></marker></defs>';
  const SYM={
    reservoir:{nm:'Reservoir',fn:'Open-topped box — the oil source and return; a return line ends above the bottom, the suction reaches the bottom.',md:'Module 05',
      svg:`<line x1="126.0" y1="35.4" x2="126.0" y2="66.0" stroke="#1B3A55" stroke-width="1.8"/>
<line x1="126.0" y1="66.0" x2="194.0" y2="66.0" stroke="#1B3A55" stroke-width="1.8"/>
<line x1="194.0" y1="66.0" x2="194.0" y2="35.4" stroke="#1B3A55" stroke-width="1.8"/>`},
    pump:{nm:'Fixed-displacement pump',fn:'Circle with a solid triangle pointing OUT to the outlet — makes flow; the shaft on the other side is driven by the motor.',md:'Module 05',
      svg:`<circle cx="160.0" cy="66.0" r="24.0" fill="none" stroke="#1B3A55" stroke-width="1.3"/>
<polygon points="154.0,52.5 160.0,42.0 166.0,52.5" fill="#1B3A55" stroke="#1B3A55" stroke-width="1"/>
<line x1="160.0" y1="42.0" x2="160.0" y2="24.0" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="160.0" y1="90.0" x2="160.0" y2="108.0" stroke="#1B3A55" stroke-width="1.6"/>`},
    motor:{nm:'Electric motor',fn:'Circle marked M with a drive shaft — the prime mover that turns the pump. (A hydraulic motor, by contrast, is a circle with a triangle pointing IN.)',md:'Module 05',
      svg:`<circle cx="160.0" cy="66.0" r="24.0" fill="none" stroke="#1B3A55" stroke-width="1.3"/>
<text x="160" y="74.25" font-size="24" font-weight="700" fill="#1B3A55" text-anchor="middle" font-family="sans-serif">M</text>
<line x1="160.0" y1="42.0" x2="160.0" y2="24.0" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="160.0" y1="90.0" x2="160.0" y2="108.0" stroke="#1B3A55" stroke-width="1.6"/>`},
    relief:{nm:'Pressure relief valve',fn:'A square, normally closed by an adjustable spring on top, with an internal pilot sensing the inlet: when inlet pressure beats the spring, the arrow-path opens the pressure port to tank.',md:'Module 05',
      svg:`<rect x="138.4" y="44.4" width="43.2" height="43.2" fill="none" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="176.2" y1="79.5" x2="143.8" y2="79.5" stroke="#1B3A55" stroke-width="1.6"/>
<polygon points="149.2,76.1 143.8,79.5 149.2,82.9" fill="#1B3A55" stroke="#1B3A55" stroke-width="1"/>
<polyline points="160.0,44.4 166.8,39.0 153.2,32.2 166.8,25.5 153.2,18.8 160.0,13.3" fill="none" stroke="#1B3A55" stroke-width="1.4"/>
<line x1="149.2" y1="41.7" x2="170.8" y2="10.6" stroke="#1B3A55" stroke-width="1.4"/>
<polygon points="170.8,10.6 166.8,14.7 169.4,16.0" fill="#1B3A55" stroke="#1B3A55" stroke-width="1"/>
<line x1="138.4" y1="79.5" x2="124.9" y2="79.5" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="181.6" y1="79.5" x2="195.1" y2="79.5" stroke="#1B3A55" stroke-width="1.6"/>
<polyline points="187.0,79.5 187.0,95.7 160.0,95.7 160.0,87.6" fill="none" stroke="#1B3A55" stroke-width="1.2" stroke-dasharray="4 2"/>`},
    filter:{nm:'Filter',fn:'Diamond with a dashed line PERPENDICULAR to the flow — cleans the oil to the target contamination level.',md:'Module 02',
      svg:`<polyline points="160.0,42.6 183.4,66.0 160.0,89.4 136.6,66.0 160.0,42.6" fill="none" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="136.6" y1="66.0" x2="183.4" y2="66.0" stroke="#1B3A55" stroke-width="1.2" stroke-dasharray="3 2"/>
<line x1="160.0" y1="42.6" x2="160.0" y2="32.2" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="160.0" y1="89.4" x2="160.0" y2="99.8" stroke="#1B3A55" stroke-width="1.6"/>`},
    dcv:{nm:'4/3 directional valve (tandem centre)',fn:'Three envelopes — one per spool position. Ports P, T, A, B attach to the centre; here the tandem centre links P to T and blocks A and B. Solenoids shift it, springs re-centre it.',md:'Module 06',
      svg:`${AH}<rect x="112.0" y="48.0" width="32" height="36" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/>
<rect x="144.0" y="48.0" width="32" height="36" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/>
<rect x="176.0" y="48.0" width="32" height="36" fill="#fff" stroke="#1B3A55" stroke-width="1.8"/>
<polyline points="151,81.0 151,74 169,74 169,81.0" fill="none" stroke="#0E7E8C" stroke-width="1.5"/>
<line x1="151" y1="51.0" x2="151" y2="57" stroke="#0E7E8C" stroke-width="1.4"/><line x1="147.5" y1="57" x2="154.5" y2="57" stroke="#0E7E8C" stroke-width="1.4"/>
<line x1="169" y1="51.0" x2="169" y2="57" stroke="#0E7E8C" stroke-width="1.4"/><line x1="165.5" y1="57" x2="172.5" y2="57" stroke="#0E7E8C" stroke-width="1.4"/>
<line x1="121.0" y1="80.0" x2="121.0" y2="54.0" stroke="#0E7E8C" stroke-width="1.3" marker-end="url(#ah)"/><line x1="135.0" y1="52.0" x2="135.0" y2="78.0" stroke="#0E7E8C" stroke-width="1.3" marker-end="url(#ah)"/>
<line x1="185.0" y1="80.0" x2="199.0" y2="54.0" stroke="#0E7E8C" stroke-width="1.3" marker-end="url(#ah)"/><line x1="199.0" y1="80.0" x2="185.0" y2="54.0" stroke="#0E7E8C" stroke-width="1.3" marker-end="url(#ah)"/>
<rect x="96.0" y="58" width="14" height="16" fill="none" stroke="#1B3A55" stroke-width="1.3"/><line x1="96.0" y1="74" x2="110.0" y2="58" stroke="#1B3A55" stroke-width="1.1"/>
<rect x="210.0" y="58" width="14" height="16" fill="none" stroke="#1B3A55" stroke-width="1.3"/><line x1="210.0" y1="74" x2="224.0" y2="58" stroke="#1B3A55" stroke-width="1.1"/>
<text x="151" y="44.0" font-size="9" font-weight="700" fill="#1B3A55" text-anchor="middle">A</text>
<text x="169" y="44.0" font-size="9" font-weight="700" fill="#1B3A55" text-anchor="middle">B</text>
<text x="151" y="95.0" font-size="9" font-weight="700" fill="#1B3A55" text-anchor="middle">P</text>
<text x="169" y="95.0" font-size="9" font-weight="700" fill="#1B3A55" text-anchor="middle">T</text>`},
    cbv:{nm:'Pilot-operated check valve',fn:'A hollow ball on a V-seat: free flow lifts the ball (to raise), reverse flow seats it drop-tight (to hold). A dashed pilot line unseats it for a controlled descent.',md:'Module 06',
      svg:`<rect x="135.7" y="44.4" width="48.6" height="43.2" fill="none" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="99.2" y1="66.0" x2="135.7" y2="66.0" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="184.3" y1="66.0" x2="220.8" y2="66.0" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="135.7" y1="66.0" x2="151.9" y2="66.0" stroke="#1B3A55" stroke-width="1.6"/>
<line x1="174.8" y1="66.0" x2="184.3" y2="66.0" stroke="#1B3A55" stroke-width="1.6"/>
<polyline points="166.8,56.5 174.8,66.0 166.8,75.5" fill="none" stroke="#1B3A55" stroke-width="1.3"/>
<circle cx="160.0" cy="66.0" r="8.1" fill="#FFFFFF" stroke="#1B3A55" stroke-width="1.3"/>
<polyline points="173.5,44.4 200.5,44.4 200.5,28.2" fill="none" stroke="#1B3A55" stroke-width="1.2" stroke-dasharray="4 2"/>`},
    cyl:{nm:'Double-acting cylinder',fn:'Barrel with a piston and a rod through the end cap; two ports (cap side and rod side) let it be driven both ways — extend to raise, retract to lower.',md:'Module 04',
      svg:`<rect x="123.8" y="51.5" width="72.5" height="29.0" fill="none" stroke="#1B3A55" stroke-width="1.8"/>
<line x1="132.4" y1="51.5" x2="132.4" y2="44.2" stroke="#1B3A55" stroke-width="1.4"/>
<line x1="187.6" y1="51.5" x2="187.6" y2="44.2" stroke="#1B3A55" stroke-width="1.4"/>
<rect x="141.2" y="53.0" width="7.2" height="26.1" fill="none" stroke="#1B3A55" stroke-width="1.5"/>
<line x1="148.4" y1="66.0" x2="232.5" y2="66.0" stroke="#1B3A55" stroke-width="1.8"/>`},
  };
  const $=id=>document.getElementById(id);
  function pick(k,btn){
    for(const b of document.querySelectorAll('.grid button')) b.classList.toggle('active',b===btn);
    const s=SYM[k]; $('sym').innerHTML=s.svg; $('nm').textContent=s.nm; $('fn').textContent=s.fn; $('md').textContent='built in '+s.md;
  }
  document.querySelectorAll('.grid button').forEach(b=>b.onclick=()=>pick(b.dataset.k,b));
  const LINES={
    work:{d:`<line x1="20" y1="20" x2="300" y2="20" stroke="${I}" stroke-width="3"/>`,note:'Solid line — a working (power) line carrying the main flow from pump to actuator.'},
    pilot:{d:`<line x1="20" y1="20" x2="300" y2="20" stroke="${T}" stroke-width="2.5" stroke-dasharray="7 4"/>`,note:'Dashed line — a pilot line carrying a command (e.g. the signal that opens the counterbalance valve), not power.'},
    drain:{d:`<line x1="20" y1="20" x2="300" y2="20" stroke="#8AA0AE" stroke-width="2" stroke-dasharray="2 4"/>`,note:'Drain line — spent or leaked oil bled back to tank at near-zero pressure.'},
  };
  function line(k,btn){ [$('lWork'),$('lPilot'),$('lDrain')].forEach(b=>b.classList.toggle('active',b===btn)); const l=LINES[k]; $('lineSvg').innerHTML=l.d; $('lineNote').textContent=l.note; }
  $('lWork').onclick=()=>line('work',$('lWork')); $('lPilot').onclick=()=>line('pilot',$('lPilot')); $('lDrain').onclick=()=>line('drain',$('lDrain'));
  pick('pump',document.querySelector('.grid button.active')); line('work',$('lWork'));
</script>
</body>
</html>
