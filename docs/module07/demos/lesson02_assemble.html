<style>

*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:760px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto;background:#F5F8FA;border:1px solid var(--line);border-radius:12px}
.row{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.row button{flex:1 1 auto;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:12.5px;font-weight:600;padding:9px 10px;border-radius:9px;cursor:pointer}
.row button:hover{border-color:var(--teal)}.row button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
.note{margin-top:12px;font-size:13px;padding:11px 13px;border-radius:10px;background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2;font-weight:600}
.wire{transition:opacity .15s}
</style></head>

<button data-k="rod">Rod line (B)</button>

<script>
const NOTES={"supply": "Supply (P): the motor drives the pump, which draws from the reservoir and delivers 10 L/min up the pressure line to the valve\u2019s P port. The relief valve is teed off that line \u2014 inlet on the pressure line, outlet to tank \u2014 capping the system at 115 bar.", "return": "Return (T): the valve\u2019s T port sends spent oil down through the filter and into the reservoir.", "cap": "Cap line (A): port A rises through the counterbalance valve to the cylinder\u2019s cap-end port \u2014 the line that holds the load, which is why the counterbalance valve sits here.", "rod": "Rod line (B): port B runs to the cylinder\u2019s rod-end port. Pressurising it drives the descent and supplies the pilot.", "pilot": "Pilot: a dashed line taps the rod line and opens the counterbalance valve to lower. Tapped from the rod line, it opens only while the pump drives the descent \u2014 fail-safe."};
const GROUPS=["supply","return","cap","rod","pilot"];
const $=id=>document.getElementById(id);
function pick(k,btn){document.querySelectorAll('.row button').forEach(b=>b.classList.toggle('active',b===btn));GROUPS.forEach(g=>{const el=$('grp-'+g);if(el)el.style.opacity=(g===k)?'1':'0.12';});$('note').textContent=NOTES[k];}
document.querySelectorAll('.row button').forEach(b=>b.onclick=()=>pick(b.dataset.k,b));
pick('supply',document.querySelector('.row button.active'));
</script></body></html>
