<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · The complete fail-safe circuit</title>
<style>
:root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;--teal:#0E7E8C;--amber:#DD841A;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
.wrap{max-width:760px;margin:0 auto}h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
svg{display:block;width:100%;height:auto;background:#F5F8FA;border:1px solid var(--line);border-radius:12px}
ellipse[id^="hl-"]{transition:opacity .2s}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.row button{flex:1 1 auto;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:13px;font-weight:700;padding:10px 8px;border-radius:9px;cursor:pointer}
.row button:hover{border-color:var(--teal)}.row button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
.status{margin-top:14px;display:inline-block;font-size:13px;font-weight:800;letter-spacing:.5px;padding:7px 14px;border-radius:999px;background:#E8F3EC;color:#0B6A3B;border:1px solid #BFE6CF}
.note{margin-top:12px;font-size:13px;padding:12px 14px;border-radius:10px;background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2;font-weight:600}
</style></head>

<div class="row">
<button data-k="burst" class="active">Burst hose</button>
<button data-k="power">Power loss</button>
<button data-k="overload">Overload</button>
<button data-k="runaway">Runaway descent</button>
</div>
<div><span class="status" id="status"></span></div>
<div class="note" id="note"></div>
</div></div>
<script>
const FAULTS={"burst": {"rings": ["hl-cbv"], "status": "LOAD HELD", "note": "BURST CAP HOSE \u2014 the counterbalance valve is bolted to the cylinder\u2019s cap port, upstream of the hose. With no rod-line pilot it stays shut, so the burst just empties a dead hose while the load hangs on a closed valve. A valve out at the manifold would NOT protect this."}, "power": {"rings": ["hl-dcv", "hl-cbv"], "status": "LOAD HELD", "note": "POWER LOSS \u2014 the directional valve is spring-centred, so it snaps back to the blocked tandem centre. The pump stops, so there is no pilot, and the counterbalance holds the cap oil drop-tight. The load freezes exactly where it was."}, "overload": {"rings": ["hl-rel"], "status": "PRESSURE CAPPED", "note": "OVERLOAD \u2014 the relief valve on the pressure line opens at 115 bar and spills the excess to tank. The pump and lines are protected; the load simply cannot drive the pressure past the relief setting."}, "runaway": {"rings": ["hl-cbv"], "status": "DESCENT METERED", "note": "RUNAWAY DESCENT \u2014 the counterbalance, set at 130 bar (1.3\u00d7 the load), provides back-pressure and meters the outflow. It opens only with the ~10 bar rod-line pilot, so an overrunning load cannot accelerate away."}};
const RINGS=["hl-cbv","hl-dcv","hl-rel"];
const $=id=>document.getElementById(id);
function pick(k,btn){document.querySelectorAll('.row button').forEach(b=>b.classList.toggle('active',b===btn));const F=FAULTS[k];const on=new Set(F.rings);RINGS.forEach(r=>{const el=$(r);if(el)el.style.opacity=on.has(r)?'1':'0';});$('status').textContent=F.status;$('note').textContent=F.note;}
document.querySelectorAll('.row button').forEach(b=>b.onclick=()=>pick(b.dataset.k,b));
pick('burst',document.querySelector('.row button.active'));
</script></body></html>
