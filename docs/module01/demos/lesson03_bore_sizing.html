<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Sizing the cylinder for the load</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--amber:#DD841A;--green:#1B8A5A;--red:#C2463B;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:780px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  svg{display:block;width:100%;height:auto;background:#F2F6F9;border:1px solid var(--line);border-radius:12px}
  #lifter{transition:transform .35s ease}
  .controls{display:grid;gap:16px;margin-top:18px}
  .ctl label{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;margin-bottom:8px}
  .ctl .val{font-family:var(--mono);font-size:15px;color:var(--teal);font-weight:700}
  input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:6px;background:#E3EAF0;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--teal);cursor:pointer;box-shadow:0 1px 4px rgba(12,34,53,.25)}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--teal);cursor:pointer}
  .out{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:18px}
  .tile{border-radius:12px;padding:12px 14px;border:1px solid var(--line);background:var(--bg)}
  .tile .k{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
  .tile .v{font-family:var(--mono);font-size:20px;font-weight:700;margin-top:3px}
  .tile.area .v{color:var(--teal)}.tile.force .v{color:var(--amber)}
  .tile.status{border:none}.tile.status .v{font-family:var(--sans);font-size:16px}
  .tile.status.ok{background:#E7F6EE}.tile.status.ok .v{color:var(--green)}.tile.status.ok .k{color:var(--green)}
  .tile.status.no{background:#FBECEA}.tile.status.no .v{color:var(--red)}.tile.status.no .k{color:var(--red)}
  .note{font-size:12.5px;color:var(--slate);margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sizing the cylinder for the load</h1>
  <p class="sub">The platform must lift two tonnes. Choose a bore and a pressure. Force = pressure × area, so a wider piston multiplies the force. Find the smallest bore that lifts the load at 100 bar.</p>

  <div class="card">
    <svg id="rig" viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif">
      <!-- guide rails -->
      <rect x="372" y="60" width="12" height="250" rx="3" fill="#D7E0E8"/>
      <rect x="556" y="60" width="12" height="250" rx="3" fill="#D7E0E8"/>

      <!-- POWER UNIT + outlet port -->
      <rect x="20" y="196" width="138" height="114" rx="10" fill="#fff" stroke="#1B3A55" stroke-width="2.5"/>
      <text x="34" y="220" font-size="12" font-weight="700" letter-spacing="1" fill="#0E7E8C">POWER UNIT</text>
      <circle cx="58" cy="262" r="20" fill="#1B3A55"/>
      <text x="58" y="268" font-size="13" font-weight="700" fill="#7FD7D0" text-anchor="middle" font-family="'IBM Plex Mono',monospace">M</text>
      <rect x="92" y="248" width="52" height="30" rx="5" fill="#F1F6F9" stroke="#CBD7E0"/>
      <rect x="156" y="262" width="12" height="16" rx="2" fill="#1B3A55"/>

      <!-- CYLINDER (bore set by JS) -->
      <rect id="barrel" x="430" y="170" width="80" height="140" rx="8" fill="#fff" stroke="#1B3A55" stroke-width="2.5"/>
      <rect id="capFluid" x="436" y="250" width="68" height="54" rx="3" fill="#1FB6AE" opacity="0.9"/>
      <rect id="piston" x="436" y="234" width="68" height="16" rx="3" fill="#1B3A55"/>
      <rect x="464" y="306" width="12" height="9" rx="2" fill="#1B3A55"/>  <!-- cap port -->

      <!-- HOSE: outlet port -> under frame -> cap port -->
      <path d="M168,270 H300 V330 H470 V315" fill="none" stroke="#0E7E8C" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- gauge -->
      <g transform="translate(300,270)">
        <circle cx="0" cy="0" r="22" fill="#fff" stroke="#1B3A55" stroke-width="2.5"/>
        <line id="needle" x1="0" y1="0" x2="-11" y2="-15" stroke="#C2463B" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="0" cy="0" r="3" fill="#1B3A55"/>
        <text id="gaugeTxt" x="0" y="-30" font-size="12" font-weight="600" fill="#1B3A55" text-anchor="middle" font-family="'IBM Plex Mono',monospace">100 bar</text>
      </g>

      <!-- lifter: rod + platform + load (rises only when it lifts) -->
      <g id="lifter">
        <rect id="rod" x="463" y="150" width="14" height="92" fill="#5B6B79"/>
        <rect x="384" y="136" width="172" height="14" rx="4" fill="#1B3A55"/>
        <rect x="438" y="102" width="64" height="34" rx="5" fill="#DD841A"/>
        <text x="470" y="124" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="'IBM Plex Mono',monospace">2 t</text>
      </g>
    </svg>

    <div class="controls">
      <div class="ctl"><label>Cylinder bore (piston diameter) <span class="val"><span id="bVal">50</span> mm</span></label>
        <input id="b" type="range" min="20" max="80" step="1" value="50"/></div>
      <div class="ctl"><label>Working pressure <span class="val"><span id="pVal">100</span> bar</span></label>
        <input id="p" type="range" min="40" max="160" step="5" value="100"/></div>
    </div>

    <div class="out">
      <div class="tile area"><div class="k">Piston area</div><div class="v"><span id="aOut">19.6</span> <span style="font-size:12px;color:var(--slate)">cm²</span></div></div>
      <div class="tile force"><div class="k">Force out</div><div class="v"><span id="fOut">19.6</span> <span style="font-size:12px;color:var(--slate)">kN</span></div></div>
      <div class="tile status ok" id="statusTile"><div class="k" id="statusK">Lifts 2 t</div><div class="v" id="statusV">✓</div></div>
    </div>
    <p class="note" id="note"></p>
  </div>
</div>

<script>
  const B=document.getElementById('b'),P=document.getElementById('p');
  const bVal=document.getElementById('bVal'),pVal=document.getElementById('pVal');
  const aOut=document.getElementById('aOut'),fOut=document.getElementById('fOut');
  const needle=document.getElementById('needle'),gaugeTxt=document.getElementById('gaugeTxt'),note=document.getElementById('note');
  const barrel=document.getElementById('barrel'),capFluid=document.getElementById('capFluid'),piston=document.getElementById('piston'),lifter=document.getElementById('lifter');
  const statusTile=document.getElementById('statusTile'),statusK=document.getElementById('statusK'),statusV=document.getElementById('statusV');
  const CX=470, LOAD=19620, PMAX=160;   // load = 2 t = 19,620 N

  function update(){
    const bore=+B.value, p=+P.value;
    bVal.textContent=bore; pVal.textContent=p;
    const A=Math.PI/4*(bore/1000)**2;     // m^2
    const F=p*1e5*A;                       // N
    aOut.textContent=(A*1e4).toFixed(1);   // cm^2
    fOut.textContent=(F/1000).toFixed(1);  // kN
    gaugeTxt.textContent=p+' bar';
    const a=(-120+Math.min(1,p/PMAX)*240)*Math.PI/180, L=17;
    needle.setAttribute('x2',(L*Math.sin(a)).toFixed(1)); needle.setAttribute('y2',(-L*Math.cos(a)).toFixed(1));

    // bore drives the visible barrel/piston width (centered on CX)
    const W=Math.max(40,Math.min(150,bore*1.6));
    barrel.setAttribute('x',CX-W/2); barrel.setAttribute('width',W);
    capFluid.setAttribute('x',CX-W/2+6); capFluid.setAttribute('width',W-12);
    piston.setAttribute('x',CX-W/2+6); piston.setAttribute('width',W-12);

    const lifts = F>=LOAD;
    lifter.style.transform = lifts ? 'translateY(-34px)' : 'translateY(0)';
    statusTile.className = 'tile status '+(lifts?'ok':'no');
    statusK.textContent = lifts?'Lifts 2 t':'Too small';
    statusV.textContent = lifts?'✓':'✗';
    const margin=(F-LOAD)/1000;
    note.textContent = lifts
      ? `${(F/1000).toFixed(1)} kN of force, ${margin>=0?'+':''}${margin.toFixed(1)} kN over the 19.6 kN load — the platform lifts. A 50 mm bore at 100 bar is the smallest that just clears it.`
      : `${(F/1000).toFixed(1)} kN is short of the 19.6 kN needed. Widen the bore (area grows with diameter squared) or raise the pressure.`;
  }
  [B,P].forEach(el=>el.addEventListener('input',update));
  update();
</script>
</body>
</html>
