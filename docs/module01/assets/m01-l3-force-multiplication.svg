<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Pressure entering the cap port pushes up across the whole piston area, producing a large force that lifts the load. Force equals pressure times area.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient>
    <linearGradient id="fluid" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1FB6AE"/><stop offset="1" stop-color="#0E7E8C"/></linearGradient>
    <linearGradient id="load" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F4A93C"/><stop offset="1" stop-color="#DD841A"/></linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#0C2235" flood-opacity="0.16"/></filter>
  </defs>

  <rect x="0" y="0" width="760" height="540" rx="20" fill="url(#bg)"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#0C2235">A small pressure, a large force</text>
  <text x="40" y="76" font-size="15" font-weight="400" fill="#586876">Pressure pushes on every bit of the piston&#8217;s area &#8212; and area is what multiplies it into tonnes.</text>

  <!-- LOAD + short lift arrow (clear of subtitle) -->
  <g filter="url(#soft)"><rect x="318" y="128" width="150" height="56" rx="8" fill="url(#load)"/></g>
  <text x="393" y="163" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="'IBM Plex Mono',ui-monospace,monospace">2 t</text>
  <line x1="393" y1="122" x2="393" y2="106" stroke="#DD841A" stroke-width="6" stroke-linecap="round"/>
  <polygon points="393,94 383,110 403,110" fill="#DD841A"/>
  <text x="420" y="114" font-size="15" font-weight="700" letter-spacing="1.2" fill="#DD841A">FORCE</text>
  <text x="420" y="134" font-size="13" font-weight="600" fill="#1B3A55" font-family="'IBM Plex Mono',ui-monospace,monospace">19.6 kN</text>

  <!-- CYLINDER -->
  <rect x="300" y="206" width="186" height="290" rx="10" fill="#FFFFFF" stroke="#1B3A55" stroke-width="3"/>
  <rect x="383" y="184" width="20" height="164" fill="#5B6B79"/>
  <rect x="306" y="330" width="174" height="22" rx="3" fill="#1B3A55"/>
  <rect x="306" y="352" width="174" height="138" rx="5" fill="url(#fluid)" opacity="0.9"/>
  <g stroke="#0C2235" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="330" y1="474" x2="330" y2="402"/><polygon points="330,394 324,406 336,406" fill="#0C2235"/>
    <line x1="365" y1="474" x2="365" y2="402"/><polygon points="365,394 359,406 371,406" fill="#0C2235"/>
    <line x1="400" y1="474" x2="400" y2="402"/><polygon points="400,394 394,406 406,406" fill="#0C2235"/>
    <line x1="435" y1="474" x2="435" y2="402"/><polygon points="435,394 429,406 441,406" fill="#0C2235"/>
    <line x1="460" y1="474" x2="460" y2="402"/><polygon points="460,394 454,406 466,406" fill="#0C2235"/>
  </g>

  <!-- cap PORT + pressure entering it (arrow into the port, no dangling hose) -->
  <rect x="286" y="414" width="16" height="16" rx="2" fill="#1B3A55"/>
  <line x1="232" y1="422" x2="280" y2="422" stroke="#0E7E8C" stroke-width="6" stroke-linecap="round"/>
  <polygon points="286,422 274,415 274,429" fill="#0E7E8C"/>
  <text x="150" y="408" font-size="15" font-weight="700" letter-spacing="1.2" fill="#0E7E8C">PRESSURE</text>
  <text x="150" y="430" font-size="13" font-weight="600" fill="#1B3A55" font-family="'IBM Plex Mono',ui-monospace,monospace">100 bar in</text>

  <!-- piston-area callout -->
  <line x1="506" y1="330" x2="506" y2="352" stroke="#586876" stroke-width="1.5"/>
  <text x="516" y="338" font-size="15" font-weight="700" letter-spacing="1.2" fill="#0E7E8C">PISTON</text>
  <text x="516" y="357" font-size="15" font-weight="700" letter-spacing="1.2" fill="#0E7E8C">AREA</text>
  <text x="516" y="379" font-size="13" font-weight="600" fill="#1B3A55" font-family="'IBM Plex Mono',ui-monospace,monospace">50 mm bore</text>

  <g><rect x="40" y="502" width="680" height="28" rx="8" fill="#13314A"/>
  <text x="380" y="521" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle" font-family="'IBM Plex Mono',ui-monospace,monospace">force = pressure &#215; area</text></g>
</svg>
