<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Every fluid power machine has the same four parts: power unit, line, actuator, load. The actuator is either a cylinder giving linear force, or a motor giving rotary torque.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1B3A55"/><stop offset="1" stop-color="#0C2235"/></linearGradient>
    <linearGradient id="fluid" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1FB6AE"/><stop offset="1" stop-color="#0E7E8C"/></linearGradient>
    <linearGradient id="load" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F4A93C"/><stop offset="1" stop-color="#DD841A"/></linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0C2235" flood-opacity="0.15"/></filter>
  </defs>

  <rect x="0" y="0" width="900" height="480" rx="20" fill="url(#bg)"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#0C2235">The same four parts in every machine</text>
  <text x="40" y="76" font-size="15" font-weight="400" fill="#586876">Power unit, line, actuator, load &#8212; and the actuator is either a cylinder or a motor.</text>

  <!-- ================= ROW 1: LINEAR (cylinder) ================= -->
  <text x="40" y="128" font-size="15" font-weight="700" letter-spacing="1.2" fill="#0E7E8C">LINEAR &#183; cylinder</text>
  <text x="218" y="128" font-size="13" font-weight="400" fill="#586876">&#8212; the lift platform</text>
  <!-- power unit -->
  <g filter="url(#soft)"><rect x="44" y="150" width="104" height="78" rx="10" fill="#FFFFFF" stroke="#D7E0E8"/></g>
  <circle cx="80" cy="189" r="18" fill="url(#steel)"/>
  <text x="80" y="194" font-size="13" font-weight="700" fill="#7FD7D0" text-anchor="middle" font-family="'IBM Plex Mono',ui-monospace,monospace">M</text>
  <text x="118" y="193" font-size="11" fill="#586876" text-anchor="middle">pump</text>
  <rect x="148" y="182" width="11" height="14" rx="2" fill="#1B3A55"/>
  <!-- line + gauge to cap port -->
  <path d="M159,189 H300" fill="none" stroke="url(#fluid)" stroke-width="10" stroke-linecap="round"/>
  <g transform="translate(232,189)"><circle r="18" fill="#fff" stroke="#1B3A55" stroke-width="2.5"/><line x1="0" y1="0" x2="9" y2="-11" stroke="#C2463B" stroke-width="2.5" stroke-linecap="round"/><circle r="2.5" fill="#1B3A55"/></g>
  <rect x="300" y="183" width="12" height="13" rx="2" fill="#1B3A55"/>
  <!-- horizontal cylinder -->
  <rect x="312" y="166" width="120" height="46" rx="6" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2.5"/>
  <rect x="318" y="172" width="40" height="34" rx="3" fill="url(#fluid)" opacity="0.9"/>
  <rect x="358" y="172" width="16" height="34" rx="2" fill="#1B3A55"/>
  <rect x="374" y="182" width="78" height="14" rx="2" fill="#5B6B79"/>
  <!-- load pushed right -->
  <g filter="url(#soft)"><rect x="452" y="162" width="56" height="54" rx="6" fill="url(#load)"/></g>
  <text x="480" y="194" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="'IBM Plex Mono',ui-monospace,monospace">load</text>
  <line x1="514" y1="189" x2="548" y2="189" stroke="#DD841A" stroke-width="5" stroke-linecap="round"/>
  <polygon points="560,189 544,181 544,197" fill="#DD841A"/>
  <text x="566" y="186" font-size="12" font-weight="700" fill="#DD841A">force</text>

  <!-- ================= ROW 2: ROTARY (motor) ================= -->
  <text x="40" y="316" font-size="15" font-weight="700" letter-spacing="1.2" fill="#0E7E8C">ROTARY &#183; motor</text>
  <text x="205" y="316" font-size="13" font-weight="400" fill="#586876">&#8212; a winch or conveyor</text>
  <g filter="url(#soft)"><rect x="44" y="338" width="104" height="78" rx="10" fill="#FFFFFF" stroke="#D7E0E8"/></g>
  <circle cx="80" cy="377" r="18" fill="url(#steel)"/>
  <text x="80" y="382" font-size="13" font-weight="700" fill="#7FD7D0" text-anchor="middle" font-family="'IBM Plex Mono',ui-monospace,monospace">M</text>
  <text x="118" y="381" font-size="11" fill="#586876" text-anchor="middle">pump</text>
  <rect x="148" y="370" width="11" height="14" rx="2" fill="#1B3A55"/>
  <path d="M159,377 H300" fill="none" stroke="url(#fluid)" stroke-width="10" stroke-linecap="round"/>
  <g transform="translate(232,377)"><circle r="18" fill="#fff" stroke="#1B3A55" stroke-width="2.5"/><line x1="0" y1="0" x2="9" y2="-11" stroke="#C2463B" stroke-width="2.5" stroke-linecap="round"/><circle r="2.5" fill="#1B3A55"/></g>
  <rect x="300" y="371" width="12" height="13" rx="2" fill="#1B3A55"/>
  <!-- motor (circle) + shaft + drum -->
  <circle cx="350" cy="377" r="36" fill="url(#steel)"/>
  <path d="M350,353 a24,24 0 1 1 -17,7" fill="none" stroke="#7FD7D0" stroke-width="3"/>
  <polygon points="333,358 344,356 340,367" fill="#7FD7D0"/>
  <rect x="386" y="370" width="60" height="14" rx="2" fill="#5B6B79"/>
  <circle cx="476" cy="377" r="30" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2.5"/>
  <circle cx="476" cy="377" r="8" fill="#1B3A55"/>
  <text x="476" y="424" font-size="11" fill="#586876" text-anchor="middle">drum</text>
  <line x1="514" y1="377" x2="548" y2="377" stroke="#DD841A" stroke-width="5" stroke-linecap="round"/>
  <polygon points="560,377 544,369 544,385" fill="#DD841A"/>
  <text x="566" y="374" font-size="12" font-weight="700" fill="#DD841A">turns</text>

  <!-- shared-architecture note -->
  <g><rect x="620" y="150" width="240" height="266" rx="14" fill="#13314A"/>
  <text x="740" y="184" font-size="13" font-weight="700" letter-spacing="1" fill="#7FD7D0" text-anchor="middle">EVERY MACHINE</text>
  <text x="644" y="220" font-size="14" fill="#FFFFFF">1 &#183; power unit</text>
  <text x="644" y="250" font-size="14" fill="#FFFFFF">2 &#183; line (pressure + flow)</text>
  <text x="644" y="280" font-size="14" fill="#FFFFFF">3 &#183; actuator</text>
  <text x="668" y="306" font-size="13" fill="#9FE7E1">cylinder &#8594; force</text>
  <text x="668" y="328" font-size="13" fill="#9FE7E1">motor &#8594; torque</text>
  <text x="644" y="358" font-size="14" fill="#FFFFFF">4 &#183; load</text>
  <text x="644" y="394" font-size="12" fill="#B9C6D2">Recognize it, and you can read</text>
  <text x="644" y="410" font-size="12" fill="#B9C6D2">any hydraulic machine.</text></g>
</svg>
