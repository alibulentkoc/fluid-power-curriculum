<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="A standard hydraulic circuit for the platform, numbered 1 to 7. An electric motor (2) is coupled by a shaft to a fixed-displacement pump (3); the pump draws fluid up a suction line from the reservoir (1) and delivers it through a pressure line at 100 bar. A relief valve (4) teed off the pressure line returns excess flow to tank. The pressure line feeds the P port of a three-position four-way directional control valve (5); its T port returns through a filter (7) to the reservoir; its A and B ports feed the cap and rod ports of a vertical double-acting cylinder (6) lifting a two-tonne load. P and T are on the supply side of the valve, A and B on the actuator side; the A and B lines do not cross.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient>
    <marker id="fl" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 z" fill="#0E7E8C"/></marker>
    <marker id="flR" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 z" fill="#586876"/></marker>
    <marker id="va" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,1 L9,5 L0,9 z" fill="#1B3A55"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="620" rx="20" fill="url(#bg)"/>
  <text x="40" y="44" font-size="24" font-weight="700" fill="#0C2235">The platform as a standard hydraulic circuit</text>
  <text x="40" y="68" font-size="14" fill="#586876">Every part you sized, drawn with standard symbols and joined into one closed loop.</text>

  <!-- ===== loop caption + numbered parts list (left, empty area) ===== -->
  <rect x="40" y="90" width="338" height="60" rx="11" fill="#13314A"/>
  <text x="58" y="112" font-size="11" font-weight="700" letter-spacing="1" fill="#7FD7D0">ONE CLOSED LOOP</text>
  <text x="58" y="131" font-size="11" fill="#FFFFFF">tank &#8594; pump &#8594; relief &#8594; valve &#8594; cylinder</text>
  <text x="58" y="146" font-size="11" fill="#FFFFFF">&#8594; filter &#8594; back to tank</text>
  <g font-size="11.5" fill="#1B3A55">
    <text x="40" y="182" font-size="11" font-weight="700" letter-spacing="1" fill="#0E7E8C">THE COMPLETE SET</text>
    <text x="44" y="204"><tspan font-weight="700" fill="#0E7E8C">1</tspan>  Reservoir &#8212; holds &amp; cools the fluid</text>
    <text x="44" y="223"><tspan font-weight="700" fill="#0E7E8C">2</tspan>  Electric motor &#8212; 1.67 kW</text>
    <text x="44" y="242"><tspan font-weight="700" fill="#0E7E8C">3</tspan>  Pump &#8212; 10 L/min</text>
    <text x="44" y="261"><tspan font-weight="700" fill="#0E7E8C">4</tspan>  Relief valve &#8212; 100 bar ceiling</text>
    <text x="44" y="280"><tspan font-weight="700" fill="#0E7E8C">5</tspan>  Directional valve (4/3) &#8212; raise / hold / lower</text>
    <text x="44" y="299"><tspan font-weight="700" fill="#0E7E8C">6</tspan>  Double-acting cylinder &#8212; 50 mm &#215; 600 mm</text>
    <text x="44" y="318"><tspan font-weight="700" fill="#0E7E8C">7</tspan>  Return filter</text>
  </g>

  <!-- badge helper look: small teal circle + white number -->
  <!-- ===== RESERVOIR (1) ===== -->
  <path d="M205,520 H220 M205,520 V574 H575 V520 H560" fill="none" stroke="#1B3A55" stroke-width="2.5"/>
  <rect x="207" y="548" width="366" height="24" fill="#DCE7EE"/>
  <text x="390" y="592" font-size="12" font-weight="700" letter-spacing="1.5" fill="#1B3A55" text-anchor="middle">RESERVOIR</text>
  <circle cx="223" cy="533" r="9" fill="#0E7E8C"/><text x="223" y="537" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <!-- ===== MOTOR (2) + PUMP (3) ===== -->
  <circle cx="185" cy="468" r="22" fill="#1B3A55"/><text x="185" y="474" font-size="15" font-weight="700" fill="#7FD7D0" text-anchor="middle" font-family="'IBM Plex Mono',monospace">M</text>
  <circle cx="158" cy="446" r="9" fill="#0E7E8C"/><text x="158" y="450" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <line x1="207" y1="463" x2="241" y2="463" stroke="#1B3A55" stroke-width="2"/>
  <line x1="207" y1="473" x2="241" y2="473" stroke="#1B3A55" stroke-width="2"/>
  <circle cx="263" cy="468" r="22" fill="#FFFFFF" stroke="#0E7E8C" stroke-width="2.5"/>
  <path d="M263,454 L253,476 L273,476 Z" fill="#0E7E8C"/>
  <circle cx="291" cy="446" r="9" fill="#0E7E8C"/><text x="291" y="450" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <!-- suction: tank -> up into pump inlet (flow upward) -->
  <polyline points="263,520 263,490" fill="none" stroke="#586876" stroke-width="3.5" marker-end="url(#flR)"/>
  <text x="255" y="512" font-size="8.5" fill="#586876" text-anchor="end">suction 16 mm</text>

  <!-- ===== PRESSURE LINE (3 -> P) ===== -->
  <polyline points="263,446 263,415 464,415 464,389" fill="none" stroke="#0E7E8C" stroke-width="3.5" marker-end="url(#fl)"/>
  <text x="380" y="408" font-size="9.5" fill="#0B5A63" text-anchor="middle">pressure line &#183; 8 mm &#183; 100 bar</text>

  <!-- ===== RELIEF VALVE (4) ===== -->
  <circle cx="340" cy="415" r="3.2" fill="#0E7E8C"/>
  <polyline points="340,415 340,450" fill="none" stroke="#DD841A" stroke-width="3"/>
  <rect x="318" y="450" width="44" height="44" rx="3" fill="#FDEFD9" stroke="#DD841A" stroke-width="2"/>
  <line x1="328" y1="486" x2="352" y2="458" stroke="#B5670F" stroke-width="2" marker-end="url(#va)"/>
  <polyline points="362,472 367,466 372,478 377,466 382,472" fill="none" stroke="#B5670F" stroke-width="1.6"/>
  <polyline points="330,450 330,506 384,506 384,484" fill="none" stroke="#B5670F" stroke-width="1.2" stroke-dasharray="3 2"/>
  <polyline points="340,494 340,520" fill="none" stroke="#DD841A" stroke-width="3" marker-end="url(#flR)"/>
  <circle cx="340" cy="438" r="9" fill="#0E7E8C"/><text x="340" y="442" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">4</text>

  <!-- ===== DIRECTIONAL CONTROL VALVE (5) — 4/3 closed centre ===== -->
  <rect x="411" y="330" width="44" height="59" fill="#FFFFFF" stroke="#0E7E8C" stroke-width="2"/>
  <rect x="455" y="330" width="44" height="59" fill="#FFFFFF" stroke="#0E7E8C" stroke-width="2.5"/>
  <rect x="499" y="330" width="44" height="59" fill="#FFFFFF" stroke="#0E7E8C" stroke-width="2"/>
  <!-- left box: RAISE (P->A, B->T : crossed) -->
  <line x1="420" y1="382" x2="446" y2="338" stroke="#1B3A55" stroke-width="1.7" marker-end="url(#va)"/>
  <line x1="420" y1="338" x2="446" y2="382" stroke="#1B3A55" stroke-width="1.7" marker-end="url(#va)"/>
  <!-- centre box: closed centre -->
  <line x1="464" y1="389" x2="464" y2="379" stroke="#1B3A55" stroke-width="1.7"/><line x1="459" y1="379" x2="469" y2="379" stroke="#1B3A55" stroke-width="1.7"/>
  <line x1="490" y1="389" x2="490" y2="379" stroke="#1B3A55" stroke-width="1.7"/><line x1="485" y1="379" x2="495" y2="379" stroke="#1B3A55" stroke-width="1.7"/>
  <line x1="464" y1="330" x2="464" y2="340" stroke="#1B3A55" stroke-width="1.7"/><line x1="459" y1="340" x2="469" y2="340" stroke="#1B3A55" stroke-width="1.7"/>
  <line x1="490" y1="330" x2="490" y2="340" stroke="#1B3A55" stroke-width="1.7"/><line x1="485" y1="340" x2="495" y2="340" stroke="#1B3A55" stroke-width="1.7"/>
  <!-- right box: LOWER (P->B, A->T : parallel) -->
  <line x1="510" y1="382" x2="510" y2="338" stroke="#1B3A55" stroke-width="1.7" marker-end="url(#va)"/>
  <line x1="532" y1="338" x2="532" y2="382" stroke="#1B3A55" stroke-width="1.7" marker-end="url(#va)"/>
  <!-- end actuators: solenoid boxes + springs -->
  <rect x="389" y="349" width="20" height="21" fill="#fff" stroke="#1B3A55" stroke-width="1.5"/><line x1="389" y1="370" x2="409" y2="349" stroke="#1B3A55" stroke-width="1.2"/>
  <rect x="545" y="349" width="20" height="21" fill="#fff" stroke="#1B3A55" stroke-width="1.5"/><line x1="545" y1="349" x2="565" y2="370" stroke="#1B3A55" stroke-width="1.2"/>
  <polyline points="385,355 380,360 385,365" fill="none" stroke="#1B3A55" stroke-width="1.3"/>
  <polyline points="569,355 574,360 569,365" fill="none" stroke="#1B3A55" stroke-width="1.3"/>
  <!-- port letters -->
  <text x="464" y="404" font-size="10.5" font-weight="700" fill="#0B5A63" text-anchor="middle">P</text>
  <text x="490" y="404" font-size="10.5" font-weight="700" fill="#586876" text-anchor="middle">T</text>
  <text x="460" y="326" font-size="10.5" font-weight="700" fill="#0B5A63" text-anchor="middle">B</text>
  <text x="494" y="326" font-size="10.5" font-weight="700" fill="#0B5A63" text-anchor="middle">A</text>
  <circle cx="411" cy="318" r="9" fill="#0E7E8C"/><text x="411" y="322" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">5</text>

  <!-- T -> filter (7) -> tank -->
  <polyline points="490,389 490,452" fill="none" stroke="#586876" stroke-width="3.5"/>
  <path d="M490,452 l15,15 l-15,15 l-15,-15 z" fill="#EEF2F5" stroke="#586876" stroke-width="2"/>
  <line x1="479" y1="467" x2="501" y2="467" stroke="#586876" stroke-width="1.4" stroke-dasharray="3 2"/>
  <polyline points="490,482 490,520" fill="none" stroke="#586876" stroke-width="3.5" marker-end="url(#flR)"/>
  <circle cx="516" cy="452" r="9" fill="#0E7E8C"/><text x="516" y="456" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">7</text>

  <!-- A -> cap (low) ; B -> rod (high) : no crossings -->
  <polyline points="490,330 490,292 604,292" fill="none" stroke="#0E7E8C" stroke-width="3.5" marker-end="url(#fl)"/>
  <text x="556" y="284" font-size="9.5" fill="#0B5A63" text-anchor="middle">A &#8594; cap (raise)</text>
  <polyline points="464,330 464,160 604,160" fill="none" stroke="#0E7E8C" stroke-width="3" marker-end="url(#fl)"/>
  <text x="548" y="152" font-size="9.5" fill="#0B5A63" text-anchor="middle">B &#8594; rod (lower)</text>

  <!-- ===== DOUBLE-ACTING CYLINDER (6) ===== -->
  <rect x="610" y="118" width="92" height="204" rx="6" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2.5"/>
  <rect x="614" y="266" width="84" height="52" rx="2" fill="#1FB6AE" opacity="0.85"/>
  <rect x="614" y="252" width="84" height="14" fill="#1B3A55"/>
  <rect x="648" y="96" width="16" height="156" fill="#5B6B79"/>
  <rect x="640" y="114" width="32" height="8" fill="#1B3A55"/>
  <rect x="606" y="70" width="100" height="26" rx="4" fill="#DD841A"/>
  <text x="656" y="89" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="'IBM Plex Mono',monospace">2 t</text>
  <rect x="600" y="286" width="12" height="13" rx="1.5" fill="#1B3A55"/>
  <rect x="600" y="154" width="12" height="13" rx="1.5" fill="#1B3A55"/>
  <text x="656" y="340" font-size="10.5" font-weight="700" fill="#586876" text-anchor="middle">double-acting cylinder</text>
  <text x="656" y="352" font-size="9.5" fill="#586876" text-anchor="middle">50 mm bore &#183; 600 mm stroke</text>
  <circle cx="716" cy="128" r="9" fill="#0E7E8C"/><text x="716" y="132" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">6</text>
</svg>
