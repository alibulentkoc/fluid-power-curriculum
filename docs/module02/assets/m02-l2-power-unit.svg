<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Inside a hydraulic power unit: a reservoir of fluid, an electric motor turning a pump, a suction line drawing fluid from the tank, a pressure line sending it out through a pressure port, a gauge, and a relief valve that caps the pressure by returning excess to the tank.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient>
    <linearGradient id="fluid" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2BC4BB"/><stop offset="1" stop-color="#0E7E8C"/></linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="470" rx="20" fill="url(#bg)"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#0C2235">Inside the power unit</text>
  <text x="40" y="76" font-size="15" font-weight="400" fill="#586876">A motor turns a pump that draws fluid from the reservoir and sends it out under pressure.</text>

  <!-- power-unit enclosure -->
  <rect x="60" y="150" width="430" height="282" rx="14" fill="none" stroke="#9FB2C0" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="78" y="174" font-size="12" font-weight="700" letter-spacing="1.5" fill="#586876">POWER UNIT</text>

  <!-- reservoir -->
  <rect x="92" y="312" width="330" height="104" rx="8" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2.5"/>
  <rect x="98" y="344" width="318" height="66" rx="4" fill="url(#fluid)" opacity="0.9"/>
  <line x1="98" y1="344" x2="416" y2="344" stroke="#0E7E8C" stroke-width="1.5" opacity="0.6"/>
  <text x="257" y="392" font-size="13" font-weight="700" letter-spacing="1.5" fill="#FFFFFF" text-anchor="middle">RESERVOIR</text>

  <!-- motor + pump -->
  <circle cx="150" cy="252" r="30" fill="#1B3A55"/><text x="150" y="259" font-size="20" font-weight="700" fill="#7FD7D0" text-anchor="middle" font-family="'IBM Plex Mono',monospace">M</text>
  <text x="150" y="206" font-size="12" font-weight="700" letter-spacing="1" fill="#1B3A55" text-anchor="middle">MOTOR</text>
  <rect x="180" y="246" width="34" height="12" fill="#586876"/>
  <circle cx="238" cy="252" r="24" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2.5"/>
  <polygon points="230,240 230,264 252,252" fill="#0E7E8C"/>
  <text x="238" y="206" font-size="12" font-weight="700" letter-spacing="1" fill="#1B3A55" text-anchor="middle">PUMP</text>

  <!-- suction line: pump inlet down into reservoir -->
  <path d="M238,276 V356" fill="none" stroke="#9BB0BC" stroke-width="9" stroke-linecap="round"/>
  <rect x="229" y="270" width="18" height="10" rx="2" fill="#1B3A55"/>
  <text x="262" y="294" font-size="11.5" font-weight="700" fill="#586876">suction port</text>
  <text x="262" y="308" font-size="10.5" fill="#586876">draws from tank</text>

  <!-- pressure line: pump outlet -> right -> pressure port -->
  <path d="M262,252 H560" fill="none" stroke="#0E7E8C" stroke-width="9" stroke-linecap="round"/>
  <polygon points="300,252 286,245 286,259" fill="#0E7E8C"/>

  <!-- gauge -->
  <line x1="350" y1="252" x2="350" y2="206" stroke="#0E7E8C" stroke-width="6"/>
  <circle cx="350" cy="184" r="24" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2.5"/>
  <line x1="350" y1="184" x2="364" y2="172" stroke="#C2463B" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="350" cy="184" r="3" fill="#1B3A55"/>
  <text x="350" y="150" font-size="11.5" font-weight="700" fill="#1B3A55" text-anchor="middle">100 bar</text>

  <!-- relief valve: branch down, returns excess to tank -->
  <path d="M415,256 V280" fill="none" stroke="#9BB0BC" stroke-width="7" stroke-linecap="round"/>
  <rect x="393" y="280" width="44" height="28" rx="5" fill="#FDEFD9" stroke="#DD841A" stroke-width="2"/>
  <line x1="401" y1="302" x2="429" y2="286" stroke="#DD841A" stroke-width="2.5"/>
  <path d="M415,308 V356" fill="none" stroke="#9BB0BC" stroke-width="7" stroke-linecap="round"/>
  <text x="448" y="296" font-size="11.5" font-weight="700" fill="#DD841A">RELIEF VALVE</text>
  <text x="448" y="311" font-size="10.5" fill="#586876">caps the pressure</text>

  <!-- pressure port + to cylinder -->
  <rect x="556" y="246" width="12" height="14" rx="2" fill="#1B3A55"/>
  <text x="562" y="232" font-size="12" font-weight="700" letter-spacing="1" fill="#0E7E8C" text-anchor="middle">PRESSURE PORT</text>
  <path d="M568,252 H660" fill="none" stroke="#0E7E8C" stroke-width="9" stroke-linecap="round"/>
  <polygon points="668,252 650,243 650,261" fill="#0E7E8C"/>
  <text x="700" y="248" font-size="13" font-weight="700" fill="#1B3A55">to the</text>
  <text x="700" y="266" font-size="13" font-weight="700" fill="#1B3A55">cylinder</text>

  <!-- flow legend -->
  <rect x="612" y="300" width="232" height="118" rx="12" fill="#13314A"/>
  <text x="728" y="328" font-size="12" font-weight="700" letter-spacing="1" fill="#7FD7D0" text-anchor="middle">WHAT THE PUMP SETS</text>
  <text x="632" y="354" font-size="12" fill="#FFFFFF">Flow (L/min) &#8594; how fast</text>
  <text x="632" y="370" font-size="12" fill="#B9C6D2">the platform lifts.</text>
  <text x="632" y="394" font-size="12" fill="#FFFFFF">Pressure comes from the</text>
  <text x="632" y="410" font-size="12" fill="#B9C6D2">load; the relief valve caps it.</text>
</svg>
