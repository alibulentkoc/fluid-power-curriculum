<svg viewBox="0 0 1000 440" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="The M04 twin predicts a velocity and works against a supply pressure; that flow-and-pressure demand sizes the M05 hydraulic power unit.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F9FB"/>
      <stop offset="1" stop-color="#EEF2F6"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13314A"/>
      <stop offset="1" stop-color="#0C2235"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16A6A0"/>
      <stop offset="1" stop-color="#0E7E8C"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4A93C"/>
      <stop offset="1" stop-color="#E08A1E"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0C2235" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0E7E8C"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="440" rx="18" fill="url(#bg)"/>

  <!-- title -->
  <text x="40" y="52" font-size="22" font-weight="700" fill="#0C2235">From prediction to power</text>
  <text x="40" y="76" font-size="14" fill="#5B6B79">The twin says how fast and how hard. M05 sizes the source that delivers it.</text>

  <!-- ===== LEFT: the twin's prediction ===== -->
  <g filter="url(#soft)">
    <rect x="40" y="104" width="300" height="248" rx="14" fill="#FFFFFF" stroke="#DCE4EC"/>
  </g>
  <text x="60" y="134" font-size="12" font-weight="700" letter-spacing="1.5" fill="#0E7E8C">THE TWIN'S PREDICTION · M04</text>

  <!-- cylinder glyph -->
  <g transform="translate(60,150)">
    <rect x="0" y="20" width="150" height="44" rx="6" fill="url(#steel)"/>
    <rect x="150" y="34" width="84" height="16" rx="4" fill="#5B6B79"/>
    <rect x="234" y="28" width="14" height="28" rx="3" fill="#0C2235"/>
    <path d="M14,42 L40,42" stroke="#16A6A0" stroke-width="3" stroke-linecap="round"/>
    <polygon points="40,36 52,42 40,48" fill="#16A6A0"/>
  </g>

  <!-- data chips -->
  <g transform="translate(60,232)">
    <rect x="0" y="0" width="260" height="46" rx="9" fill="#ECFAF8" stroke="#9FE0DA"/>
    <text x="14" y="20" font-size="11" font-weight="600" letter-spacing="0.5" fill="#0E7E8C">STEADY EXTEND VELOCITY</text>
    <text x="14" y="38" font-size="17" font-weight="700" fill="#0C2235" font-family="'IBM Plex Mono',ui-monospace,monospace">84.53 mm/s</text>
  </g>
  <g transform="translate(60,286)">
    <rect x="0" y="0" width="260" height="46" rx="9" fill="#FEF4E6" stroke="#F4C98A"/>
    <text x="14" y="20" font-size="11" font-weight="600" letter-spacing="0.5" fill="#B9710F">SUPPLY PRESSURE</text>
    <text x="14" y="38" font-size="17" font-weight="700" fill="#0C2235" font-family="'IBM Plex Mono',ui-monospace,monospace">100 bar</text>
  </g>

  <!-- ===== CENTER: demand ribbon ===== -->
  <g transform="translate(360,210)">
    <path d="M0,18 H214" stroke="url(#ribbon)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="34" y="-24" width="150" height="28" rx="14" fill="url(#ribbon)"/>
    <text x="109" y="-5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">the demand</text>
    <text x="6" y="52" font-size="12" fill="#5B6B79">flow</text>
    <text x="6" y="70" font-size="12" fill="#5B6B79">+ pressure</text>
  </g>

  <!-- ===== RIGHT: the HPU it sizes ===== -->
  <g filter="url(#soft)">
    <rect x="612" y="104" width="348" height="248" rx="14" fill="#FFFFFF" stroke="#DCE4EC"/>
  </g>
  <text x="632" y="134" font-size="12" font-weight="700" letter-spacing="1.5" fill="#B9710F">HYDRAULIC POWER UNIT · M05</text>

  <!-- four component glyphs -->
  <g transform="translate(632,150)" font-size="10" fill="#5B6B79" text-anchor="middle">
    <g>
      <rect x="0" y="0" width="70" height="52" rx="8" fill="#F2F6F9" stroke="#D3DDE6"/>
      <circle cx="35" cy="22" r="13" fill="none" stroke="#13314A" stroke-width="2.5"/>
      <path d="M35,12 V32 M25,22 H45" stroke="#13314A" stroke-width="2.5"/>
      <text x="35" y="47" font-weight="600">motor</text>
    </g>
    <g transform="translate(80,0)">
      <rect x="0" y="0" width="70" height="52" rx="8" fill="#F2F6F9" stroke="#D3DDE6"/>
      <circle cx="35" cy="22" r="13" fill="none" stroke="#13314A" stroke-width="2.5"/>
      <path d="M35,9 L35,35 M22,22 L48,22 M27,13 L43,31 M43,13 L27,31" stroke="#13314A" stroke-width="1.6"/>
      <text x="35" y="47" font-weight="600">pump</text>
    </g>
    <g transform="translate(160,0)">
      <rect x="0" y="0" width="70" height="52" rx="8" fill="#F2F6F9" stroke="#D3DDE6"/>
      <path d="M35,8 L35,36 M28,30 L42,16" stroke="#13314A" stroke-width="2.5"/>
      <path d="M22,36 h26" stroke="#13314A" stroke-width="2.5"/>
      <text x="35" y="47" font-weight="600">relief</text>
    </g>
    <g transform="translate(240,0)">
      <rect x="0" y="0" width="76" height="52" rx="8" fill="#F2F6F9" stroke="#D3DDE6"/>
      <path d="M14,14 h48 v24 h-48 z" fill="none" stroke="#13314A" stroke-width="2"/>
      <path d="M14,28 h48" stroke="#16A6A0" stroke-width="2.5"/>
      <text x="38" y="47" font-weight="600">reservoir</text>
    </g>
  </g>

  <!-- sized outputs -->
  <g transform="translate(632,232)">
    <rect x="0" y="0" width="156" height="100" rx="10" fill="#0C2235"/>
    <text x="16" y="24" font-size="10" font-weight="600" letter-spacing="0.8" fill="#7FD7D0">PUMP FLOW</text>
    <text x="16" y="48" font-size="20" font-weight="700" fill="#FFFFFF" font-family="'IBM Plex Mono',ui-monospace,monospace">9.96</text>
    <text x="74" y="48" font-size="12" fill="#9FB2C0">L/min</text>
    <text x="16" y="72" font-size="10" font-weight="600" letter-spacing="0.8" fill="#F4C98A">HYDRAULIC POWER</text>
    <text x="16" y="92" font-size="18" font-weight="700" fill="#FFFFFF" font-family="'IBM Plex Mono',ui-monospace,monospace">1.66</text>
    <text x="66" y="92" font-size="12" fill="#9FB2C0">kW</text>
  </g>
  <g transform="translate(804,232)">
    <rect x="0" y="0" width="136" height="100" rx="10" fill="#F2F6F9" stroke="#D3DDE6"/>
    <text x="16" y="24" font-size="10" font-weight="600" letter-spacing="0.8" fill="#5B6B79">RELIEF SET</text>
    <text x="16" y="46" font-size="17" font-weight="700" fill="#0C2235" font-family="'IBM Plex Mono',ui-monospace,monospace">110 bar</text>
    <text x="16" y="72" font-size="10" font-weight="600" letter-spacing="0.8" fill="#5B6B79">RESERVOIR</text>
    <text x="16" y="92" font-size="17" font-weight="700" fill="#0C2235" font-family="'IBM Plex Mono',ui-monospace,monospace">29.9 L</text>
  </g>

  <!-- equation strip -->
  <g transform="translate(40,372)">
    <rect x="0" y="0" width="920" height="44" rx="10" fill="#13314A"/>
    <text x="28" y="28" font-size="15" fill="#FFFFFF" font-family="'IBM Plex Mono',ui-monospace,monospace">Q = A<tspan font-size="11" dy="3">bore</tspan><tspan dy="-3"> · v</tspan></text>
    <text x="210" y="28" font-size="12" fill="#9FB2C0">flow follows velocity</text>
    <line x1="430" y1="10" x2="430" y2="34" stroke="#2C4A63"/>
    <text x="470" y="28" font-size="15" fill="#FFFFFF" font-family="'IBM Plex Mono',ui-monospace,monospace">P = p · Q</text>
    <text x="600" y="28" font-size="12" fill="#9FB2C0">power is pressure times flow</text>
  </g>
</svg>
