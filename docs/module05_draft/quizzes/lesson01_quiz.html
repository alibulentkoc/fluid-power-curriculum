<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Knowledge check · Why the machine needs power</title>
<style>
  :root{
    --ink:#0C2235; --slate:#5B6B79; --line:#D3DDE6; --bg:#F7F9FB; --card:#FFFFFF;
    --teal:#0E7E8C; --teal-soft:#ECFAF8; --green:#1B8A5A; --green-soft:#E7F6EE;
    --red:#C2463B; --red-soft:#FBECEA;
    --sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.55}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--slate);font-size:13.5px;margin:0 0 8px}
  .banner{font-size:12.5px;background:var(--teal-soft);color:var(--teal);border:1px solid #9FE0DA;
          border-radius:10px;padding:10px 14px;margin:0 0 22px}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;
     box-shadow:0 2px 8px rgba(12,34,53,.05)}
  .q .num{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--teal)}
  .q .stem{font-size:15px;font-weight:600;margin:6px 0 14px}
  .opt{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);
       border-radius:10px;padding:12px 14px;margin-bottom:9px;font-family:var(--sans);font-size:14px;
       color:var(--ink);cursor:pointer;transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--teal)}
  .opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green);font-weight:600}
  .opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .opt:disabled{cursor:default}
  .fb{font-size:13px;margin-top:8px;padding:10px 12px;border-radius:9px;display:none}
  .fb.show{display:block}
  .fb.ok{background:var(--green-soft);color:var(--green)}
  .fb.no{background:var(--red-soft);color:var(--red)}
  .score{position:sticky;bottom:14px;background:#0C2235;color:#fff;border-radius:12px;padding:14px 18px;
         display:flex;justify-content:space-between;align-items:center;margin-top:8px;
         box-shadow:0 4px 16px rgba(12,34,53,.25)}
  .score b{font-size:18px}
  .retry{background:none;border:1px solid #3a5670;color:#cfe0ec;font-family:var(--sans);font-size:13px;
         font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer}
  .retry:hover{border-color:#7FD7D0;color:#7FD7D0}
</style>
</head>
<body>
<div class="wrap">
  <h1>Knowledge check — Why the machine needs power</h1>
  <p class="sub">Module 05 · Lesson 01</p>
  <p class="banner">Formative — unlimited attempts, immediate feedback. Not graded. Check your understanding, not your score.</p>
  <div id="quiz"></div>
  <div class="score"><span>Answered <b id="done">0</b> / 5 &nbsp;·&nbsp; Correct <b id="right">0</b></span>
    <button class="retry" id="retry">Start over</button></div>
</div>

<script>
const QUESTIONS=[
  {stem:"The machine must move <b>faster</b> (higher extend velocity), same load. Which part of the demand rises?",
   opts:["Flow","Pressure","Neither — power is fixed","Both equally"], correct:0,
   why:"Flow follows velocity: Q = A·v. Faster motion needs more flow; pressure is set by the load, which hasn't changed."},
  {stem:"The machine must lift a <b>heavier</b> load at the same speed. Which part of the demand rises?",
   opts:["Flow","Pressure","Reservoir size","Neither"], correct:1,
   why:"Pressure is the 'how hard' quantity, set by the load. A heavier load raises pressure; the speed (and so the flow) is unchanged."},
  {stem:"A pump delivers high flow but almost <b>no pressure</b>. Why can't it power the workcell?",
   opts:["It moves too fast","Reservoir overflows","It can't overcome the load, so hydraulic power ≈ 0","It uses too much electricity"], correct:2,
   why:"Hydraulic power is the product p·Q. With pressure near zero the cylinder can't push the load — the product collapses regardless of flow."},
  {stem:"In this lesson, where does the <b>velocity</b> used to size the flow come from?",
   opts:["A pump catalogue","An assumed round number","The M04 digital twin's predicted v_steady","The motor nameplate"], correct:2,
   why:"The demand is read from the twin's prediction (v_steady), not invented — which is what makes the curriculum a build rather than a guess."},
  {stem:"True or false: switching the Trainer display to SI <b>changes</b> the hydraulic power the machine needs.",
   opts:["True","False"], correct:1,
   why:"False. The unit toggle is display-only. 9.96 L/min and 2.63 gpm are the same demand; units are a lens, not a quantity."}
];

const quiz=document.getElementById('quiz');
const doneEl=document.getElementById('done'), rightEl=document.getElementById('right');
let answered, correctCount;

function render(){
  answered=new Array(QUESTIONS.length).fill(false); correctCount=0;
  doneEl.textContent='0'; rightEl.textContent='0';
  quiz.innerHTML='';
  QUESTIONS.forEach((q,qi)=>{
    const card=document.createElement('div'); card.className='q';
    card.innerHTML=`<div class="num">Question ${qi+1}</div><div class="stem">${q.stem}</div>`;
    q.opts.forEach((o,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.innerHTML=o;
      b.onclick=()=>choose(qi,oi,card,q);
      card.appendChild(b);
    });
    const fb=document.createElement('div'); fb.className='fb'; card.appendChild(fb);
    quiz.appendChild(card);
  });
}
function choose(qi,oi,card,q){
  if(answered[qi]) return;
  answered[qi]=true;
  const btns=card.querySelectorAll('.opt');
  btns.forEach((b,i)=>{ b.disabled=true; if(i===q.correct) b.classList.add('correct'); });
  const fb=card.querySelector('.fb');
  if(oi===q.correct){ correctCount++; fb.className='fb show ok'; fb.innerHTML='Correct. '+q.why; }
  else { btns[oi].classList.add('wrong'); fb.className='fb show no'; fb.innerHTML='Not quite. '+q.why; }
  doneEl.textContent=answered.filter(Boolean).length;
  rightEl.textContent=correctCount;
}
document.getElementById('retry').onclick=render;
render();
</script>
</body>
</html>
