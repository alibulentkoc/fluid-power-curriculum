<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Hydraulic power — pressure × flow</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal2:#1FB6AE;--amber:#DD841A;--red:#C2463B;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  .ctl{margin:14px 0}
  .ctl label{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:6px}
  .ctl .v{font-family:var(--mono);color:var(--teal)}
  input[type=range]{width:100%;accent-color:#0E7E8C}
  .eq{font-family:var(--mono);font-size:15px;text-align:center;margin:18px 0 6px;color:var(--ink)}
  .eq b{color:var(--teal)}
  .barwrap{height:26px;background:#EEF2F5;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:8px}
  .bar{height:100%;background:linear-gradient(90deg,#1FB6AE,#0E7E8C);width:0;transition:width .18s}
  .out{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px}
  .tile{border-radius:12px;padding:12px 14px;border:1px solid var(--line);background:var(--bg);text-align:center}
  .tile .k{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
  .tile .v{font-family:var(--mono);font-size:20px;font-weight:700;margin-top:3px;color:var(--teal)}
  .tile.power .v{color:var(--amber)}
  .msg{margin-top:14px;font-size:13px;padding:10px 12px;border-radius:10px;background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2}
  .msg.warn{background:#FBEEE6;color:#B5670F;border-color:#F0D2B4}
  .btn{margin-top:14px;background:#0C6A74;color:#fff;border:none;border-radius:10px;padding:10px 14px;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <h1>Hydraulic power — pressure × flow</h1>
  <p class="sub">The working fluid carries power only when pressure and flow act together: <b>P = p × Q</b>. Set each and watch the power. Find the platform's operating point.</p>

  <div class="card">
    <div class="ctl">
      <label>Pressure &nbsp;<span class="v"><span id="pOut">100</span> bar</span></label>
      <input id="pRange" type="range" min="0" max="200" step="5" value="100"/>
    </div>
    <div class="ctl">
      <label>Flow &nbsp;<span class="v"><span id="qOut">10</span> L/min</span></label>
      <input id="qRange" type="range" min="0" max="20" step="1" value="10"/>
    </div>

    <div class="eq">P = <b id="pEq">100</b> bar × <b id="qEq">10</b> L/min</div>
    <div class="barwrap"><div class="bar" id="powerBar"></div></div>

    <div class="out">
      <div class="tile"><div class="k">Pressure (holds)</div><div class="v"><span id="pTile">100</span> bar</div></div>
      <div class="tile"><div class="k">Flow (moves)</div><div class="v"><span id="qTile">10</span> L/min</div></div>
      <div class="tile power"><div class="k">Power carried</div><div class="v"><span id="powerOut">1.67</span> kW</div></div>
    </div>

    <div class="msg" id="msg"></div>
    <button class="btn" id="opBtn">Go to the platform's operating point</button>
  </div>
</div>

<script>
  const pRange=document.getElementById('pRange'), qRange=document.getElementById('qRange');
  const pOut=document.getElementById('pOut'), qOut=document.getElementById('qOut');
  const pEq=document.getElementById('pEq'), qEq=document.getElementById('qEq');
  const pTile=document.getElementById('pTile'), qTile=document.getElementById('qTile'), powerOut=document.getElementById('powerOut');
  const powerBar=document.getElementById('powerBar'), msg=document.getElementById('msg');
  const PMAX=200*20/600; // kW at max p*Q  (200 bar * 20 L/min)
  function powerKW(p,Q){ return (p*1e5)*(Q/60000)/1000; }
  function render(){
    const p=+pRange.value, Q=+qRange.value, P=powerKW(p,Q);
    pOut.textContent=p; qOut.textContent=Q; pEq.textContent=p; qEq.textContent=Q;
    pTile.textContent=p; qTile.textContent=Q; powerOut.textContent=P.toFixed(2);
    powerBar.style.width=Math.min(100,100*P/PMAX)+'%';
    let m, warn=false;
    if(Q===0 && p>0){ m='Pressure but no flow: the load is <b>held</b>, but the fluid delivers <b>zero lifting power</b>. Power needs flow too.'; warn=true; }
    else if(p===0 && Q>0){ m='Flow but no pressure: the fluid <b>moves</b> but does <b>no work</b>. Power needs pressure too.'; warn=true; }
    else if(p===0 && Q===0){ m='No pressure and no flow — no power at all.'; warn=true; }
    else if(p===100 && Q===10){ m='This is the <b>platform\u2019s operating point</b>: 100 bar × 10 L/min ≈ <b>1.67 kW</b> — the same power the motor supplies.'; }
    else { m='Raise either pressure or flow and the power climbs in step — power is the two <b>multiplied</b>.'; }
    msg.innerHTML=m; msg.className='msg'+(warn?' warn':'');
  }
  pRange.addEventListener('input',render); qRange.addEventListener('input',render);
  document.getElementById('opBtn').addEventListener('click',()=>{pRange.value=100;qRange.value=10;render();});
  render();
</script>
</body>
</html>
