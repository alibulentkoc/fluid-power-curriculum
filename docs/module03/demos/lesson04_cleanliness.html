<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · ISO 4406 cleanliness</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal2:#1FB6AE;--amber:#DD841A;--red:#C2463B;--green:#1B8A5A;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  svg{display:block;width:100%;height:auto;background:#F2F6F9;border:1px solid var(--line);border-radius:12px}
  .ctl{margin:16px 0 6px}
  .ctl label{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:6px}
  .ctl .v{font-family:var(--mono);color:var(--teal)}
  input[type=range]{width:100%;accent-color:#0E7E8C}
  .codes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}
  .code{border-radius:12px;padding:12px;border:1px solid var(--line);background:var(--bg);text-align:center}
  .code .k{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--slate)}
  .code .n{font-family:var(--mono);font-size:22px;font-weight:700;margin-top:2px}
  .code .cap{font-size:10px;color:var(--slate);font-family:var(--mono)}
  .code.ok .n{color:var(--green)} .code.bad .n{color:var(--red)}
  .verdict{margin-top:14px;font-size:13px;padding:10px 12px;border-radius:10px;background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2}
  .verdict.bad{background:#FBEAE7;color:#9A2f27;border-color:#EBC3BE}
  .big{font-family:var(--mono);font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <h1>ISO 4406 cleanliness — reading the code</h1>
  <p class="sub">Contaminate or clean the oil and watch the three codes. It meets <b>ISO 18/16/13</b> only when every code is at or below target — and the ≥14&nbsp;µm count fails first.</p>

  <div class="card">
    <svg id="field" viewBox="0 0 640 160" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="10" width="620" height="140" rx="10" fill="#FFFFFF" stroke="#D3DDE6"/>
      <text x="20" y="30" font-size="10.5" font-weight="700" fill="#586876">1 mL sample — ≥14 µm particles (the ones that bridge valve clearances)</text>
      <g id="dots"></g>
    </svg>

    <div class="ctl">
      <label>Contamination &nbsp;<span class="v">≥14 µm = <span id="nOut">65</span> particles/mL</span></label>
      <input id="contamRange" type="range" min="10" max="200" step="1" value="65"/>
    </div>

    <div class="codes">
      <div class="code" id="cA"><div class="k">≥4 µm</div><div class="n" id="iso4">18</div><div class="cap"><span id="n4">2031</span>/mL</div></div>
      <div class="code" id="cB"><div class="k">≥6 µm</div><div class="n" id="iso6">16</div><div class="cap"><span id="n6">520</span>/mL</div></div>
      <div class="code" id="cC"><div class="k">≥14 µm</div><div class="n" id="iso14">13</div><div class="cap"><span id="n14">65</span>/mL</div></div>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:15px">reading: <span class="big" id="triplet">18/16/13</span> &nbsp;·&nbsp; target <span class="big">18/16/13</span></div>
    <div class="verdict" id="verdict"></div>
  </div>
</div>

<script>
  const UPPER={10:10,11:20,12:40,13:80,14:160,15:320,16:640,17:1300,18:2500,19:5000,20:10000,21:20000,22:40000,23:80000,24:160000};
  const CODES=Object.keys(UPPER).map(Number).sort((a,b)=>a-b);
  function iso(count){ for(const c of CODES){ if(count<=UPPER[c]) return c; } return 25; }
  const $=id=>document.getElementById(id);
  const TARGET=[18,16,13];
  function render(){
    const n=+$('contamRange').value;              // >=14um
    const counts=[Math.round(31.25*n), 8*n, n];    // >=4, >=6, >=14 um
    const codes=counts.map(iso);
    $('n4').textContent=counts[0]; $('n6').textContent=counts[1]; $('n14').textContent=counts[2]; $('nOut').textContent=n;
    ['iso4','iso6','iso14'].forEach((id,i)=>$(id).textContent=codes[i]);
    [['cA',0],['cB',1],['cC',2]].forEach(([id,i])=>{ $(id).className='code '+(codes[i]<=TARGET[i]?'ok':'bad'); });
    $('triplet').textContent=codes.join('/');
    const pass=codes.every((c,i)=>c<=TARGET[i]);
    const v=$('verdict');
    if(pass){ v.className='verdict'; v.innerHTML=`<b>${codes.join('/')}</b> \u2264 18/16/13 \u2014 <b>meets target</b>. The proportional valve gets the clean oil it needs.`; }
    else { const bad=codes.map((c,i)=>c>TARGET[i]?['\u22654','\u22656','\u226514'][i]+' \u00b5m':null).filter(Boolean).join(', ');
      v.className='verdict bad'; v.innerHTML=`<b>${codes.join('/')}</b> exceeds 18/16/13 (over on ${bad}) \u2014 <b>out of spec</b>. Filter harder until the codes drop to target.`; }
    // dot field for >=14um (draw up to ~120 dots scaled)
    const g=$('dots'); let s='';
    const shown=Math.min(120,n); 
    for(let i=0;i<shown;i++){ const x=25+((i*53)%595), y=45+(((i*97)%95)); s+=`<circle cx="${x}" cy="${y}" r="3.4" fill="${n>80?'#C2463B':'#586876'}" opacity="0.85"/>`; }
    g.innerHTML=s;
  }
  $('contamRange').addEventListener('input',render);
  render();
</script>
</body>
</html>
