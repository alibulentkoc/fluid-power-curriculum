<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Viscosity vs temperature</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal2:#1FB6AE;--amber:#DD841A;--red:#C2463B;--green:#1B8A5A;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  svg{display:block;width:100%;height:auto;background:#F2F6F9;border:1px solid var(--line);border-radius:12px}
  .grades{display:flex;gap:8px;margin:16px 0 6px}
  .grades button{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--slate);font-family:var(--sans);font-size:14px;font-weight:600;padding:10px;border-radius:10px;cursor:pointer}
  .grades button:hover{border-color:var(--teal)} .grades button.active{background:#0C6A74;border-color:#0C6A74;color:#fff}
  .ctl{margin:12px 0 4px}
  .ctl label{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:6px}
  .ctl .v{font-family:var(--mono);color:var(--teal)}
  input[type=range]{width:100%;accent-color:#0E7E8C}
  .out{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .tile{border-radius:12px;padding:12px 14px;border:1px solid var(--line);background:var(--bg)}
  .tile .k{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--slate)}
  .tile .v{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:3px;color:var(--teal)}
  .verdict{margin-top:14px;font-size:13px;padding:10px 12px;border-radius:10px;background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2}
  .verdict.bad{background:#FBEAE7;color:#9A2f27;border-color:#EBC3BE}
</style>
</head>
<body>
<div class="wrap">
  <h1>Viscosity vs temperature — choosing the grade</h1>
  <p class="sub">Pick an ISO VG grade and sweep the temperature. The oil must stay inside the <b>13–80 cSt</b> band across the <b>29–74 °C</b> window. Only one grade threads it edge to edge.</p>

  <div class="card">
    <svg id="chart" viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif">
      <!-- band + window (static) -->
      <rect id="band" x="70" y="0" width="540" height="0" fill="#1FB6AE" opacity="0.14"/>
      <rect id="window" x="0" y="30" width="0" height="280" fill="#DD841A" opacity="0.10"/>
      <line id="bandTop" x1="70" x2="610" stroke="#0E7E8C" stroke-width="1.2" stroke-dasharray="5 3"/>
      <line id="bandBot" x1="70" x2="610" stroke="#0E7E8C" stroke-width="1.2" stroke-dasharray="5 3"/>
      <!-- axes -->
      <line x1="70" y1="310" x2="610" y2="310" stroke="#1B3A55" stroke-width="2"/>
      <line x1="70" y1="310" x2="70" y2="30" stroke="#1B3A55" stroke-width="2"/>
      <g id="yticks" font-size="9.5" fill="#586876"></g>
      <g id="xticks" font-size="9.5" fill="#586876"></g>
      <text x="340" y="352" font-size="11.5" font-weight="700" fill="#1B3A55" text-anchor="middle">temperature (°C)</text>
      <text x="24" y="170" font-size="11.5" font-weight="700" fill="#1B3A55" text-anchor="middle" transform="rotate(-90 24 170)">viscosity (cSt)</text>
      <!-- curve + marker -->
      <polyline id="curve" fill="none" stroke="#0E7E8C" stroke-width="3"/>
      <line id="tline" stroke="#B5670F" stroke-width="1.4" stroke-dasharray="3 3"/>
      <circle id="dot" r="6" fill="#DD841A" stroke="#fff" stroke-width="1.5"/>
    </svg>

    <div class="grades">
      <button id="bVG32">ISO VG 32</button>
      <button id="bVG46" class="active">ISO VG 46</button>
      <button id="bVG68">ISO VG 68</button>
    </div>
    <div class="ctl">
      <label>Temperature <span class="v"><span id="tOut">40</span> °C</span></label>
      <input id="tRange" type="range" min="25" max="80" step="1" value="40"/>
    </div>
    <div class="out">
      <div class="tile"><div class="k">Viscosity now</div><div class="v"><span id="viscOut">46.0</span> cSt</div></div>
      <div class="tile"><div class="k">At this temperature</div><div class="v" id="bandOut">in band</div></div>
    </div>
    <div class="verdict" id="verdict"></div>
  </div>
</div>

<script>
  const PX0=70,PX1=610,PY0=310,PY1=30,TMIN=25,TMAX=80,VMAX=100;
  const B=3.6844, band=[13,80], win=[29,74];
  const Z=nu=>Math.log10(Math.log10(nu+0.7));
  function visc(vg,Tc){ const A=Z(vg)+B*Math.log10(313.15); return Math.pow(10,Math.pow(10,A-B*Math.log10(Tc+273.15)))-0.7; }
  const xpx=T=>PX0+(T-TMIN)/(TMAX-TMIN)*(PX1-PX0);
  const ypx=v=>PY0+(Math.min(v,VMAX))/VMAX*(PY1-PY0);
  const $=id=>document.getElementById(id);
  // static band + window + ticks
  $('band').setAttribute('y',ypx(band[1])); $('band').setAttribute('height',ypx(band[0])-ypx(band[1]));
  $('bandTop').setAttribute('y1',ypx(band[1])); $('bandTop').setAttribute('y2',ypx(band[1]));
  $('bandBot').setAttribute('y1',ypx(band[0])); $('bandBot').setAttribute('y2',ypx(band[0]));
  $('window').setAttribute('x',xpx(win[0])); $('window').setAttribute('width',xpx(win[1])-xpx(win[0]));
  let yt=''; [0,13,20,40,46,60,80,100].forEach(v=>{const y=ypx(v);yt+=`<line x1="66" y1="${y}" x2="70" y2="${y}" stroke="#1B3A55"/><text x="62" y="${y+3}" text-anchor="end">${v}</text>`;}); $('yticks').innerHTML=yt;
  let xt=''; [25,29,40,50,60,74,80].forEach(t=>{const x=xpx(t);xt+=`<line x1="${x}" y1="310" x2="${x}" y2="314" stroke="#1B3A55"/><text x="${x}" y="326" text-anchor="middle">${t}</text>`;}); $('xticks').innerHTML=xt;

  let vg=46;
  function drawCurve(){ let p=[]; for(let T=TMIN;T<=TMAX;T++) p.push(xpx(T).toFixed(1)+','+ypx(visc(vg,T)).toFixed(1)); $('curve').setAttribute('points',p.join(' ')); }
  function render(){
    const T=+$('tRange').value, v=visc(vg,T);
    $('tOut').textContent=T; $('viscOut').textContent=v.toFixed(1);
    const inB = v>=band[0] && v<=band[1];
    $('bandOut').textContent=inB?'in band':(v<band[0]?'too thin':'too thick');
    $('bandOut').style.color=inB?'#0E7E8C':'#C2463B';
    $('dot').setAttribute('cx',xpx(T)); $('dot').setAttribute('cy',ypx(v));
    $('tline').setAttribute('x1',xpx(T)); $('tline').setAttribute('x2',xpx(T)); $('tline').setAttribute('y1',ypx(v)); $('tline').setAttribute('y2',PY0);
    // verdict across the window
    const cold=visc(vg,win[0]), hot=visc(vg,win[1]);
    const okWin = hot>=band[0] && cold<=band[1];
    const vv=$('verdict');
    if(okWin){ vv.className='verdict'; vv.innerHTML=`<b>ISO VG ${vg}</b> stays <b>${hot.toFixed(1)}–${cold.toFixed(1)} cSt</b> across 29–74 °C — inside the 13–80 band, edge to edge. This is the grade for the platform.`; }
    else if(hot<band[0]){ vv.className='verdict bad'; vv.innerHTML=`<b>ISO VG ${vg}</b> thins to <b>${hot.toFixed(1)} cSt</b> at 74 °C — below the 13 cSt floor. <b>Too thin when hot</b>: it leaks and lubricates poorly.`; }
    else { vv.className='verdict bad'; vv.innerHTML=`<b>ISO VG ${vg}</b> thickens to <b>${cold.toFixed(1)} cSt</b> at 29 °C — above the 80 cSt ceiling. <b>Too thick when cold</b>: it drags and starves the pump.`; }
  }
  function pick(g,btn){ vg=g; for(const b of [$('bVG32'),$('bVG46'),$('bVG68')]) b.classList.toggle('active',b===btn); drawCurve(); render(); }
  $('bVG32').onclick=()=>pick(32,$('bVG32')); $('bVG46').onclick=()=>pick(46,$('bVG46')); $('bVG68').onclick=()=>pick(68,$('bVG68'));
  $('tRange').addEventListener('input',render);
  drawCurve(); render();
</script>
</body>
</html>
