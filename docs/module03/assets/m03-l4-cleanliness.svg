<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="An ISO 4406 cleanliness figure for target 18/16/13. Three sample columns show particles by size: greater than 4 micrometres, many small dots, code 18, up to 2500 per millilitre; greater than 6 micrometres, fewer medium dots, code 16, up to 640 per millilitre; greater than 14 micrometres, only a few large dots, code 13, up to 80 per millilitre. On the right a close-up of a valve spool in its bore shows a 14 micrometre particle wedged in the few-micrometre clearance and scoring the spool, illustrating why the largest-size count is the critical one.">
