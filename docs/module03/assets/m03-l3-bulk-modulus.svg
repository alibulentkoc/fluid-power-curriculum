<rect x="529" y="224" width="142" height="226" fill="#1FB6AE" opacity="0.13"/>
<polyline points="600.0,224.0 634.0,246.0 566.0,268.0 634.0,290.0 566.0,312.0 634.0,334.0 566.0,356.0 634.0,378.0 566.0,400.0 634.0,422.0 600.0,444.0" fill="none" stroke="#0E7E8C" stroke-width="2.4"/>
<rect x="529" y="208" width="142" height="16" fill="#1B3A55"/>
<rect x="591" y="136" width="18" height="72" fill="#5B6B79"/>
<rect x="554" y="110" width="92" height="26" rx="4" fill="#DD841A"/>
<text x="600" y="129" font-size="12" font-weight="700" fill="#fff" text-anchor="middle" font-family="'IBM Plex Mono',monospace">2 t</text>
<line x1="695" y1="150" x2="695" y2="110" stroke="#C2463B" stroke-width="1.8" marker-end="url(#sa)"/>
<text x="702" y="134" font-size="12" font-weight="700" fill="#C2463B">1.25 mm  ✗</text>
<text x="600" y="476" font-size="13" font-weight="700" fill="#1B3A55" text-anchor="middle">~1.5% air · Bₑ ≈ 0.49 GPa</text>
<text x="600" y="493" font-size="11" fill="#586876" text-anchor="middle">soft spring — sags past ±1 mm</text>
</svg>