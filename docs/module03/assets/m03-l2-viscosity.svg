<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="A viscosity versus temperature chart for ISO VG 46 hydraulic oil. The curve falls from about 110 centistokes at 25 degrees Celsius to about 11 centistokes at 80 degrees. A green horizontal band marks the acceptable viscosity range of 13 to 80 centistokes. A shaded vertical strip marks the operating window of 29 to 74 degrees Celsius. Within that window the curve runs from 79.5 centistokes at 29 degrees down through 46 centistokes at 40 degrees to 13.2 centistokes at 74 degrees, staying inside the band.">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient></defs>
<rect x="0" y="0" width="900" height="520" rx="20" fill="url(#bg)"/>
<text x="40" y="44" font-size="24" font-weight="700" fill="#0C2235">ISO VG 46 — viscosity across temperature</text>
<text x="40" y="68" font-size="14" fill="#586876">The grade is chosen so the curve threads the acceptable band across the whole operating window.</text>
<rect x="120" y="152.0" width="700" height="241.2" fill="#1FB6AE" opacity="0.14"/>
