<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Sizing the motor</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal2:#1FB6AE;--amber:#DD841A;--green:#0C6A5F;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  svg{display:block;width:100%;height:auto;background:#F2F6F9;border:1px solid var(--line);border-radius:12px}
  .ctl{margin:16px 0 6px}
  .ctl label{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:6px}
  .ctl .v{font-family:var(--mono);color:var(--teal)}
  input[type=range]{width:100%;accent-color:#0E7E8C}
  .out{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}
  .tile{border-radius:12px;padding:12px 14px;border:1px solid var(--line);background:var(--bg);text-align:center}
  .tile .k{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--slate)}
  .tile .v{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:3px;color:var(--teal)}
  .tile.motor .v{color:var(--green)}
  .note{margin-top:14px;font-size:13px;padding:10px 12px;border-radius:10px;background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sizing the motor — take the next rung up</h1>
  <p class="sub">The motor must output the pump's shaft power. Motors come in standard sizes, so you pick the <b>next size at or above</b> the demand — buying starting torque and margin for free.</p>

  <div class="card">
    <svg id="ladder" viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg">
      <g id="bars"></g>
      <line id="demand" stroke="#DD841A" stroke-width="2" stroke-dasharray="5 3"/>
      <text id="demandLab" font-size="10.5" font-weight="700" fill="#B5670F"></text>
    </svg>

    <div class="ctl">
      <label>Pump shaft-power demand <span class="v"><span id="powerOut">1.85</span> kW</span></label>
      <input id="powerRange" type="range" min="0.5" max="5" step="0.05" value="1.85"/>
    </div>
    <div class="out">
      <div class="tile motor"><div class="k">Motor size</div><div class="v"><span id="motorOut">2.2</span> kW</div></div>
      <div class="tile"><div class="k">Torque margin</div><div class="v"><span id="marginOut">1.19</span>×</div></div>
      <div class="tile"><div class="k">Draws at load</div><div class="v"><span id="elecOut">2.06</span> kW</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
</div>

<script>
  const STD=[0.75,1.1,1.5,2.2,3.0,4.0,5.5], n=1450, eta=0.90;
  const w=n*2*Math.PI/60;
  const $=id=>document.getElementById(id);
  const X0=40,X1=610,BASE=180,scale=42;
  function draw(sel){
    let s='';
    STD.forEach((kw,i)=>{ const x=X0+i*82, h=kw*scale, chosen=(kw===sel);
      s+=`<rect x="${x}" y="${(BASE-h).toFixed(0)}" width="56" height="${h.toFixed(0)}" rx="4" fill="${chosen?'#0C6A5F':'#B9C7D1'}"/>`;
      s+=`<text x="${x+28}" y="${BASE+15}" font-size="10" font-weight="${chosen?'700':'400'}" fill="#1B3A55" text-anchor="middle">${kw}</text>`;
      if(chosen) s+=`<text x="${x+28}" y="${(BASE-h-6).toFixed(0)}" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">chosen</text>`;
    });
    $('bars').innerHTML=s;
  }
  function render(){
    const P=+$('powerRange').value;
    const sel=STD.find(s=>s>=P) || STD[STD.length-1];
    const Trated=sel*1000/w, Tload=P*1000/w, margin=Trated/Tload, elec=P/eta;
    $('powerOut').textContent=P.toFixed(2); $('motorOut').textContent=sel.toFixed(1);
    $('marginOut').textContent=margin.toFixed(2); $('elecOut').textContent=elec.toFixed(2);
    draw(sel);
    const yd=BASE-P*scale;
    $('demand').setAttribute('x1',X0-6); $('demand').setAttribute('x2',X1);
    $('demand').setAttribute('y1',yd); $('demand').setAttribute('y2',yd);
    $('demandLab').setAttribute('x',X1-2); $('demandLab').setAttribute('y',yd-4); $('demandLab').setAttribute('text-anchor','end');
    $('demandLab').textContent='demand '+P.toFixed(2)+' kW';
    const atPlatform=Math.abs(P-1.85)<0.05;
    $('note').innerHTML = atPlatform
      ? `The platform's <b>1.85 kW</b> demand selects a <b>2.2 kW</b> motor: 1.19× torque margin to start the pump, drawing <b>2.06 kW</b> from the wall (Lesson 01's figure).`
      : `A ${P.toFixed(2)} kW demand takes the <b>${sel.toFixed(1)} kW</b> motor (next rung up): ${margin.toFixed(2)}× torque margin, drawing <b>${elec.toFixed(2)} kW</b>. ${margin>1.6?'A big jump above the rung wastes margin — inefficient and costly.':'Sensible headroom.'}`;
  }
  $('powerRange').addEventListener('input',render);
  render();
</script>
</body>
</html>
