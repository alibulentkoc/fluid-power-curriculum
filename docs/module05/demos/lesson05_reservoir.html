<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Demo · Sizing the reservoir</title>
<style>
  :root{--ink:#0C2235;--slate:#586876;--line:#D3DDE6;--bg:#F7F9FB;--card:#FFFFFF;
    --teal:#0E7E8C;--teal2:#1FB6AE;--amber:#DD841A;--red:#C2463B;--green:#1B8A5A;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;--sans:'IBM Plex Sans','Segoe UI',system-ui,-apple-system,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:24px;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}.sub{color:var(--slate);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(12,34,53,.06)}
  svg{display:block;width:100%;height:auto;background:#F2F6F9;border:1px solid var(--line);border-radius:12px}
  .ctl{margin:16px 0 6px}
  .ctl label{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:6px}
  .ctl .v{font-family:var(--mono);color:var(--teal)}
  input[type=range]{width:100%;accent-color:#0E7E8C}
  .out{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .tile{border-radius:12px;padding:12px 14px;border:1px solid var(--line);background:var(--bg);text-align:center}
  .tile .k{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--slate)}
  .tile .v{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:3px;color:var(--teal)}
  .status{margin-top:14px;font-size:13px;padding:10px 12px;border-radius:10px;font-weight:600}
  .status.ok{background:#EAF6F5;color:#0B5A63;border:1px solid #BFE6E2}
  .status.warn{background:#FEF3E2;color:#8A5000;border:1px solid #F3D9AE}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sizing the reservoir — volume, dwell, and cooling</h1>
  <p class="sub">Volume buys <b>dwell time</b> (de-aeration &amp; settling); surface area sheds <b>heat</b>. See what a tank can passively lose against the two loads — working (0.39 kW) and holding (1.9 kW).</p>

  <div class="card">
    <svg id="chart" viewBox="0 0 640 190" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',system-ui,sans-serif">
      <text x="20" y="24" font-size="10.5" font-weight="700" fill="#586876">heat shed by the tank vs the two heat loads (kW)</text>
      <line x1="20" y1="150" x2="620" y2="150" stroke="#1B3A55" stroke-width="1.4"/>
      <rect id="dissBar" x="20" y="120" height="30" rx="5" fill="#1FB6AE"/>
      <text id="dissTxt" x="26" y="140" font-size="12" font-weight="700" fill="#08343a" font-family="'IBM Plex Mono',monospace"></text>
      <line id="workLine" y1="60" y2="160" stroke="#0E7E8C" stroke-width="2" stroke-dasharray="4 3"/>
      <text id="workLab" y="52" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">working 0.39</text>
      <line id="holdLine" y1="60" y2="160" stroke="#C2463B" stroke-width="2" stroke-dasharray="4 3"/>
      <text id="holdLab" y="52" font-size="9.5" font-weight="700" fill="#9A2f27" text-anchor="middle">holding 1.90</text>
    </svg>

    <div class="ctl">
      <label>Reservoir volume <span class="v"><span id="volOut">40</span> L</span></label>
      <input id="volRange" type="range" min="10" max="120" step="2" value="40"/>
    </div>
    <div class="out">
      <div class="tile"><div class="k">Dwell time</div><div class="v"><span id="dwellOut">4.0</span> min</div></div>
      <div class="tile"><div class="k">Passively sheds</div><div class="v"><span id="dissOut">0.45</span> kW</div></div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
  const Q=10, h=16, dT=40, Pwork=0.39, Phold=1.90;
  const X0=20,X1=620,PMAXkW=2.2;
  const $=id=>document.getElementById(id);
  const xp=kw=>X0+(kw/PMAXkW)*(X1-X0);
  // static heat-load lines
  $('workLine').setAttribute('x1',xp(Pwork)); $('workLine').setAttribute('x2',xp(Pwork)); $('workLab').setAttribute('x',xp(Pwork));
  $('holdLine').setAttribute('x1',xp(Phold)); $('holdLine').setAttribute('x2',xp(Phold)); $('holdLab').setAttribute('x',xp(Phold));
  function render(){
    const V=+$('volRange').value;
    const dwell=V/Q, A=0.06*Math.pow(V,2/3), diss=h*A*dT/1000;
    $('volOut').textContent=V; $('dwellOut').textContent=dwell.toFixed(1); $('dissOut').textContent=diss.toFixed(2);
    $('dissBar').setAttribute('width',(xp(diss)-X0).toFixed(1));
    $('dissTxt').textContent=diss.toFixed(2)+' kW';
    const st=$('status');
    const dwellOK=dwell>=3;
    if(diss>=Phold){ st.className='status ok'; st.textContent=`${V} L: ${dwell.toFixed(1)} min dwell; sheds ${diss.toFixed(2)} kW — covers even the 1.9 kW hold heat (a large tank, rarely worth it vs a cooler).`; }
    else if(diss>=Pwork){ st.className='status warn'; st.textContent=`${V} L: ${dwell.toFixed(1)} min dwell${dwellOK?'':' (short!)'}; sheds ${diss.toFixed(2)} kW — enough for the 0.39 kW working heat, but NOT the 1.9 kW hold heat. Sustained holds need an added cooler.`; }
    else { st.className='status warn'; st.textContent=`${V} L: only ${diss.toFixed(2)} kW shed — below even the working heat, and dwell is ${dwell.toFixed(1)} min${dwellOK?'':' (too short to de-aerate)'}. Too small.`; }
  }
  $('volRange').addEventListener('input',render);
  render();
</script>
</body>
</html>
