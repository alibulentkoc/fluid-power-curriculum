<text x="640" y="256" font-size="12" fill="#586876">115 bar</text>
<text x="848" y="256" font-size="10" font-weight="700" fill="#8AA0AE" text-anchor="end">L04</text>
<rect x="470" y="279" width="390" height="40" rx="8" fill="#FFFFFF" stroke="#D3DDE6"/>
<rect x="470" y="279" width="8" height="40" rx="4" fill="#1FB6AE"/>
<text x="492" y="304" font-size="13" font-weight="700" fill="#0C2235">RESERVOIR</text>
<text x="640" y="304" font-size="12" fill="#586876">~40 L (± cooler)</text>
<text x="848" y="304" font-size="10" font-weight="700" fill="#8AA0AE" text-anchor="end">L05</text>
<rect x="470" y="327" width="390" height="40" rx="8" fill="#FFFFFF" stroke="#D3DDE6"/>
