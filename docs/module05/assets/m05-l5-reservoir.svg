<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Left: a reservoir cutaway. An oil-filled tank with a filler-breather on top, a return line entering through a diffuser on the right, a baffle plate across the middle, and the pump suction leaving low on the left, so returning oil takes the long path; air bubbles rise to the surface, dirt settles to the bottom, and heat radiates from the walls. Labelled 40 litres, about 4 minutes dwell, shedding roughly 0.45 kilowatts passively, with a cooler added for sustained holds. Right: the complete power unit listed as assembled parts — 2.2 kilowatt motor, 7.5 cubic centimetre per rev pump, 115 bar relief valve, 40 litre reservoir, return filter holding ISO 18/16/13, and ISO VG 46 oil — feeding the cylinder 10 litres per minute at 100 bar, clean and cool.">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient><marker id="am" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#0E7E8C"/></marker><marker id="hm" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#C2463B"/></marker></defs>
<rect x="0" y="0" width="900" height="480" rx="20" fill="url(#bg)"/>
<text x="40" y="44" font-size="24" font-weight="700" fill="#0C2235">Where the oil lives — and the finished unit</text>
<text x="40" y="68" font-size="14" fill="#586876">The reservoir holds, de-aerates, settles, and cools. Together with the pump, motor, and relief, it makes the power unit.</text>
<text x="50" y="112" font-size="11.5" font-weight="700" letter-spacing="1" fill="#0E7E8C">RESERVOIR (cutaway)</text>
<path d="M60,150 L60,360 L410,360 L410,150" fill="none" stroke="#1B3A55" stroke-width="2.5"/>
<rect x="62" y="195" width="346" height="163" fill="#1FB6AE" opacity="0.35"/>
<line x1="62" y1="195" x2="408" y2="195" stroke="#0E7E8C" stroke-width="1.5"/>
<rect x="95" y="134" width="26" height="16" rx="3" fill="#5B6B79"/><text x="108" y="130" font-size="9" fill="#586876" text-anchor="middle">breather</text>
<line x1="370" y1="120" x2="370" y2="191" stroke="#0E7E8C" stroke-width="4" marker-end="url(#am)"/>
<text x="370" y="116" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">return</text>
<rect x="232" y="203" width="6" height="125" fill="#7C93A1"/>
<text x="235" y="191" font-size="9" fill="#586876" text-anchor="middle">baffle</text>
<line x1="100" y1="330" x2="100" y2="120" stroke="#0E7E8C" stroke-width="4" marker-end="url(#am)"/>
<text x="100" y="116" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">suction</text>
<circle cx="350" cy="300" r="3.0" fill="none" stroke="#0E7E8C" stroke-width="1"/>
<circle cx="360" cy="270" r="2.7" fill="none" stroke="#0E7E8C" stroke-width="1"/>
<circle cx="345" cy="240" r="2.4" fill="none" stroke="#0E7E8C" stroke-width="1"/>
<circle cx="365" cy="225" r="2.1" fill="none" stroke="#0E7E8C" stroke-width="1"/>
<text x="352" y="332" font-size="8.5" fill="#0B5A63" text-anchor="middle">air rises</text>
<circle cx="150" cy="354" r="2" fill="#586876"/>
<circle cx="175" cy="354" r="2" fill="#586876"/>
<circle cx="200" cy="354" r="2" fill="#586876"/>
<circle cx="300" cy="354" r="2" fill="#586876"/>
<circle cx="320" cy="354" r="2" fill="#586876"/>
<text x="185" y="348" font-size="8.5" fill="#586876" text-anchor="middle">dirt settles</text>
<line x1="60" y1="230" x2="32" y2="230" stroke="#C2463B" stroke-width="1.6" marker-end="url(#hm)"/>
<line x1="410" y1="230" x2="438" y2="230" stroke="#C2463B" stroke-width="1.6" marker-end="url(#hm)"/>
<line x1="60" y1="290" x2="32" y2="290" stroke="#C2463B" stroke-width="1.6" marker-end="url(#hm)"/>
<line x1="410" y1="290" x2="438" y2="290" stroke="#C2463B" stroke-width="1.6" marker-end="url(#hm)"/>
<text x="235" y="382" font-size="10.5" font-weight="700" fill="#1B3A55" text-anchor="middle">40 L · 4 min dwell · sheds ~0.45 kW (cooler for sustained holds)</text>
<text x="470" y="112" font-size="11.5" font-weight="700" letter-spacing="1" fill="#0E7E8C">THE COMPLETE POWER UNIT</text>
