<text x="492" y="400" font-size="13" font-weight="700" fill="#0C2235">OIL</text>
<text x="640" y="400" font-size="12" fill="#586876">ISO VG 46</text>
<text x="848" y="400" font-size="10" font-weight="700" fill="#8AA0AE" text-anchor="end">M03</text>
<rect x="470" y="425" width="390" height="34" rx="8" fill="#0C6A5F"/>
<text x="665" y="447" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">→ cylinder: 10 L/min @ 100 bar, clean &amp; cool</text>
