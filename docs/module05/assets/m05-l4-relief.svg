<svg viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Left: a relief valve cross-section — a spring pushing a poppet shut against the pressure inlet P, with a tank outlet T; when pressure lifts the poppet, oil escapes to tank. Middle: a pressure setting window from 0 to 140 bar, with the 100 bar working pressure, the 115 bar relief setting marked safely above it, and the component limit near 135 bar above that; the relief must sit between working and limit. Right: the hold condition — with the platform holding, the fixed pump pushes its full 10 litres per minute over the relief at 115 bar, dumping about 1.9 kilowatts as heat, more than the 1.67 kilowatts used when working and about five times the 0.39 kilowatt working-point loss.">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient><marker id="am" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#0E7E8C"/></marker><marker id="hm" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#C2463B"/></marker></defs>
<rect x="0" y="0" width="900" height="470" rx="20" fill="url(#bg)"/>
<text x="40" y="44" font-size="24" font-weight="700" fill="#0C2235">The pressure cap — and the pump’s escape route</text>
<text x="40" y="68" font-size="14" fill="#586876">Set above working, below the limit. On a fixed pump it also carries every hold — as heat.</text>
<text x="50" y="114" font-size="11.5" font-weight="700" letter-spacing="1" fill="#0E7E8C">RELIEF VALVE</text>
<rect x="70" y="135" width="150" height="210" rx="10" fill="#FFFFFF" stroke="#1B3A55" stroke-width="2.5"/>
<line x1="95" y1="155" x2="195" y2="155" stroke="#1B3A55" stroke-width="3"/>
<polyline points="145.0,158.0 163.0,163.7 127.0,169.4 163.0,175.1 127.0,180.8 163.0,186.5 127.0,192.2 163.0,197.9 127.0,203.6 163.0,209.3 145.0,215.0" fill="none" stroke="#0E7E8C" stroke-width="2.4"/>
<text x="150" y="190" font-size="9.5" fill="#0B5A63" text-anchor="start">spring sets</text>
<text x="150" y="202" font-size="9.5" fill="#0B5A63" text-anchor="start">the pressure</text>
<path d="M120,218 L170,218 L150,258 z" fill="#5B6B79" stroke="#1B3A55" stroke-width="1.5"/>
<text x="100" y="245" font-size="9.5" fill="#586876">poppet</text>
<line x1="145" y1="360" x2="145" y2="300" stroke="#0E7E8C" stroke-width="6" marker-end="url(#am)"/>
<text x="145" y="378" font-size="11" font-weight="700" fill="#0B5A63" text-anchor="middle">P (pressure)</text>
<line x1="220" y1="270" x2="270" y2="270" stroke="#C2463B" stroke-width="5" marker-end="url(#hm)"/>
<text x="248" y="262" font-size="10" font-weight="700" fill="#9A2f27" text-anchor="middle">T (tank)</text>
<text x="145" y="290" font-size="8.5" fill="#8AA0AE" text-anchor="middle">opens when p beats spring</text>
<text x="360" y="114" font-size="11.5" font-weight="700" letter-spacing="1" fill="#0E7E8C">THE SETTING WINDOW</text>
<line x1="400" y1="140" x2="400" y2="360" stroke="#1B3A55" stroke-width="2"/>
<line x1="396" y1="360" x2="400" y2="360" stroke="#1B3A55"/><text x="392" y="364" font-size="9.5" fill="#586876" text-anchor="end">0</text>
<line x1="396" y1="287" x2="400" y2="287" stroke="#1B3A55"/><text x="392" y="291" font-size="9.5" fill="#586876" text-anchor="end">50</text>
<line x1="396" y1="213" x2="400" y2="213" stroke="#1B3A55"/><text x="392" y="217" font-size="9.5" fill="#586876" text-anchor="end">100</text>
<line x1="396" y1="140" x2="400" y2="140" stroke="#1B3A55"/><text x="392" y="144" font-size="9.5" fill="#586876" text-anchor="end">150</text>
<text x="370" y="250" font-size="10" font-weight="700" fill="#1B3A55" text-anchor="middle" transform="rotate(-90 370 250)">bar</text>
<rect x="400" y="162" width="120" height="51" fill="#1FB6AE" opacity="0.14"/>
<line x1="400" y1="213" x2="520" y2="213" stroke="#0E7E8C" stroke-width="2" stroke-dasharray="4 3"/>
<text x="524" y="217" font-size="10" font-weight="700" fill="#0B5A63">100 · working</text>
<line x1="400" y1="191" x2="520" y2="191" stroke="#DD841A" stroke-width="3"/>
<text x="524" y="195" font-size="11" font-weight="700" fill="#B5670F">115 · RELIEF SET</text>
<line x1="400" y1="162" x2="520" y2="162" stroke="#C2463B" stroke-width="2" stroke-dasharray="4 3"/>
<text x="524" y="166" font-size="10" font-weight="700" fill="#9A2f27">~135 · limit</text>
<text x="460" y="382" font-size="10" fill="#586876" text-anchor="middle">above work, below limit</text>
<text x="600" y="114" font-size="11.5" font-weight="700" letter-spacing="1" fill="#0E7E8C">WHILE HOLDING (fixed pump)</text>
<rect x="600" y="150" width="90" height="40" rx="6" fill="#0E7E8C"/><text x="645" y="174" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">PUMP</text>
<line x1="690" y1="170" x2="740" y2="170" stroke="#0E7E8C" stroke-width="5" marker-end="url(#am)"/><text x="715" y="162" font-size="9.5" font-weight="700" fill="#0B5A63" text-anchor="middle">10 L/min</text>
<rect x="740" y="150" width="90" height="40" rx="6" fill="#DD841A"/><text x="785" y="169" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">RELIEF</text><text x="785" y="182" font-size="9" fill="#fff" text-anchor="middle">115 bar</text>
<line x1="785" y1="190" x2="785" y2="230" stroke="#C2463B" stroke-width="5" marker-end="url(#hm)"/>
<rect x="740" y="232" width="90" height="30" rx="6" fill="#586876"/><text x="785" y="252" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">TANK</text>
<rect x="600" y="290" width="260" height="70" rx="10" fill="#FBEAE7" stroke="#EBC3BE"/>
<text x="730" y="318" font-size="20" font-weight="700" fill="#9A2f27" text-anchor="middle">≈ 1.9 kW heat</text>
<text x="730" y="340" font-size="10.5" fill="#9A2f27" text-anchor="middle">more than the 1.67 kW working power</text>
<text x="730" y="353" font-size="10" fill="#9A2f27" text-anchor="middle">~5× the 0.39 kW working-point loss</text>
</svg>