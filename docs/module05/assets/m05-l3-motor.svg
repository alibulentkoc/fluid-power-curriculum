<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans','Segoe UI',system-ui,sans-serif" role="img" aria-label="Left: the power train from the wall. 2.06 kilowatts of electrical power enters a 2.2 kilowatt four-pole motor at 1450 rpm, which loses 0.21 kilowatts as heat and outputs 1.85 kilowatts of shaft power to the pump; the pump loses 0.19 kilowatts and delivers 1.67 kilowatts of hydraulic power to the cylinder; the two losses sum to 0.39 kilowatts of heat. Right: the standard motor-size ladder 0.75, 1.1, 1.5, 2.2, 3.0 kilowatts, with the pump demand of 1.85 kilowatts landing between 1.5 and 2.2, so 2.2 kilowatts is chosen; a torque bar shows its 14.5 newton-metre rating above the 12.2 newton-metre load.">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7F9FB"/><stop offset="1" stop-color="#EBEFF4"/></linearGradient><marker id="am" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#0E7E8C"/></marker><marker id="hm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#C2463B"/></marker></defs>
<rect x="0" y="0" width="900" height="460" rx="20" fill="url(#bg)"/>
<text x="40" y="44" font-size="24" font-weight="700" fill="#0C2235">From the wall to the fluid — the prime mover</text>
<text x="40" y="68" font-size="14" fill="#586876">The pump demands 1.85 kW; the next standard motor is 2.2 kW. It draws ~2 kW and closes the chain.</text>
<text x="60" y="112" font-size="12" font-weight="700" letter-spacing="1" fill="#0E7E8C">THE POWER TRAIN</text>
<rect x="90" y="128" width="200" height="44" rx="8" fill="#586876"/>
<text x="190.0" y="147" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">WALL SUPPLY</text>
<text x="190.0" y="163" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2.06 kW electrical</text>
<line x1="190.0" y1="172" x2="190.0" y2="196" stroke="#0E7E8C" stroke-width="4" marker-end="url(#am)"/>
<rect x="90" y="198" width="200" height="46" rx="8" fill="#13314A"/>
<text x="190.0" y="218" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">MOTOR  2.2 kW</text>
<text x="190.0" y="234" font-size="10" font-weight="400" fill="#fff" text-anchor="middle">4-pole · ~1450 rpm</text>
<line x1="190.0" y1="244" x2="190.0" y2="268" stroke="#0E7E8C" stroke-width="4" marker-end="url(#am)"/>
<text x="198.0" y="262" font-size="10.5" font-weight="700" fill="#0B5A63">shaft 1.85 kW · 12 N·m</text>
<rect x="90" y="270" width="200" height="42" rx="8" fill="#0E7E8C"/>
<text x="190.0" y="296" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">PUMP  7.5 cc/rev</text>
<line x1="190.0" y1="312" x2="190.0" y2="336" stroke="#0E7E8C" stroke-width="4" marker-end="url(#am)"/>
<text x="198.0" y="330" font-size="10.5" font-weight="700" fill="#0B5A63">hydraulic 1.67 kW</text>
<rect x="90" y="338" width="200" height="40" rx="8" fill="#1FB6AE"/>
<text x="190.0" y="363" font-size="12" font-weight="700" fill="#08343a" text-anchor="middle">CYLINDER</text>
<line x1="290" y1="221" x2="330" y2="221" stroke="#C2463B" stroke-width="2" marker-end="url(#hm)"/>
<text x="334" y="218" font-size="10" font-weight="700" fill="#9A2f27">0.21 kW</text>
<line x1="290" y1="291" x2="330" y2="291" stroke="#C2463B" stroke-width="2" marker-end="url(#hm)"/>
<text x="334" y="288" font-size="10" font-weight="700" fill="#9A2f27">0.19 kW</text>
<text x="190.0" y="400" font-size="11" fill="#586876" text-anchor="middle">losses = 0.39 kW heat → reservoir (Lesson 05)</text>
<text x="500" y="112" font-size="12" font-weight="700" letter-spacing="1" fill="#0E7E8C">CHOOSING THE SIZE (next rung up)</text>
<rect x="510" y="286" width="54" height="44" rx="5" fill="#B9C7D1"/>
<text x="537.0" y="345" font-size="10.5" font-weight="400" fill="#1B3A55" text-anchor="middle">0.75</text>
<rect x="578" y="266" width="54" height="64" rx="5" fill="#B9C7D1"/>
<text x="605.0" y="345" font-size="10.5" font-weight="400" fill="#1B3A55" text-anchor="middle">1.1</text>
<rect x="646" y="243" width="54" height="87" rx="5" fill="#B9C7D1"/>
<text x="673.0" y="345" font-size="10.5" font-weight="400" fill="#1B3A55" text-anchor="middle">1.5</text>
<rect x="714" y="202" width="54" height="128" rx="5" fill="#0C6A5F"/>
<text x="741.0" y="345" font-size="10.5" font-weight="700" fill="#1B3A55" text-anchor="middle">2.2</text>
<text x="741.0" y="194" font-size="10" font-weight="700" fill="#0B5A63" text-anchor="middle">✓ chosen</text>
<rect x="782" y="156" width="54" height="174" rx="5" fill="#B9C7D1"/>
<text x="809.0" y="345" font-size="10.5" font-weight="400" fill="#1B3A55" text-anchor="middle">3.0</text>
<text x="680" y="362" font-size="10.5" fill="#586876" text-anchor="middle">standard motor sizes (kW)</text>
<line x1="504" y1="223" x2="836" y2="223" stroke="#DD841A" stroke-width="2" stroke-dasharray="5 3"/>
<text x="838" y="227" font-size="10.5" font-weight="700" fill="#B5670F">demand 1.85 kW</text>
<text x="510" y="392" font-size="11.5" fill="#586876">2.2 kW → 14.5 N·m rated vs 12.2 N·m load = <tspan font-weight="700" fill="#0B5A63">1.19× margin</tspan> to start &amp; run.</text>
</svg>