site_name: Fluid Power Systems Engineering
site_description: A hands-on fluid power course built around one real machine — a precision hydraulic lift platform.
site_author: Ali Bulent Koc
# Update site_url to match the GitHub Pages target before deploying:
site_url: https://alibulentkoc.github.io/fluid-power-curriculum/

# Authored relative links (assets/, demos/, quizzes/) resolve correctly with flat URLs.
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: green
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - The Course Machine: course-machine.md
  - "Module 01 — Introduction to Fluid Power":
      - Overview: module01/index.md
      - "01 · Why fluid power exists": module01/01_why_fluid_power_exists.md
      - "02 · How energy is transmitted": module01/02_how_energy_is_transmitted.md
      - "03 · Force multiplication": module01/03_force_multiplication.md
      - "04 · Real industrial machines": module01/04_real_industrial_machines.md
  - "Module 02 — Fluid Power Components":
      - Overview: module02/index.md
      - "01 · The hydraulic cylinder": module02/01_the_hydraulic_cylinder.md
      - "02 · The power unit": module02/02_the_power_unit.md
      - "03 · Lines, fittings, and ports": module02/03_lines_fittings_and_ports.md
      - "04 · The complete component set": module02/04_the_complete_component_set.md
  - "Module 03 — Fluid Fundamentals":
      - Overview: module03/index.md
      - "01 · The working fluid": module03/01_the_working_fluid.md
      - "02 · Viscosity": module03/02_viscosity.md
      - "03 · Bulk modulus": module03/03_bulk_modulus.md
      - "04 · Fluid cleanliness": module03/04_fluid_cleanliness.md
  - "Module 04 — Actuators":
      - Overview: module04/index.md
      - "01 · Force from pressure": module04/01_force_from_pressure.md
      - "02 · Speed from flow": module04/02_speed_from_flow.md
      - "03 · Friction and the usable force": module04/03_friction_and_usable_force.md
      - "04 · Cushioning and end-of-stroke": module04/04_cushioning_and_end_of_stroke.md
      - "05 · The cylinder in motion": module04/05_the_cylinder_in_motion.md
  - "Module 05 — Power Units":
      - Overview: module05/index.md
      - "01 · What the power unit must supply": module05/01_what_the_power_unit_must_supply.md
      - "02 · The pump": module05/02_the_pump.md
      - "03 · The electric motor": module05/03_the_electric_motor.md
      - "04 · The relief valve": module05/04_the_relief_valve.md
      - "05 · The reservoir and the complete unit": module05/05_the_reservoir_and_complete_unit.md
  - "Module 06 — Valves & Control":
      - Overview: module06/index.md
      - "01 · What the valves must do": module06/01_what_the_valves_must_do.md
      - "02 · The directional control valve": module06/02_the_directional_control_valve.md
